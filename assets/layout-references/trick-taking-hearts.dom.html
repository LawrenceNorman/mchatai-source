<!-- VERBATIM: copy this DOM block into the generated Hearts/Spades/Bridge mini-app
     unchanged. Every id and class is required — the evaluator greps for them. -->
<button id="new-game" type="button">New Game</button>

<div id="hud">
  <span class="score" data-seat="S">You: <b>0</b></span>
  <span class="score" data-seat="W">West: <b>0</b></span>
  <span class="score" data-seat="N">North: <b>0</b></span>
  <span class="score" data-seat="E">East: <b>0</b></span>
  <span class="turn">Your turn</span>
</div>

<div id="table">
  <!-- North AI (top center) -->
  <div id="zoneN" class="ai-zone" aria-label="North AI hand">
    <div class="seat-label">North</div>
    <div class="count-badge">13</div>
  </div>

  <!-- West AI (left middle) -->
  <div id="zoneW" class="ai-zone" aria-label="West AI hand">
    <div class="seat-label">West</div>
    <div class="count-badge">13</div>
  </div>

  <!-- East AI (right middle) -->
  <div id="zoneE" class="ai-zone" aria-label="East AI hand">
    <div class="seat-label">East</div>
    <div class="count-badge">13</div>
  </div>

  <!-- Center trick area — 3x3 grid with N/E/S/W slots -->
  <div id="trick" aria-label="Current trick"></div>

  <!-- Human (bottom) — 13 face-up cards rendered by renderHand() in script -->
  <div id="zoneS" class="human-zone" aria-label="Your hand"></div>
</div>

<div id="toast" role="status" aria-live="polite"></div>
