<!-- VERBATIM: Single-screen product-UI skeleton for a webSPA.
     Phase DF archetype — implements rule fs-012 (product UIs prioritize
     orientation/status/action, NOT marketing).

     This is the OPPOSITE endpoint from webspa-product-landing. This archetype
     is for a tool the user OPENS and uses — a habit tracker, a calculator,
     a small dashboard, a writing tool. There is no hero, no marketing copy,
     no narrative flow. The first screen is the app itself.

     Three zones:
       - TOP: orientation (what screen am I on?) — app name + context indicator
       - MIDDLE: action (what I do here) — primary affordance in the visual center
       - BOTTOM: status (how things are going) — one short summary strip

     Copy the structure verbatim. Customize:
       - .app-name + .app-context contents
       - .primary-surface body (input, canvas, list, whatever the app IS)
       - .action-row buttons (maximum 3; fewer is better)
       - .status-strip metrics (maximum 3 short stats)
       - .settings-trigger → whatever settings sheet your app needs

     Do NOT remove / rename:
       - .app-shell (grid container — orients everything)
       - .app-header, .primary-surface, .action-row, .status-strip
       - data-zone="orientation|action|status" (evaluator greps for these)
-->

<main class="app-shell">

  <!-- ORIENTATION ZONE (fs-012) — user lands here knowing where they are -->
  <header class="app-header" data-zone="orientation">
    <div class="app-identity">
      <span class="brand-mark">◆</span>
      <h1 class="app-name">App Name</h1>
    </div>
    <div class="app-context">
      <!-- Context — what is "now" for this app? today's date, current project, etc. -->
      <span class="context-label">Today</span>
      <time class="context-value" datetime="2026-04-20">Monday, April 20</time>
    </div>
    <button class="settings-trigger" aria-label="Settings">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <circle cx="9" cy="9" r="1.5" fill="currentColor"/>
        <circle cx="9" cy="3" r="1.5" fill="currentColor"/>
        <circle cx="9" cy="15" r="1.5" fill="currentColor"/>
      </svg>
    </button>
  </header>

  <!-- ACTION ZONE (fs-012) — the PRIMARY surface. The app's reason-for-being. -->
  <!-- One thing, centered, doing real work. NOT a stack of cards. -->
  <section class="primary-surface" data-zone="action">
    <!-- Replace this block with the app's real primary affordance:
         - habit tracker: today's habit list with one-tap checkboxes
         - writing tool: a large, empty, focused textarea
         - calculator: the display + keypad
         - list manager: the list + quick-add input
         - timer: the big countdown number + start/pause button
    -->
    <div class="placeholder-primary-content">
      <p class="primary-content-headline">Primary action surface</p>
      <p class="primary-content-support">What the user came here to do.</p>
    </div>

    <!-- ACTION ROW — up to 3 action buttons. Fewer is better. -->
    <div class="action-row">
      <button class="btn-primary">Primary action</button>
      <button class="btn-secondary">Secondary</button>
    </div>
  </section>

  <!-- STATUS ZONE (fs-012) — how things are going, at a glance -->
  <footer class="status-strip" data-zone="status">
    <div class="status-item">
      <span class="status-value">0</span>
      <span class="status-label">Metric one</span>
    </div>
    <div class="status-divider" aria-hidden="true"></div>
    <div class="status-item">
      <span class="status-value">—</span>
      <span class="status-label">Metric two</span>
    </div>
    <div class="status-divider" aria-hidden="true"></div>
    <div class="status-item">
      <span class="status-value">—</span>
      <span class="status-label">Metric three</span>
    </div>
  </footer>

</main>
