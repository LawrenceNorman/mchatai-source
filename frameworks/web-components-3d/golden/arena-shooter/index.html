  whole playable stack: drag-look + touch controls (NO pointer-lock, so it works in
  the WKWebView preview AND on mobile AND the hub), real low-poly enemy models,
  shooting via raycast, chasing enemy AI, waves, health, score, juice, collapsible
  HUD. Everything is LOCAL/offline. Reuse the imported modules; do not rewrite them.
-->

<script type="module">
import * as THREE from 'three';
/* ===== INLINED CATALOG MODULES ===== */
/* inlined: controls/fps-controller.js */

//
// Universal first-person / third-person controller that WORKS WITHOUT POINTER
// LOCK — so it is playable inside the mChatAI+ WKWebView preview (which does NOT
// grant pointer lock) AND on mobile AND on the published hub. Default look mode
// is DRAG-TO-LOOK (hold + drag the view; touch-drag on phones); pointer lock is
// an opt-in for desktop-hub builds that want it. Includes built-in on-screen
// TOUCH CONTROLS (a movement joystick + action buttons) that auto-appear on
// touch devices, so the same game is mobile-ready.
//
// WHY: pointer-lock FPS games render fine but are UNPLAYABLE in the preview
// (you can't aim) and on mobile. Drag-look + touch fixes both. Movement: WASD on
// desktop, the on-screen joystick on touch. Aim: drag the view. Shoot/jump: a
// quick tap/click (no drag) fires the primary action, or use the action buttons
// / Space, all routed through onAction(id).
//
// USAGE (three.js)
//   import { FPSController } from './fps-controller.js';
//   const fps = new FPSController(renderer.domElement, {
//     position:[0,1.7,8], eyeHeight:1.7, speed:5.5, gravity:26, jumpSpeed:8,
//     colliders: wallBoxes,                 // optional [{min,max}] -> wall-slide
//     actions:[{id:'shoot',label:'FIRE'},{id:'jump',label:'JUMP'}],
//     onAction:(id)=>{ if(id==='shoot') fire(); if(id==='jump') fps.jump(); },
//   });
//   function frame(dt){ fps.update(dt); fps.applyToCamera(camera); renderer.render(scene,camera); }
//
// CONTROLS: drag the view to look · WASD / on-screen stick to move · tap/click
// (no drag) or the FIRE button or Space to act · Shift to sprint.
class FPSController {
  constructor(domElement, opts = {}) {
    this.el = domElement;
    this.lookMode = opts.lookMode || 'drag';        // 'drag' (default) | 'pointerlock'
    this.speed = opts.speed ?? 5.5;
    this.sprintMult = opts.sprintMult ?? 1.7;
    this.gravity = opts.gravity ?? 26;
    this.jumpSpeed = opts.jumpSpeed ?? 8;
    this.eyeHeight = opts.eyeHeight ?? 1.7;
    this.sensitivity = opts.sensitivity ?? 0.0026;   // mouse-drag look
    this.touchLookSensitivity = opts.touchLookSensitivity ?? 0.005;
    this.fly = opts.fly ?? false;
    this.colliders = opts.colliders ?? null;
    this.radius = opts.radius ?? 0.3;
    this.groundY = opts.groundY ?? 0;
    this.collide = opts.collide ?? null;
    this.actions = opts.actions ?? [];               // [{id,label}]
    this.onAction = opts.onAction ?? null;
    this.touchControls = opts.touchControls ?? true; // on-screen stick + buttons (touch)
    this.tapThreshold = opts.tapThreshold ?? 8;      // px: a drag shorter than this = a tap/shoot

    const p = opts.position ?? [0, this.eyeHeight + this.groundY, 0];
    this.position = [p[0], p[1], p[2]];
    this.yaw = opts.yaw ?? 0;
    this.pitch = opts.pitch ?? 0;
    this.velY = 0; this.onGround = true;
    this.keys = {};
    this.move = [0, 0];     // joystick vector x,z in [-1,1]
    this._listeners = [];
    this._dragId = null; this._lastX = 0; this._lastY = 0; this._dragDist = 0;

    this._installLook();
    this._installKeys();
    if (this._isTouch() && this.touchControls) this._installTouchUI();
  }

  _isTouch() { return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0); }
  _on(t, ev, fn, opt) { t.addEventListener(ev, fn, opt); this._listeners.push([t, ev, fn, opt]); }

  jump() { if (!this.fly && this.onGround) { this.velY = this.jumpSpeed; this.onGround = false; } }

  // ---- look: drag (default) or optional pointer-lock ----
  _installLook() {
    if (this.lookMode === 'pointerlock') {
      this._on(this.el, 'click', () => { if (document.pointerLockElement !== this.el) this.el.requestPointerLock?.(); });
      this._on(document, 'mousemove', (e) => {
        if (document.pointerLockElement !== this.el) return;
        this._applyLook(e.movementX, e.movementY, this.sensitivity);
      });
      return;
    }
    // DRAG-LOOK (works everywhere). A short press with no drag = a tap (primary action).
    const start = (x, y, id) => { this._dragId = id; this._lastX = x; this._lastY = y; this._dragDist = 0; };
    const moveTo = (x, y, sens) => {
      if (this._dragId === null) return;
      const dx = x - this._lastX, dy = y - this._lastY;
      this._dragDist += Math.abs(dx) + Math.abs(dy);
      this._applyLook(dx, dy, sens);
      this._lastX = x; this._lastY = y;
    };
    const end = () => {
      if (this._dragId !== null && this._dragDist < this.tapThreshold) this._emit(this.actions[0]?.id || 'shoot');
      this._dragId = null;
    };
    this._on(this.el, 'mousedown', (e) => { e.preventDefault(); start(e.clientX, e.clientY, 'mouse'); });
    this._on(window, 'mousemove', (e) => { if (this._dragId === 'mouse') moveTo(e.clientX, e.clientY, this.sensitivity); });
    this._on(window, 'mouseup', () => { if (this._dragId === 'mouse') end(); });
    this._on(this.el, 'contextmenu', (e) => e.preventDefault());
    // touch look (on the canvas; the joystick/buttons stop-propagation so they don't rotate the view)
    this._on(this.el, 'touchstart', (e) => { const t = e.changedTouches[0]; start(t.clientX, t.clientY, t.identifier); e.preventDefault(); }, { passive: false });
    this._on(this.el, 'touchmove', (e) => {
      for (const t of e.changedTouches) if (t.identifier === this._dragId) moveTo(t.clientX, t.clientY, this.touchLookSensitivity);
      e.preventDefault();
    }, { passive: false });
    this._on(this.el, 'touchend', (e) => { for (const t of e.changedTouches) if (t.identifier === this._dragId) end(); }, { passive: false });
  }

  _applyLook(dx, dy, sens) {
    this.yaw -= dx * sens;
    this.pitch -= dy * sens;
    const lim = Math.PI / 2 - 0.02;
    if (this.pitch > lim) this.pitch = lim;
    if (this.pitch < -lim) this.pitch = -lim;
  }

  _installKeys() {
    this._on(window, 'keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === ' ' || k === 'w' || k === 'a' || k === 's' || k === 'd') e.preventDefault();
      this.keys[k] = true;
      if (k === ' ') { this.jump(); this._emit(this.actions[0]?.id || 'shoot'); }
    });
    this._on(window, 'keyup', (e) => { this.keys[e.key.toLowerCase()] = false; });
  }

  _emit(id) { if (id && this.onAction) this.onAction(id); }

  // ---- on-screen touch controls: movement joystick (left) + action buttons (right) ----
  _installTouchUI() {
    if (!document.getElementById('mchatai-fps-touch-style')) {
      const st = document.createElement('style');
      st.id = 'mchatai-fps-touch-style';
      st.textContent = `
.fpsc-stick{position:fixed;left:18px;bottom:18px;width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);z-index:60;touch-action:none}
.fpsc-knob{position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;
  background:rgba(255,255,255,.32);transition:none}
.fpsc-btns{position:fixed;right:18px;bottom:24px;display:flex;flex-direction:column;gap:12px;z-index:60}
.fpsc-btn{width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.25);color:#fff;font:700 13px system-ui;touch-action:none;
  display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none}
.fpsc-btn:active{background:rgba(255,255,255,.3)}`;
      document.head.appendChild(st);
    }
    // joystick
    const stick = document.createElement('div'); stick.className = 'fpsc-stick';
    const knob = document.createElement('div'); knob.className = 'fpsc-knob'; stick.appendChild(knob);
    let sid = null, cx = 0, cy = 0;
    const setKnob = (dx, dy) => { knob.style.left = (35 + dx) + 'px'; knob.style.top = (35 + dy) + 'px'; };
    this._on(stick, 'touchstart', (e) => { const r = stick.getBoundingClientRect(); cx = r.left + 60; cy = r.top + 60; sid = e.changedTouches[0].identifier; e.stopPropagation(); e.preventDefault(); }, { passive: false });
    this._on(stick, 'touchmove', (e) => {
      for (const t of e.changedTouches) if (t.identifier === sid) {
        let dx = t.clientX - cx, dy = t.clientY - cy; const m = Math.hypot(dx, dy), max = 42;
        if (m > max) { dx = dx / m * max; dy = dy / m * max; }
        setKnob(dx, dy); this.move = [dx / max, dy / max];
      }
      e.stopPropagation(); e.preventDefault();
    }, { passive: false });
    const stickEnd = (e) => { for (const t of e.changedTouches) if (t.identifier === sid) { sid = null; this.move = [0, 0]; setKnob(0, 0); } e.stopPropagation(); };
    this._on(stick, 'touchend', stickEnd, { passive: false });
    document.body.appendChild(stick);

    // action buttons (default a FIRE button if no actions given)
    const btnWrap = document.createElement('div'); btnWrap.className = 'fpsc-btns';
    const acts = this.actions.length ? this.actions : [{ id: 'shoot', label: 'FIRE' }];
    for (const a of acts) {
      const b = document.createElement('div'); b.className = 'fpsc-btn'; b.textContent = a.label || a.id;
      this._on(b, 'touchstart', (e) => { this._emit(a.id); if (a.id === 'jump') this.jump(); e.stopPropagation(); e.preventDefault(); }, { passive: false });
      btnWrap.appendChild(b);
    }
    document.body.appendChild(btnWrap);
    this._touchEls = [stick, btnWrap];
  }

  // ---- per-frame ----
  update(dt) {
    const fx = -Math.sin(this.yaw), fz = -Math.cos(this.yaw);
    const rx = Math.cos(this.yaw), rz = -Math.sin(this.yaw);
    // keyboard
    let mf = 0, mr = 0;
    if (this.keys['w']) mf += 1; if (this.keys['s']) mf -= 1;
    if (this.keys['d']) mr += 1; if (this.keys['a']) mr -= 1;
    // joystick (x = strafe, y = forward; up on stick = forward)
    mr += this.move[0]; mf += -this.move[1];
    let mx = fx * mf + rx * mr, mz = fz * mf + rz * mr;
    const ml = Math.hypot(mx, mz);
    const spd = this.speed * (this.keys['shift'] ? this.sprintMult : 1);
    const prev = [this.position[0], this.position[1], this.position[2]];
    const next = [prev[0], prev[1], prev[2]];
    if (ml > 0) { next[0] += (mx / ml) * spd * dt * Math.min(1, ml); next[2] += (mz / ml) * spd * dt * Math.min(1, ml); }

    if (this.fly) {
      if (this.keys[' ']) next[1] += spd * dt;
      if (this.keys['control'] || this.keys['c']) next[1] -= spd * dt;
    } else {
      this.velY -= this.gravity * dt;
      next[1] += this.velY * dt;
      const floor = this.groundY + this.eyeHeight;
      if (next[1] <= floor) { next[1] = floor; this.velY = 0; this.onGround = true; }
    }

    if (this.collide) {
      const c = this.collide(next, prev);
      if (Array.isArray(c) && c.length === 3) { next[0] = c[0]; next[1] = c[1]; next[2] = c[2]; }
    } else if (this.colliders && this.colliders.length) {
      this._resolveColliders(next, prev);
    }
    this.position = next;
  }

  _resolveColliders(next, prev) {
    const r = this.radius, head = next[1], feet = next[1] - this.eyeHeight;
    const hits = (x, z) => {
      for (const b of this.colliders) {
        if (x + r > b.min[0] && x - r < b.max[0] && head > b.min[1] && feet < b.max[1] &&
            z + r > b.min[2] && z - r < b.max[2]) return true;
      }
      return false;
    };
    if (hits(next[0], prev[2])) next[0] = prev[0];
    if (hits(next[0], next[2])) next[2] = prev[2];
  }

  forward() {
    const cp = Math.cos(this.pitch);
    return [-Math.sin(this.yaw) * cp, Math.sin(this.pitch), -Math.cos(this.yaw) * cp];
  }

  applyToCamera(camera) {
    camera.position.set(this.position[0], this.position[1], this.position[2]);
    if (camera.rotation) {
      camera.rotation.order = 'YXZ';
      camera.rotation.y = this.yaw; camera.rotation.x = this.pitch; camera.rotation.z = 0;
    }
  }

  dispose() {
    for (const [t, ev, fn, opt] of this._listeners) t.removeEventListener(ev, fn, opt);
    this._listeners = [];
    if (this._touchEls) for (const el of this._touchEls) el.remove();
  }
}



/* inlined: models/lowpoly-characters-3d.js */

//
// Procedural low-poly three.js model builders (characters). Each builder is
// buildX(THREE, opts) -> THREE.Group (THREE passed in; dependency-free + offline).
// Ready-made models so games use real shapes instead of bare blocks.
//

// ===== shared helpers (assume hoisted alongside builders) =====

/** Resolve opts.color (hex int OR [r,g,b] 0-1 OR 0-255) to a hex int; fall back to def. */
function _ch_resolveColor(THREE, color, def) {
  if (color == null) return def;
  if (typeof color === 'number') return color;
  if (Array.isArray(color) && color.length === 3) {
    let [r, g, b] = color;
    if (r > 1 || g > 1 || b > 1) { r /= 255; g /= 255; b /= 255; }
    return new THREE.Color(r, g, b).getHex();
  }
  if (typeof color === 'string') { try { return new THREE.Color(color).getHex(); } catch (e) { return def; } }
  return def;
}

/** Standard low-poly material: flatShading, matte, optional emissive glow. */
function _ch_mat(THREE, hex, opts) {
  opts = opts || {};
  return new THREE.MeshStandardMaterial({
    color: hex,
    flatShading: true,
    roughness: opts.roughness != null ? opts.roughness : 0.7,
    metalness: opts.metalness != null ? opts.metalness : 0.1,
    emissive: opts.emissive != null ? opts.emissive : 0x000000,
    emissiveIntensity: opts.emissiveIntensity != null ? opts.emissiveIntensity : 1,
    side: opts.side || THREE.FrontSide
  });
}

/**
 * buildRobot — blocky low-poly humanoid robot usable as a player character.
 * Parts: head (+visor +antenna), torso (+chest light), two arms, two legs.
 * opts: color (body hex/[r,g,b]), accent (limbs/trim), scale.
 */
function buildRobot(THREE, opts = {}) {
  const g = new THREE.Group();
  g.name = 'Robot';
  const body = _ch_resolveColor(THREE, opts.color, 0x5b8fb9);
  const accent = _ch_resolveColor(THREE, opts.accent, 0x2b3a4a);
  const metal = 0x9aa6b2;
  const bodyMat = _ch_mat(THREE, body, { metalness: 0.35, roughness: 0.5 });
  const accentMat = _ch_mat(THREE, accent, { metalness: 0.4, roughness: 0.5 });
  const metalMat = _ch_mat(THREE, metal, { metalness: 0.6, roughness: 0.4 });
  const eyeMat = _ch_mat(THREE, 0x66ffcc, { emissive: 0x33ffbb, emissiveIntensity: 1.4, roughness: 0.3 });

  // torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.0, 0.5), bodyMat);
  torso.name = 'torso'; torso.position.y = 1.1; g.add(torso);
  // chest light
  const chest = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.06, 8), eyeMat);
  chest.name = 'chestLight'; chest.rotation.x = Math.PI / 2;
  chest.position.set(0, 1.25, 0.27); g.add(chest);
  // pelvis
  const pelvis = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.45), accentMat);
  pelvis.name = 'pelvis'; pelvis.position.y = 0.55; g.add(pelvis);

  // head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.55, 0.55), bodyMat);
  head.name = 'head'; head.position.y = 1.95; g.add(head);
  // visor / eyes
  const visor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.16, 0.08), eyeMat);
  visor.name = 'visor'; visor.position.set(0, 2.0, 0.29); g.add(visor);
  // antenna
  const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.35, 6), metalMat);
  antenna.name = 'antenna'; antenna.position.set(0, 2.45, 0); g.add(antenna);
  const antTip = new THREE.Mesh(new THREE.IcosahedronGeometry(0.07, 0), eyeMat);
  antTip.name = 'antennaTip'; antTip.position.set(0, 2.65, 0); g.add(antTip);

  // arms (shoulder, upper, hand)
  function makeArm(dir, label) {
    const arm = new THREE.Group(); arm.name = 'arm' + label;
    const shoulder = new THREE.Mesh(new THREE.IcosahedronGeometry(0.2, 0), metalMat);
    shoulder.name = 'shoulder'; arm.add(shoulder);
    const upper = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.85, 0.24), accentMat);
    upper.name = 'upperArm'; upper.position.y = -0.5; arm.add(upper);
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.26, 0.3), metalMat);
    hand.name = 'hand'; hand.position.y = -1.0; arm.add(hand);
    arm.position.set(0.65 * dir, 1.5, 0);
    return arm;
  }
  g.add(makeArm(1, 'R'));
  g.add(makeArm(-1, 'L'));

  // legs (thigh, foot)
  function makeLeg(dir, label) {
    const leg = new THREE.Group(); leg.name = 'leg' + label;
    const thigh = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.95, 0.32), bodyMat);
    thigh.name = 'thigh'; thigh.position.y = -0.45; leg.add(thigh);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.2, 0.5), accentMat);
    foot.name = 'foot'; foot.position.set(0, -0.95, 0.08); leg.add(foot);
    leg.position.set(0.22 * dir, 0.45, 0);
    return leg;
  }
  g.add(makeLeg(1, 'R'));
  g.add(makeLeg(-1, 'L'));

  g.scale.setScalar(opts.scale != null ? opts.scale : 1);
  return g;
}

/**
 * buildDrone — hovering enemy: central core, a spinning rotor ring with blades,
 * a single forward-facing glowing eye, and underslung sensor stalks.
 * opts: color (core hex/[r,g,b]), eyeColor, scale. userData.rotor = ring group (spin it).
 */
function buildDrone(THREE, opts = {}) {
  const g = new THREE.Group();
  g.name = 'Drone';
  const core = _ch_resolveColor(THREE, opts.color, 0x3a3f4b);
  const eyeHex = _ch_resolveColor(THREE, opts.eyeColor, 0xff3b3b);
  const coreMat = _ch_mat(THREE, core, { metalness: 0.5, roughness: 0.4 });
  const trimMat = _ch_mat(THREE, 0x70757f, { metalness: 0.6, roughness: 0.35 });
  const eyeMat = _ch_mat(THREE, eyeHex, { emissive: eyeHex, emissiveIntensity: 1.6, roughness: 0.25 });

  // core body
  const body = new THREE.Mesh(new THREE.IcosahedronGeometry(0.5, 0), coreMat);
  body.name = 'core'; g.add(body);
  // top cap
  const cap = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.35, 6), coreMat);
  cap.name = 'cap'; cap.position.y = 0.45; g.add(cap);

  // glowing eye (forward = -Z)
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.16, 10, 8), eyeMat);
  eye.name = 'eye'; eye.position.set(0, 0.0, -0.45); g.add(eye);
  const brow = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.1), trimMat);
  brow.name = 'brow'; brow.position.set(0, 0.18, -0.42); g.add(brow);

  // rotor ring (spin via userData.rotor.rotation.y)
  const rotor = new THREE.Group(); rotor.name = 'rotor';
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.07, 6, 16), trimMat);

//   - undefined        -> fallback

      emissive: hex,
      emissiveIntensity: emi
    })
  );
  ring.name = 'ring';
  group.add(ring);

  // Inner gate surface: a faint translucent disc that catches the ring's glow.
  var inner = new THREE.Mesh(
    new THREE.CircleGeometry(radius - 0.1, 18),
    new THREE.MeshStandardMaterial({
      color: hex,
      emissive: hex,
      emissiveIntensity: emi * 0.5,
      transparent: true,
      opacity: 0.35,
      side: THREE.DoubleSide,
      flatShading: true,
      roughness: 0.5
    })
  );
  inner.name = 'gate';
  group.add(inner);

  // Stand the portal upright on the ground (center of ring at radius height).
  group.position.y = radius;
  return _pr_applyScale(group, opts);
}

//
// Collapsible instruction / info panel for 3D games + scenes. Starts as a normal
// titled panel (controls, how-to-play, scene blurb) but has a minimize button
// that shrinks it to a small round "i" icon in the same corner — so the panel
// never dominates the view and the player can immerse in the scene. Click the
// icon to expand again. Optional auto-collapse after a few seconds of play.
// Dependency-free (vanilla DOM + CSS), works over a WebGL canvas or anything.
//
// WHY: generated instruction panels routinely cover a third of the screen
// (real feedback on the Labyrinth-3D build). Use this for the how-to-play box;
// keep the compact score/HUD as-is.
//
// USAGE
//   import { createInfoPanel } from './info-panel.js';
//   const info = createInfoPanel({
//     title: 'Labyrinth 3D',
//     html: 'Tilt the board to roll the marble into the <b>green goal</b>. Avoid the pits!' +
//           '<div class="ip-keys">Tilt: WASD / arrows &middot; drag to orbit &middot; scroll to zoom</div>',
//     corner: 'top-left',       // top-left | top-right | bottom-left | bottom-right
//     accent: '#ffd24a',        // title + icon accent
//     autoCollapseMs: 9000,     // optional: minimize itself after 9s (0/undefined = never)
//   });
//   // info.expand() / info.collapse() / info.toggle() / info.destroy()
function createInfoPanel(opts = {}) {
  const {
    title = '',
    html = '',
    corner = 'top-left',
    accent = '#ffd24a',
    collapsed = false,
    autoCollapseMs = 0,
    icon = 'i',
    width = 340,
  } = opts;

  if (!document.getElementById('mchatai-info-panel-style')) {
    const st = document.createElement('style');
    st.id = 'mchatai-info-panel-style';
    st.textContent = `
.ip-root{position:fixed;z-index:50;font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  -webkit-user-select:none;user-select:none}
.ip-root.tl{top:16px;left:16px}.ip-root.tr{top:16px;right:16px}
.ip-root.bl{bottom:16px;left:16px}.ip-root.br{bottom:16px;right:16px}
.ip-card{max-width:88vw;background:rgba(18,22,34,.82);color:#eef2ff;border:1px solid rgba(255,255,255,.10);
  border-radius:14px;padding:14px 16px;box-shadow:0 10px 30px rgba(0,0,0,.45);backdrop-filter:blur(8px);
  transform-origin:var(--ip-origin,top left);transition:opacity .18s ease,transform .18s ease}
.ip-hide{opacity:0;transform:scale(.6);pointer-events:none}
.ip-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ip-title{font-weight:700;font-size:16px;color:var(--ip-accent,#ffd24a);flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ip-min{cursor:pointer;border:0;background:rgba(255,255,255,.10);color:#cdd6f4;width:26px;height:26px;
  border-radius:8px;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ip-min:hover{background:rgba(255,255,255,.18)}
.ip-body{color:#cdd6f4}
.ip-body .ip-keys,.ip-keys{margin-top:8px;font-size:12.5px;opacity:.85}
.ip-pill{cursor:pointer;width:38px;height:38px;border-radius:50%;background:rgba(18,22,34,.82);
  border:1px solid rgba(255,255,255,.14);color:var(--ip-accent,#ffd24a);font-weight:800;font-size:17px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.4);
  backdrop-filter:blur(8px);transition:opacity .18s ease,transform .18s ease}
.ip-pill:hover{transform:scale(1.08)}
.ip-pill.ip-hide{opacity:0;transform:scale(.4);pointer-events:none}`;
    document.head.appendChild(st);
  }

  const cmap = { 'top-left': 'tl', 'top-right': 'tr', 'bottom-left': 'bl', 'bottom-right': 'br' };
  const cls = cmap[corner] || 'tl';
  const origin = cls === 'tr' ? 'top right' : cls === 'bl' ? 'bottom left' : cls === 'br' ? 'bottom right' : 'top left';

  const root = document.createElement('div');
  root.className = 'ip-root ' + cls;

  const card = document.createElement('div');
  card.className = 'ip-card';
  card.style.setProperty('--ip-origin', origin);
  card.style.setProperty('--ip-accent', accent);
  card.style.width = width + 'px';
  card.innerHTML =
    `<div class="ip-head"><div class="ip-title">${title}</div>` +
    `<button class="ip-min" title="Minimize" aria-label="Minimize">&#8211;</button></div>` +
    `<div class="ip-body">${html}</div>`;

  const pill = document.createElement('button');
  pill.className = 'ip-pill ip-hide';
  pill.title = 'Show info';
  pill.setAttribute('aria-label', 'Show info');
  pill.textContent = icon;
  pill.style.setProperty('--ip-accent', accent);

  root.appendChild(card);
  root.appendChild(pill);
  (document.body || document.documentElement).appendChild(root);

  let timer = null;
  function expand() {
    card.classList.remove('ip-hide');
    pill.classList.add('ip-hide');
  }
  function collapse() {
    card.classList.add('ip-hide');
    pill.classList.remove('ip-hide');
    if (timer) { clearTimeout(timer); timer = null; }
  }
  function toggle() { (card.classList.contains('ip-hide') ? expand : collapse)(); }

  card.querySelector('.ip-min').addEventListener('click', collapse);
  pill.addEventListener('click', expand);

  if (collapsed) collapse();
  else if (autoCollapseMs > 0) timer = setTimeout(collapse, autoCollapseMs);

  return {
    el: root,
    expand, collapse, toggle,
    destroy() { if (timer) clearTimeout(timer); root.remove(); },
  };
}

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e18);
scene.fog = new THREE.Fog(0x0a0e18, 22, 60);
const camera = new THREE.PerspectiveCamera(72, 1, 0.1, 200);
function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
addEventListener('resize', resize); resize();

scene.add(new THREE.HemisphereLight(0x9fc4ff, 0x222a3a, 0.9));
const sun = new THREE.DirectionalLight(0xffffff, 1.1); sun.position.set(8,16,6); scene.add(sun);

// ---- arena: floor + 4 walls (walls become FPS colliders) ----
const ARENA = 26, WALL_H = 4;
const floor = new THREE.Mesh(new THREE.PlaneGeometry(ARENA*2, ARENA*2),
  new THREE.MeshStandardMaterial({ color:0x1b2333, roughness:.95 }));
floor.rotation.x = -Math.PI/2; scene.add(floor);
const grid = new THREE.GridHelper(ARENA*2, 26, 0x2a3550, 0x202a40); grid.position.y=.02; scene.add(grid);
const colliders = [];
function addWall(x,z,sx,sz){
  const m = new THREE.Mesh(new THREE.BoxGeometry(sx,WALL_H,sz), new THREE.MeshStandardMaterial({color:0x2b3650,roughness:.8,flatShading:true}));
  m.position.set(x,WALL_H/2,z); scene.add(m);
  colliders.push({min:[x-sx/2,0,z-sz/2], max:[x+sx/2,WALL_H,z+sz/2]});
}
addWall(0,-ARENA,ARENA*2,1); addWall(0,ARENA,ARENA*2,1); addWall(-ARENA,0,1,ARENA*2); addWall(ARENA,0,1,ARENA*2);
// scatter cover props (also colliders)
const rng=(()=>{let s=7;return()=>{s=(s*1664525+1013904223)&0x7fffffff;return s/0x7fffffff;};})();
for(let i=0;i<14;i++){
  const x=(rng()-.5)*ARENA*1.6, z=(rng()-.5)*ARENA*1.6;
  if(Math.hypot(x,z)<5) continue;
  const pick=rng(); let g, r;
  if(pick<.4){ g=buildCrate(THREE,{scale:1.1}); r=1.1; }
  else if(pick<.7){ g=buildBarrel(THREE,{scale:1.0}); r=.7; }
  else { g=buildTree(THREE,{scale:1.4}); r=.8; }
  g.position.set(x,0,z); scene.add(g);
  if(pick>=.4 && pick<.7 || pick<.4) colliders.push({min:[x-r,0,z-r],max:[x+r,2.2,z+r]});
}

// ---- player (drag-look fps controller, NO pointer lock; touch ready) ----
const player = { hp:100, score:0, wave:1, dead:false };
const fps = new FPSController(canvas, {
  position:[0,1.7,ARENA-4], eyeHeight:1.7, speed:6.2, colliders, radius:0.4,
  actions:[{id:'shoot',label:'FIRE'}],
  onAction:(id)=>{ if(id==='shoot') shoot(); },
});

// ---- enemies (real drone models that chase + attack) ----
const enemies = [];
function spawnWave(n){
  for(let i=0;i<n;i++){
    const a=rng()*Math.PI*2, d=ARENA*0.7;
    const g=buildDrone(THREE,{ color:[0xff*0.9|0, 0x40, 0x60], scale:1.0 });
    g.position.set(Math.cos(a)*d, 1.4, Math.sin(a)*d);
    scene.add(g);
    enemies.push({ g, hp:30+player.wave*6, speed:2.2+player.wave*0.25, t:rng()*6, atk:0 });
  }
}
spawnWave(4);

// ---- shooting (raycast forward, hit nearest drone) ----
const ray = new THREE.Raycaster();
const muzzle = new THREE.PointLight(0x9fe9ff, 0, 8); scene.add(muzzle);
let lastShot=0;
function shoot(){
  const now=performance.now();
  if(player.dead || now-lastShot<140) return; lastShot=now;
  muzzle.position.copy(camera.position); muzzle.intensity=3; setTimeout(()=>muzzle.intensity=0,60);
  shake(0.4);
  const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
  ray.set(camera.position, dir);
  let best=null, bestD=200;
  for(const e of enemies){
    const hit=ray.ray.distanceToPoint(e.g.position);
    const along=e.g.position.clone().sub(camera.position).dot(dir);
    if(hit<1.1 && along>0 && along<bestD){ best=e; bestD=along; }
  }
  if(best){
    best.hp-=18; flash(best.g);
    burst(best.g.position, [0.7,0.95,1]);
    if(best.hp<=0){ kill(best); }
  }
}
function kill(e){
  burst(e.g.position,[1,0.6,0.3],18); scene.remove(e.g);
  enemies.splice(enemies.indexOf(e),1); player.score+=100; setHud();
  if(enemies.length===0){ player.wave++; showMsg('Wave '+player.wave); setHud(); setTimeout(()=>spawnWave(3+player.wave),900); }
}

// ---- juice: particles + flash + screen shake ----
const parts=[]; const pGeo=new THREE.SphereGeometry(0.08,5,4);
function burst(pos,col,n=10){
  for(let i=0;i<n;i++){
    const m=new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({color:new THREE.Color(col[0],col[1],col[2])}));
    m.position.copy(pos); scene.add(m);
    parts.push({m, v:new THREE.Vector3((rng()-.5)*6,rng()*5,(rng()-.5)*6), life:.5});
  }
}
function flash(g){ g.traverse(o=>{ if(o.material&&o.material.emissive){ o.material.emissive.setRGB(1,1,1); setTimeout(()=>o.material.emissive.setRGB(0,0,0),90);} }); }
let shakeAmt=0; function shake(a){ shakeAmt=Math.min(1,shakeAmt+a); }

// ---- HUD ----
const elWave=document.getElementById('wave'), elScore=document.getElementById('score'), elHp=document.getElementById('hpf');
function setHud(){ elWave.textContent=player.wave; elScore.textContent=player.score; elHp.style.width=Math.max(0,player.hp)+'%'; }
const msgEl=document.getElementById('msg'); let msgT=0;
function showMsg(t){ msgEl.textContent=t; msgEl.style.opacity=1; msgT=performance.now()+1100; }
createInfoPanel({ title:'Drone Arena', accent:'#46e0ff', autoCollapseMs:9000,
  html:'Survive the drone waves.<div class="ip-keys">Drag to look &middot; WASD / stick to move &middot; tap / click / Space / FIRE to shoot</div>' });

// ---- game over / restart ----
const over=document.getElementById('over');
document.getElementById('restart').onclick=()=>location.reload();
function gameOver(){ player.dead=true; document.getElementById('overSub').textContent='You reached wave '+player.wave+' with '+player.score+' points.'; over.style.display='flex'; }

// ---- loop ----
let prev=performance.now();
function frame(now){
  const dt=Math.min(.05,(now-prev)/1000); prev=now;
  fps.update(dt); fps.applyToCamera(camera);
  // screen shake offset
  if(shakeAmt>0){ camera.position.x+=(rng()-.5)*shakeAmt*.3; camera.position.y+=(rng()-.5)*shakeAmt*.3; shakeAmt*=.86; if(shakeAmt<.02)shakeAmt=0; }
  // enemies chase + attack
  const pp=fps.position;
  for(const e of enemies){
    e.t+=dt; e.g.rotation.y+=dt*2;
    const dx=pp[0]-e.g.position.x, dz=pp[2]-e.g.position.z, d=Math.hypot(dx,dz)||1;
    if(d>1.8){ e.g.position.x+=dx/d*e.speed*dt; e.g.position.z+=dz/d*e.speed*dt; }
    e.g.position.y=1.4+Math.sin(e.t*3)*.25;
    e.atk-=dt;
    if(d<2.4 && e.atk<=0 && !player.dead){ e.atk=1.1; player.hp-=8; shake(.5); setHud(); if(player.hp<=0) gameOver(); }
  }
  // particles
  for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.life-=dt; p.v.y-=9*dt; p.m.position.addScaledVector(p.v,dt); if(p.life<=0){ scene.remove(p.m); parts.splice(i,1);} }
  if(msgT && now>msgT){ msgEl.style.opacity=0; msgT=0; }
  renderer.render(scene,camera);
  requestAnimationFrame(frame);
}
setHud();
requestAnimationFrame(frame);

// self-test hook for automated QA (harmless in normal play)
window.__arena = { enemies, player, shoot, fps };
</script>
