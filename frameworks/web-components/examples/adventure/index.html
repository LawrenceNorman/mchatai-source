<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Adventure Lego Assembly</title>
    <link rel="stylesheet" href="./adventure.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.adventure-maze",
        "components": [
          "core.game-manager",
          "entities.grid-board",
          "entities.grid-mover",
          "entities.ai-pathfinder",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Atari Adventure",
        "brandedAs": "Adventure"
      }
    </script>
  </head>
  <body>
    <main class="adventure-shell" data-adventure-app>
      <section class="hero">
        <p class="eyebrow">Atari Adventure clone assembled from Lego blocks</p>
        <h1>Adventure</h1>
        <p class="brief">Find the key, unlock the gate, dodge the dragon, and carry the treasure home.</p>
      </section>

      <section class="quest" aria-label="Adventure game">
        <div class="hud">
          <div id="scoreboard"></div>
          <div class="hud-card">Room <strong id="roomName">Keep</strong></div>
          <div class="hud-card">Item <strong id="inventory">None</strong></div>
          <button id="restartButton" type="button">Restart</button>
        </div>
        <canvas id="adventureCanvas" width="560" height="420" aria-label="Adventure room"></canvas>
        <p id="message" class="message" role="status" aria-live="polite">Arrow keys or WASD to move room to room.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
