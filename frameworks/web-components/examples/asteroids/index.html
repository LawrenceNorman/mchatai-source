<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asteroids Lego Assembly</title>
  <link rel="stylesheet" href="./asteroids.css">
</head>
<body>
  <main class="asteroids-shell" data-web-component-example="asteroids">
    <header class="asteroids-topbar">
      <div id="hudMount"></div>
      <div id="metaMount" class="asteroids-meta"></div>
    </header>

    <section class="asteroids-stage">
      <canvas
        id="gameCanvas"
        width="900"
        height="600"
        aria-label="Asteroids game playfield"
      ></canvas>
      <div id="messageMount" class="asteroids-message is-hidden" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
  <script type="application/json" id="mchatai-web-components-used">
  {"recipe":"recipe.arcade-top-down","components":["core.game-manager","core.physics2d","entities.asteroid","entities.space-ship","ui.scoreboard","resources.swatches"],"mode":"module-imports"}
  </script>
</body>
</html>
