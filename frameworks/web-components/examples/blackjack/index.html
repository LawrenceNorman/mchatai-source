<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blackjack Lego Assembly</title>
    <link rel="stylesheet" href="./blackjack.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.blackjack",
        "components": [
          "ui.mini-header",
          "core.turn-based-manager",
          "entities.card",
          "entities.deck",
          "entities.blackjack-rules",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Blackjack",
        "brandedAs": "Blackjack"
      }
    </script>
  </head>
  <body>
    <main class="blackjack-shell" data-blackjack-app>
      <header data-mini-header aria-label="App header"></header>

      <section class="table" aria-label="Blackjack table">
        <div class="hud">
          <div id="scoreboard"></div>
          <div class="hud-card">Bet <strong id="bet">10</strong></div>
          <div class="hud-card">Deck <strong id="deckCount">52</strong></div>
          <div class="hud-card">Phase <strong id="phase">Deal</strong></div>
        </div>

        <div class="hand-zone dealer-zone">
          <div class="hand-header">
            <h2>Dealer</h2>
            <span id="dealerTotal">?</span>
          </div>
          <div class="cards" id="dealerCards"></div>
        </div>

        <div class="hand-zone player-zone">
          <div class="hand-header">
            <h2>Player</h2>
            <span id="playerTotal">0</span>
          </div>
          <div class="cards" id="playerCards"></div>
        </div>

        <p class="message" id="message" role="status" aria-live="polite">Deal a hand to start.</p>
        <div class="actions">
          <button id="dealButton" type="button">Deal</button>
          <button id="hitButton" type="button">Hit</button>
          <button id="standButton" type="button">Stand</button>
          <button id="doubleButton" type="button">Double</button>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
