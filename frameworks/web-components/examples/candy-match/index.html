<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Candy Match Lego Assembly</title>
    <link rel="stylesheet" href="./candy-match.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.match3",
        "components": [
          "core.turn-based-manager",
          "entities.grid-board",
          "entities.tile-swapper",
          "entities.match3-logic",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Bejeweled / Candy Crush-style match-three",
        "brandedAs": "Candy Match"
      }
    </script>
  </head>
  <body>
    <main class="candy-shell" data-candy-app>
      <section class="hero">
        <p class="eyebrow">Match-three clone assembled from Lego blocks</p>
        <h1>Candy Match</h1>
        <p class="brief">Swap adjacent candies. Match three or more to cascade combos and beat your best score.</p>
      </section>

      <section class="stage-panel" aria-label="Candy Match game">
        <div class="hud">
          <div id="scoreboard"></div>
          <div class="hud-card">Moves <strong id="moves">24</strong></div>
          <div class="hud-card">Combo <strong id="combo">x1</strong></div>
          <div class="hud-card">Cleared <strong id="cleared">0</strong></div>
        </div>

        <div id="board" class="candy-board" role="grid" aria-label="Candy grid"></div>
        <p id="message" class="message" role="status" aria-live="polite">Pick a candy, then an adjacent candy.</p>

        <div class="actions">
          <button id="shuffleButton" type="button">Shuffle</button>
          <button id="newGameButton" type="button">New Board</button>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
