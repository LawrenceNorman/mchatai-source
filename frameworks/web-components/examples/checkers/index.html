<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkers Lego Assembly</title>
    <link rel="stylesheet" href="./checkers.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.checkers",
        "components": [
          "core.turn-based-manager",
          "entities.grid-board",
          "entities.board8x8",
          "entities.checkers-rules",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Checkers / Draughts",
        "brandedAs": "Checkers"
      }
    </script>
  </head>
  <body>
    <main class="checkers-shell" data-checkers-app>
      <section class="hero">
        <p class="eyebrow">Checkers clone assembled from Lego blocks</p>
        <h1>Checkers</h1>
        <p class="brief">Select a piece, then a highlighted diagonal move. Captures remove pieces and back-rank moves crown kings.</p>
      </section>

      <section class="stage-panel" aria-label="Checkers game">
        <div class="hud">
          <div class="hud-card">Turn <strong id="turn">Red</strong></div>
          <div class="hud-card">Moves <strong id="moves">0</strong></div>
          <div class="hud-card">Captured <strong id="captured">0</strong></div>
          <button id="resetButton" type="button">Reset Board</button>
        </div>
        <div id="board" class="board" role="grid" aria-label="Checkers board"></div>
        <p id="message" class="message" role="status" aria-live="polite">Red to move.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
