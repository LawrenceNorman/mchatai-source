<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess Lego Assembly</title>
    <link rel="stylesheet" href="./chess.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.chess",
        "components": [
          "ui.mini-header",
          "core.turn-based-manager",
          "entities.board8x8",
          "entities.chess-rules",
          "entities.chess-ai",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "standard playable Chess vs AI",
        "brandedAs": "Chess"
      }
    </script>
  </head>
  <body>
    <main class="chess-shell" data-chess-app>
      <header data-mini-header aria-label="App header"></header>

      <section class="stage-panel" aria-label="Chess game">
        <div class="hud">
          <div class="hud-card">Turn <strong id="turn">White</strong></div>
          <div class="hud-card">Moves <strong id="moves">0</strong></div>
          <div class="hud-card">Captured <strong id="captured">0</strong></div>
          <button id="resetButton" type="button">Reset Board</button>
        </div>
        <div id="board" class="board" role="grid" aria-label="Chess board"></div>
        <p id="message" class="message" role="status" aria-live="polite">White to move.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
