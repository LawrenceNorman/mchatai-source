<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Crossword Lego Assembly</title>
    <link rel="stylesheet" href="./crossword.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.crossword",
        "components": [
          "ui.mini-header",
          "core.turn-based-manager",
          "entities.grid-board",
          "ui.keyboard-input",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "NYT Mini Crossword",
        "brandedAs": "Mini Crossword"
      }
    </script>
  </head>
  <body>
    <main class="crossword-shell" data-crossword-app>
      <header data-mini-header aria-label="App header"></header>

      <section class="puzzle">
        <div class="hud">
          <div id="scoreboard"></div>
          <div class="hud-card">Timer <strong id="timer">0:00</strong></div>
          <button id="checkButton" type="button">Check</button>
          <button id="restartButton" type="button">Reset</button>
        </div>
        <div class="puzzle-layout">
          <div id="grid" class="crossword-grid" aria-label="Crossword grid"></div>
          <div class="clues">
            <section>
              <h2>Across</h2>
              <ol id="acrossClues"></ol>
            </section>
            <section>
              <h2>Down</h2>
              <ol id="downClues"></ol>
            </section>
          </div>
        </div>
        <p id="message" class="message" role="status" aria-live="polite">Click a cell and type.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
