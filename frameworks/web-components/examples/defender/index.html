<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Defender Lego Assembly</title>
    <link rel="stylesheet" href="./defender.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.defender",
        "components": [
          "core.game-manager",
          "core.physics2d",
          "entities.entity",
          "entities.projectile",
          "entities.camera-follow",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Defender",
        "brandedAs": "Stellar Defender"
      }
    </script>
  </head>
  <body>
    <main class="defender-shell" data-defender-app>
      <section class="hero">
        <p class="eyebrow">Defender clone assembled from Lego blocks</p>
        <h1>Stellar Defender</h1>
        <p class="brief">Patrol the horizon, rescue humans, and destroy abductors before they escape.</p>
      </section>

      <section class="battle" aria-label="Defender game">
        <div class="hud">
          <div id="scoreboard"></div>
          <div class="hud-card">Lives <strong id="lives">3</strong></div>
          <div class="hud-card">Humans <strong id="humans">5</strong></div>
          <div class="hud-card">Wave <strong id="wave">1</strong></div>
          <button id="restartButton" type="button">Restart</button>
        </div>
        <canvas id="defenderCanvas" width="820" height="460" aria-label="Defender playfield"></canvas>
        <p id="message" class="message" role="status" aria-live="polite">Arrow keys or WASD to fly. Space to fire.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
