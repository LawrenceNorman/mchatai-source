<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#7dd3fc">
  <title>Flappy — Lego Assembly</title>
  <link rel="stylesheet" href="./flappy-tap-to-flap.css">
</head>
<body>
  <main class="flappy-shell" data-web-component-example="flappy-tap-to-flap">
    <header class="flappy-topbar">
      <div id="hudMount"></div>
      <div id="metaMount" class="flappy-meta"></div>
    </header>

    <section class="flappy-stage">
      <canvas
        id="gameCanvas"
        width="360"
        height="640"
        aria-label="Flappy game playfield"
      ></canvas>
      <div id="messageMount" class="flappy-message is-hidden" aria-live="polite"></div>
    </section>

    <p class="flappy-hint">Tap the screen or press Space to flap.</p>
  </main>

  <script type="module" src="./main.js"></script>
  <script type="application/json" id="mchatai-web-components-used">
  {"recipe":"recipe.flappy","components":["entities.flappy-bird","ui.scoreboard","resources.swatches"],"mode":"module-imports"}
  </script>
</body>
</html>
