<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Frogger Lego Assembly</title>
    <link rel="stylesheet" href="./frogger.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.arcade-grid",
        "components": [
          "core.game-manager",
          "entities.grid-board",
          "entities.grid-mover",
          "entities.path-follower",
          "ui.scoreboard",
          "ui.virtual-joystick",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Frogger",
        "brandedAs": "Frogger Clone"
      }
    </script>
  </head>
  <body>
    <main class="frogger-shell" data-frogger-app>
      <section class="frogger-hero">
        <p class="eyebrow">Frogger clone assembled from Lego blocks</p>
        <h1>Frogger Crossing</h1>
        <p class="brief">Hop through traffic, ride logs across the river, and reach all five home pads.</p>
      </section>

      <section class="frogger-stage-wrap" aria-label="Frogger game">
        <div class="frogger-hud">
          <div id="scoreboard"></div>
          <div class="hud-pill">Lives <strong id="lives">3</strong></div>
          <div class="hud-pill">Homes <strong id="homes">0/5</strong></div>
        </div>
        <canvas id="froggerCanvas" width="720" height="720" aria-label="Frogger playfield"></canvas>
        <div id="message" class="frogger-message" role="status" aria-live="polite">Arrow keys or swipe pad to hop.</div>
        <div id="joystickMount" class="joystick-mount" aria-label="Touch controls"></div>
        <div class="actions">
          <button id="restartButton" type="button">Restart</button>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
