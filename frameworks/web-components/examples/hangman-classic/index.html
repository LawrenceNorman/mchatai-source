<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Hangman — Lego Assembly</title>
  <link rel="stylesheet" href="./hangman-classic.css">
</head>
<body>
  <main class="hangman-shell" data-web-component-example="hangman-classic">
    <header class="hangman-topbar">
      <div id="hudMount"></div>
      <div id="metaMount" class="hangman-meta"></div>
    </header>

    <section class="hangman-stage">
      <canvas id="gallowsCanvas" width="240" height="240" aria-label="Hangman gallows"></canvas>
      <div id="wordMount" class="hangman-word" aria-label="Secret word"></div>
      <div id="messageMount" class="hangman-message is-hidden" aria-live="polite"></div>
    </section>

    <section id="keyboardMount" class="hangman-keyboard" aria-label="Letter keyboard"></section>

    <button type="button" id="restartBtn" class="restart-btn">New Round</button>
  </main>

  <script type="module" src="./main.js"></script>
  <script type="application/json" id="mchatai-web-components-used">
  {"recipe":"recipe.hangman","components":["entities.hangman-game","ui.scoreboard","resources.swatches"],"mode":"module-imports"}
  </script>
</body>
</html>
