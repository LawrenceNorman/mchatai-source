<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mastermind Lego Assembly</title>
    <link rel="stylesheet" href="./mastermind.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.mastermind",
        "components": [
          "core.turn-based-manager",
          "entities.grid-board",
          "entities.mastermind-logic",
          "ui.keyboard-input",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Mastermind",
        "brandedAs": "Mastermind"
      }
    </script>
  </head>
  <body>
    <main class="mastermind-shell" data-mastermind-app>
      <section class="hero">
        <p class="eyebrow">Mastermind clone assembled from Lego blocks</p>
        <h1>Codebreaker</h1>
        <p class="brief">Crack the hidden four-color code in ten turns. Black pegs are exact, white pegs are right color wrong slot.</p>
      </section>

      <section class="game-panel" aria-label="Mastermind code breaker">
        <div class="hud">
          <div id="scoreboard"></div>
          <div class="hud-card">Turn <strong id="turn">1/10</strong></div>
          <div class="hud-card">Exact <strong id="exact">0</strong></div>
          <div class="hud-card">Color <strong id="colorOnly">0</strong></div>
        </div>

        <div class="secret-row" id="secretRow" aria-label="Hidden code"></div>
        <div class="board" id="board" aria-label="Guess history"></div>
        <div class="current-guess" id="currentGuess" aria-label="Current guess"></div>

        <div class="palette" id="palette" aria-label="Color choices"></div>
        <div class="actions">
          <button id="submitButton" type="button">Submit Guess</button>
          <button id="deleteButton" type="button">Delete</button>
          <button id="newButton" type="button">New Code</button>
        </div>
        <p class="message" id="message" role="status" aria-live="polite">Pick four colors, then submit.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
