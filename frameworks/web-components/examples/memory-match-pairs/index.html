<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1e1b4b">
  <title>Memory Match — Lego Assembly</title>
  <link rel="stylesheet" href="./memory-match-pairs.css">
</head>
<body>
  <main class="memory-shell" data-web-component-example="memory-match-pairs">
    <header class="memory-topbar">
      <div id="hudMount"></div>
      <div id="metaMount" class="memory-meta"></div>
    </header>

    <section class="memory-difficulty" aria-label="Difficulty">
      <button type="button" class="pill" data-difficulty="easy">3×4</button>
      <button type="button" class="pill active" data-difficulty="medium">4×4</button>
      <button type="button" class="pill" data-difficulty="hard">5×4</button>
    </section>

    <section class="memory-stage">
      <div id="boardMount" class="memory-board" role="grid" aria-label="Memory match cards"></div>
      <div id="messageMount" class="memory-message is-hidden" aria-live="polite"></div>
    </section>

    <button type="button" id="restartBtn" class="action-btn">New Game</button>
  </main>

  <script type="module" src="./main.js"></script>
  <script type="application/json" id="mchatai-web-components-used">
  {"recipe":"recipe.memory-match","components":["entities.memory-match-board","ui.scoreboard","resources.swatches"],"mode":"module-imports"}
  </script>
</body>
</html>
