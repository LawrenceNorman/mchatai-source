<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minesweeper 99 - Lego Assembly</title>
    <link rel="stylesheet" href="./minesweeper.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.minesweeper",
        "components": [
          "core.turn-based-manager",
          "entities.grid-board",
          "entities.reveal-logic",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Minesweeper",
        "brandedAs": "Minesweeper 99"
      }
    </script>
  </head>
  <body>
    <main class="mine-shell" data-app>
      <section class="hero-panel">
        <p class="eyebrow">Minesweeper clone assembled from Lego blocks</p>
        <h1>Minesweeper 99</h1>
        <p class="brief">Reveal safe cells, flag hidden mines, and clear the board without detonating the field.</p>
      </section>

      <section class="game-panel" aria-label="Minesweeper 99 game">
        <div class="hud-row">
          <div id="scoreboard"></div>
          <div class="stat-card"><span>Time</span><strong id="timer">0</strong></div>
          <div class="stat-card"><span>Mines</span><strong id="minesLeft">10</strong></div>
          <div class="stat-card"><span>Mode</span><strong id="modeLabel">Reveal</strong></div>
        </div>

        <div id="message" class="message" role="status" aria-live="polite">Reveal a cell to start. Right-click or use Flag Mode to mark mines.</div>
        <div id="board" class="mine-board" aria-label="Minesweeper grid"></div>

        <div class="actions">
          <button id="flagModeButton" type="button">Flag Mode</button>
          <button id="newGameButton" type="button">New Game</button>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
