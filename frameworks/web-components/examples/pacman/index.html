<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pac-Man Lego Assembly</title>
    <link rel="stylesheet" href="./pacman.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.maze-arcade",
        "components": [
          "core.game-manager",
          "entities.grid-board",
          "entities.grid-mover",
          "entities.ai-pathfinder",
          "ui.scoreboard",
          "ui.virtual-joystick",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Pac-Man",
        "brandedAs": "Pac-Man"
      }
    </script>
  </head>
  <body>
    <main class="pacman-shell" data-pacman-app>
      <section class="hero">
        <p class="eyebrow">Pac-Man clone assembled from Lego blocks</p>
        <h1>Pac-Man</h1>
        <p class="brief">Eat pellets, dodge ghosts, and use power pellets to turn the maze around.</p>
      </section>

      <section class="cabinet" aria-label="Pac-Man maze">
        <div class="hud">
          <div id="scoreboard"></div>
          <div class="hud-card">Lives <strong id="lives">3</strong></div>
          <div class="hud-card">Pellets <strong id="pelletsLeft">0</strong></div>
          <button id="restartButton" type="button">Restart</button>
        </div>
        <canvas id="mazeCanvas" width="560" height="620" aria-label="Maze game board"></canvas>
        <div id="joystickMount" class="joystick-mount" aria-label="Touch controls"></div>
        <p class="message" id="message" role="status" aria-live="polite">Arrow keys, WASD, or joystick to move.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
