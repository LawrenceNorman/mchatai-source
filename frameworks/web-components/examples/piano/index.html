<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Piano Lego Assembly</title>
    <link rel="stylesheet" href="./piano.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.music",
        "components": [
          "ui.mini-header",
          "ui.piano-keyboard",
          "ui.keyboard-input",
          "resources.audio-manager",
          "resources.swatches"
        ],
        "mode": "module-imports",
        "cloneTarget": "Piano Keyboard",
        "brandedAs": "Piano"
      }
    </script>
  </head>
  <body>
    <main class="piano-shell" data-piano-app>
      <header data-mini-header aria-label="App header"></header>

      <section class="studio" aria-label="Playable piano">
        <div class="hud">
          <div class="hud-card">Current <strong id="currentNote">Ready</strong></div>
          <div class="hud-card">Shortcut <strong id="currentKey">A-K</strong></div>
          <div class="hud-card">Notes <strong id="noteCount">0</strong></div>
        </div>

        <div id="pianoMount" class="piano-mount" aria-label="Piano keys"></div>

        <div class="controls" aria-label="Piano controls">
          <button id="playScaleButton" type="button">Play Scale</button>
          <button id="clearButton" type="button">Clear Trail</button>
        </div>

        <ol id="noteTrail" class="note-trail" aria-label="Recent notes"></ol>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
