<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Platformer Lego Assembly</title>
    <link rel="stylesheet" href="./platformer.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.platformer",
        "components": [
          "core.game-manager",
          "core.physics2d",
          "entities.grid-board",
          "entities.platformer-player",
          "entities.camera-follow",
          "ui.scoreboard",
          "ui.virtual-joystick",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Mario-style Platformer",
        "brandedAs": "Plumber Platformer"
      }
    </script>
  </head>
  <body>
    <main class="platformer-shell" data-platformer-app>
      <section class="hero">
        <p class="eyebrow">Platformer clone assembled from Lego blocks</p>
        <h1>Plumber Run</h1>
        <p class="brief">Run, jump, collect coins, and dodge hazards across a side-scrolling stage.</p>
      </section>

      <section class="stage" aria-label="Platformer stage">
        <div class="hud">
          <div id="scoreboard"></div>
          <div class="hud-card">Lives <strong id="lives">3</strong></div>
          <div class="hud-card">Coins <strong id="coins">0</strong></div>
          <button id="restartButton" type="button">Restart</button>
        </div>
        <canvas id="stageCanvas" width="760" height="430" aria-label="Platformer game board"></canvas>
        <div id="joystickMount" class="joystick-mount" aria-label="Touch controls"></div>
        <p id="message" class="message" role="status" aria-live="polite">Arrow keys or WASD to run. Space to jump.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
