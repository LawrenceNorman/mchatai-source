<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Focus Tomato — Pomodoro Lego Assembly</title>
    <link rel="stylesheet" href="./focus-tomato.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.pomodoro-timer",
        "components": [
          "ui.timer-ring",
          "ui.button",
          "ui.list-item",
          "ui.empty-state"
        ],
        "mode": "module-imports",
        "cloneTarget": "Pomodoro Timer",
        "brandedAs": "Focus Tomato"
      }
    </script>
  </head>
  <body>
    <main class="ft" data-app>
      <header class="ft__header">
        <h1 class="ft__title">Focus Tomato</h1>
        <p class="ft__subtitle"><span data-today>0</span> completed today</p>
      </header>

      <section class="ft__ring" data-ring-slot></section>

      <section class="ft__controls" data-controls></section>

      <section class="ft__history">
        <h2 class="ft__history-title">Today</h2>
        <ul class="ft__history-list" data-history></ul>
        <div class="ft__empty" data-empty-slot></div>
      </section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
