<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pong Lego Assembly</title>
    <link rel="stylesheet" href="./pong.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.pong",
        "components": [
          "ui.mini-header",
          "core.game-manager",
          "core.physics2d",
          "entities.paddle",
          "entities.ball",
          "entities.pong-ai",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Pong vs AI",
        "brandedAs": "Pong"
      }
    </script>
  </head>
  <body>
    <main class="pong-shell" data-pong-app>
      <header data-mini-header aria-label="App header"></header>

      <section class="stage-panel" aria-label="Pong game">
        <div class="hud">
          <div id="scoreboard"></div>
          <div class="hud-card">Player <strong id="playerScore">0</strong></div>
          <div class="hud-card">CPU <strong id="cpuScore">0</strong></div>
          <div class="hud-card">Round <strong id="round">1</strong></div>
        </div>
        <canvas id="pongCanvas" width="840" height="520" aria-label="Pong playfield"></canvas>
        <p id="message" class="message" role="status" aria-live="polite">Press Space or tap Serve.</p>
        <div class="actions">
          <button id="serveButton" type="button">Serve</button>
          <button id="resetButton" type="button">Reset Match</button>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
