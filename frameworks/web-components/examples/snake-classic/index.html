<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <title>Snake — Lego Assembly</title>
  <link rel="stylesheet" href="./snake-classic.css">
</head>
<body>
  <main class="snake-shell" data-web-component-example="snake-classic">
    <header class="snake-topbar">
      <div id="hudMount"></div>
      <div id="metaMount" class="snake-meta"></div>
    </header>

    <section class="snake-stage">
      <canvas
        id="gameCanvas"
        width="360"
        height="360"
        aria-label="Snake game playfield"
      ></canvas>
      <div id="messageMount" class="snake-message is-hidden" aria-live="polite"></div>
    </section>

    <section class="snake-controls" aria-label="On-screen direction pad">
      <button type="button" class="dpad up"    data-dir="up"    aria-label="Move up">▲</button>
      <button type="button" class="dpad left"  data-dir="left"  aria-label="Move left">◀</button>
      <button type="button" class="dpad right" data-dir="right" aria-label="Move right">▶</button>
      <button type="button" class="dpad down"  data-dir="down"  aria-label="Move down">▼</button>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
  <script type="application/json" id="mchatai-web-components-used">
  {"recipe":"recipe.snake","components":["entities.snake-game","ui.scoreboard","resources.swatches"],"mode":"module-imports"}
  </script>
</body>
</html>
