<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#14532d">
  <title>Solitaire — Lego Assembly</title>
  <link rel="stylesheet" href="./solitaire-klondike.css">
</head>
<body>
  <main class="solitaire-shell" data-web-component-example="solitaire-klondike">
    <header class="solitaire-topbar">
      <div id="hudMount"></div>
      <div id="metaMount" class="solitaire-meta"></div>
    </header>

    <section class="solitaire-stage">
      <div class="solitaire-top-row">
        <div class="stock-waste">
          <div class="card-slot stock" id="stockMount" aria-label="Stock pile"></div>
          <div class="card-slot waste" id="wasteMount" aria-label="Waste pile"></div>
        </div>
        <div class="foundations" id="foundationsMount" aria-label="Foundations"></div>
      </div>
      <div class="tableau" id="tableauMount" aria-label="Tableau columns"></div>
      <div id="messageMount" class="solitaire-message is-hidden" aria-live="polite"></div>
    </section>

    <section class="solitaire-actions">
      <button type="button" id="newDealBtn" class="action-btn">New Deal</button>
      <button type="button" id="undoBtn" class="action-btn secondary">Undo</button>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
  <script type="application/json" id="mchatai-web-components-used">
  {"recipe":"recipe.solitaire","components":["entities.solitaire-klondike","ui.scoreboard","resources.swatches"],"mode":"module-imports"}
  </script>
</body>
</html>
