<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Squaredle — Lego Assembly</title>
  <link rel="stylesheet" href="./squaredle-word-trace.css">
</head>
<body>
  <main class="squaredle-shell" data-web-component-example="squaredle-word-trace">
    <header class="squaredle-topbar">
      <div id="hudMount"></div>
      <div id="metaMount" class="squaredle-meta"></div>
    </header>

    <section class="squaredle-current">
      <div id="currentWordMount" class="current-word">(drag to trace)</div>
    </section>

    <section class="squaredle-stage">
      <div id="boardMount" class="squaredle-board" role="grid" aria-label="Letter grid"></div>
      <div id="messageMount" class="squaredle-message is-hidden" aria-live="polite"></div>
    </section>

    <section class="squaredle-found">
      <h3 class="found-title">Found</h3>
      <div id="foundMount" class="found-list"></div>
    </section>

    <button type="button" id="restartBtn" class="action-btn">New Puzzle</button>
  </main>

  <script type="module" src="./main.js"></script>
  <script type="application/json" id="mchatai-web-components-used">
  {"recipe":"recipe.word-trace","components":["entities.word-trace-grid","ui.scoreboard","resources.swatches"],"mode":"module-imports"}
  </script>
</body>
</html>
