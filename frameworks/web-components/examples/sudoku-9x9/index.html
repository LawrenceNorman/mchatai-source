<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Sudoku — Lego Assembly</title>
  <link rel="stylesheet" href="./sudoku-9x9.css">
</head>
<body>
  <main class="sudoku-shell" data-web-component-example="sudoku-9x9">
    <header class="sudoku-topbar">
      <div id="hudMount"></div>
      <div id="metaMount" class="sudoku-meta"></div>
    </header>

    <section class="sudoku-difficulty" aria-label="Difficulty">
      <button type="button" class="pill active" data-difficulty="easy">Easy</button>
      <button type="button" class="pill" data-difficulty="medium">Medium</button>
      <button type="button" class="pill" data-difficulty="hard">Hard</button>
      <button type="button" class="pill" data-difficulty="expert">Expert</button>
    </section>

    <section class="sudoku-stage">
      <div id="boardMount" class="sudoku-board" role="grid" aria-label="Sudoku 9x9 board"></div>
    </section>

    <section class="sudoku-numpad" id="numpadMount" aria-label="Number input">
      <button type="button" class="num" data-num="1">1</button>
      <button type="button" class="num" data-num="2">2</button>
      <button type="button" class="num" data-num="3">3</button>
      <button type="button" class="num" data-num="4">4</button>
      <button type="button" class="num" data-num="5">5</button>
      <button type="button" class="num" data-num="6">6</button>
      <button type="button" class="num" data-num="7">7</button>
      <button type="button" class="num" data-num="8">8</button>
      <button type="button" class="num" data-num="9">9</button>
      <button type="button" class="num clear" data-num="0">⌫</button>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
  <script type="application/json" id="mchatai-web-components-used">
  {"recipe":"recipe.sudoku","components":["entities.sudoku-board","ui.scoreboard","resources.swatches"],"mode":"module-imports"}
  </script>
</body>
</html>
