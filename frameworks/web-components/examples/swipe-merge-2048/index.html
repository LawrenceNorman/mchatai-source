<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#faf8ef">
  <title>2048 — Lego Assembly</title>
  <link rel="stylesheet" href="./swipe-merge-2048.css">
</head>
<body>
  <main class="swipe-shell" data-web-component-example="swipe-merge-2048">
    <header class="swipe-topbar">
      <div id="hudMount"></div>
      <div id="metaMount" class="swipe-meta"></div>
    </header>

    <section class="swipe-stage">
      <div id="boardMount" class="swipe-board" role="grid" aria-label="2048 board"></div>
      <div id="messageMount" class="swipe-message is-hidden" aria-live="polite"></div>
    </section>

    <p class="swipe-hint">Swipe to merge equal tiles. Reach 2048.</p>
    <button type="button" id="restartBtn" class="action-btn">New Game</button>
  </main>

  <script type="module" src="./main.js"></script>
  <script type="application/json" id="mchatai-web-components-used">
  {"recipe":"recipe.swipe-merge","components":["entities.swipe-tile-grid","ui.scoreboard","resources.swatches"],"mode":"module-imports"}
  </script>
</body>
</html>
