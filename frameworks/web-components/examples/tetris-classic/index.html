<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Tetris — Lego Assembly</title>
  <link rel="stylesheet" href="./tetris-classic.css">
</head>
<body>
  <main class="tetris-shell" data-web-component-example="tetris-classic">
    <header class="tetris-topbar">
      <div id="hudMount"></div>
      <div id="metaMount" class="tetris-meta"></div>
    </header>

    <section class="tetris-stage">
      <canvas id="gameCanvas" width="240" height="480" aria-label="Tetris playfield"></canvas>
      <aside class="tetris-sidepanel">
        <div class="panel-card">
          <div class="label">Next</div>
          <canvas id="nextCanvas" width="80" height="80"></canvas>
        </div>
        <div class="panel-card">
          <div class="label">Lines</div>
          <div class="value" id="linesValue">0</div>
        </div>
        <div class="panel-card">
          <div class="label">Level</div>
          <div class="value" id="levelValue">1</div>
        </div>
      </aside>
      <div id="messageMount" class="tetris-message is-hidden" aria-live="polite"></div>
    </section>

    <section class="tetris-controls" aria-label="Control pad">
      <button type="button" class="ctl" data-act="rotate">↻</button>
      <button type="button" class="ctl" data-act="left">◀</button>
      <button type="button" class="ctl drop" data-act="drop">⤓</button>
      <button type="button" class="ctl" data-act="right">▶</button>
      <button type="button" class="ctl" data-act="down">▼</button>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
  <script type="application/json" id="mchatai-web-components-used">
  {"recipe":"recipe.tetris","components":["entities.tetris-board","ui.scoreboard","resources.swatches"],"mode":"module-imports"}
  </script>
</body>
</html>
