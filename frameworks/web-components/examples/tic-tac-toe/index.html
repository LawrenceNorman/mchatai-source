<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="./tic-tac-toe.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.tic-tac-toe",
        "components": [
          "ui.mini-header",
          "ui.restart-overlay",
          "ui.leaderboard",
          "ui.cloud-ai-toggle",
          "core.turn-based-manager",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Tic-Tac-Toe vs perfect-play AI",
        "brandedAs": "Tic-Tac-Toe"
      }
    </script>
  </head>
  <body>
    <main class="tt-shell" data-app>
      <header data-mini-header aria-label="App header"></header>

      <section class="tt-controls" aria-label="Game controls">
        <div id="difficulty" aria-label="AI difficulty selector"></div>
        <div id="score" class="tt-score"></div>
      </section>

      <p id="status" role="status" aria-live="polite">Your turn — tap a square.</p>

      <section id="board" class="tt-board" role="grid" aria-label="Tic-tac-toe board"></section>

      <div id="rank-card" aria-live="polite"></div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
