<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>TaskFlow — Todoist Lego Assembly</title>
    <link rel="stylesheet" href="./taskflow.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.todo-list",
        "components": [
          "ui.button",
          "ui.text-input",
          "ui.checkbox",
          "ui.list-item",
          "ui.empty-state"
        ],
        "mode": "module-imports",
        "cloneTarget": "Todoist",
        "brandedAs": "TaskFlow"
      }
    </script>
  </head>
  <body>
    <main class="taskflow" data-app>
      <header class="taskflow__header">
        <h1 class="taskflow__title">TaskFlow</h1>
        <p class="taskflow__subtitle">A focus-first to-do list. Press <kbd>Enter</kbd> to add.</p>
      </header>

      <section class="taskflow__add" data-add-slot></section>

      <section class="taskflow__filters" data-filter-slot></section>

      <section class="taskflow__body">
        <ul class="taskflow__list" data-list></ul>
        <div class="taskflow__empty" data-empty-slot></div>
      </section>

      <footer class="taskflow__footer">
        <span class="taskflow__count" data-count>0 tasks left</span>
        <span class="taskflow__clear-slot" data-clear-slot></span>
      </footer>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
