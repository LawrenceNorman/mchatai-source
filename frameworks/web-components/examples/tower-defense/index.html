<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tower Defense Lego Assembly</title>
    <link rel="stylesheet" href="./tower-defense.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.tower-defense",
        "components": [
          "core.game-manager",
          "core.physics2d",
          "entities.grid-board",
          "entities.path-follower",
          "entities.projectile",
          "entities.wave-manager",
          "entities.turret",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Tower Defense",
        "brandedAs": "Tower Defense"
      }
    </script>
  </head>
  <body>
    <main class="tower-shell" data-tower-defense-app>
      <section class="hero">
        <p class="eyebrow">Tower Defense clone assembled from Lego blocks</p>
        <h1>Tower Defense</h1>
        <p class="brief">Place turrets beside the road. Stop waves before they reach the portal.</p>
      </section>

      <section class="battlefield" aria-label="Tower defense battlefield">
        <div class="hud">
          <div id="scoreboard"></div>
          <div class="hud-card">Lives <strong id="lives">20</strong></div>
          <div class="hud-card">Gold <strong id="gold">80</strong></div>
          <div class="hud-card">Wave <strong id="wave">1</strong></div>
          <button id="startWaveButton" type="button">Start Wave</button>
        </div>
        <canvas id="battleCanvas" width="720" height="480" aria-label="Tower defense game board"></canvas>
        <p id="message" class="message" role="status" aria-live="polite">Tap a build pad to place a turret.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
