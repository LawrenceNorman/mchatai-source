<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Word Quest - Wordle Lego Assembly</title>
    <link rel="stylesheet" href="./word-quest.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.word-logic",
        "components": [
          "ui.mini-header",
          "core.turn-based-manager",
          "entities.grid-board",
          "entities.letter-grid",
          "ui.keyboard-input",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports",
        "cloneTarget": "Wordle",
        "brandedAs": "Word Quest"
      }
    </script>
  </head>
  <body>
    <main class="word-shell" data-app>
      <header data-mini-header aria-label="App header"></header>

      <section class="game-panel" aria-label="Word Quest game">
        <div class="hud-row">
          <div id="scoreboard"></div>
          <div class="streak-card">
            <span>Streak</span>
            <strong id="streak">0</strong>
          </div>
        </div>

        <div id="message" class="message" role="status" aria-live="polite">Guess the hidden five-letter word.</div>
        <div id="grid" class="letter-grid" aria-label="Wordle-style guess grid">
          <div class="grid-row" data-row="0"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
          <div class="grid-row" data-row="1"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
          <div class="grid-row" data-row="2"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
          <div class="grid-row" data-row="3"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
          <div class="grid-row" data-row="4"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
          <div class="grid-row" data-row="5"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        </div>
        <div id="keyboard" class="keyboard" aria-label="On-screen QWERTY keyboard">
          <div class="key-row"><button type="button" class="key">Q</button><button type="button" class="key">W</button><button type="button" class="key">E</button><button type="button" class="key">R</button><button type="button" class="key">T</button><button type="button" class="key">Y</button><button type="button" class="key">U</button><button type="button" class="key">I</button><button type="button" class="key">O</button><button type="button" class="key">P</button></div>
          <div class="key-row"><button type="button" class="key">A</button><button type="button" class="key">S</button><button type="button" class="key">D</button><button type="button" class="key">F</button><button type="button" class="key">G</button><button type="button" class="key">H</button><button type="button" class="key">J</button><button type="button" class="key">K</button><button type="button" class="key">L</button></div>
          <div class="key-row"><button type="button" class="key">Z</button><button type="button" class="key">X</button><button type="button" class="key">C</button><button type="button" class="key">V</button><button type="button" class="key">B</button><button type="button" class="key">N</button><button type="button" class="key">M</button></div>
        </div>

        <div class="actions">
          <button id="enterButton" type="button">Enter</button>
          <button id="deleteButton" type="button">Delete</button>
          <button id="newRoundButton" type="button">New Word</button>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
