<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Word Quest Lego Assembly</title>
    <link rel="stylesheet" href="./word-quest.css">
    <script type="application/json" id="mchatai-web-components-used">
      {
        "recipe": "recipe.word-logic",
        "components": [
          "core.turn-based-manager",
          "entities.grid-board",
          "entities.letter-grid",
          "ui.keyboard-input",
          "ui.scoreboard",
          "resources.swatches",
          "resources.audio-manager"
        ],
        "mode": "module-imports"
      }
    </script>
  </head>
  <body>
    <main class="word-shell" data-app>
      <section class="hero-panel">
        <p class="eyebrow">Lego word game assembly</p>
        <h1>Word Quest</h1>
        <p class="brief">Build five-letter words, keep your streak alive, and beat your best score.</p>
      </section>

      <section class="game-panel" aria-label="Word Quest game">
        <div class="hud-row">
          <div id="scoreboard"></div>
          <div class="streak-card">
            <span>Streak</span>
            <strong id="streak">0</strong>
          </div>
        </div>

        <div id="message" class="message" role="status" aria-live="polite">Type or tap letters to start.</div>
        <div id="grid" class="letter-grid" aria-label="Guess grid"></div>
        <div id="keyboard" class="keyboard" aria-label="On-screen keyboard"></div>

        <div class="actions">
          <button id="enterButton" type="button">Enter</button>
          <button id="deleteButton" type="button">Delete</button>
          <button id="newRoundButton" type="button">New Word</button>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
