<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Molecule Viewer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg:#070b16; --panel:rgba(20,28,46,0.72); --panel-brd:rgba(120,150,210,0.18);
    --txt:#eaf0fb; --muted:#9fb0cf; --accent:#5ce1ff; --accent2:#7c9cff;
  }
  html,body{ height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 800px at 70% -10%, #16213d 0%, #0a0f1f 45%, #04060d 100%);
    color:var(--txt); overflow:hidden; user-select:none;
  }
  #app{ position:fixed; inset:0; display:flex; flex-direction:column; }

  header{
    display:flex; align-items:center; gap:14px; padding:12px 16px 10px;
    flex-wrap:wrap; border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .brand{ display:flex; align-items:center; gap:10px; margin-right:6px; }
  .brand .dot{
    width:26px; height:26px; border-radius:50%;
    background:radial-gradient(circle at 32% 30%, #aef3ff 0%, #5ce1ff 38%, #1f6fb0 100%);
    box-shadow:0 0 16px rgba(92,225,255,0.5);
  }
  .brand h1{ font-size:17px; font-weight:700; letter-spacing:0.2px; }
  .brand h1 span{ color:var(--accent); }

  .chips{ display:flex; gap:7px; flex-wrap:wrap; }
  .chip{
    border:1px solid var(--panel-brd); background:rgba(255,255,255,0.04);
    color:var(--muted); padding:6px 12px; border-radius:999px; font-size:12.5px;
    font-weight:600; cursor:pointer; transition:all .15s ease; white-space:nowrap;
  }
  .chip:hover{ color:var(--txt); border-color:rgba(124,156,255,0.5); background:rgba(124,156,255,0.12); }
  .chip.active{
    color:#04101c; background:linear-gradient(180deg,#7df0ff,#39bfe6);
    border-color:transparent; box-shadow:0 4px 14px rgba(57,191,230,0.35);
  }

  #stage{ position:relative; flex:1 1 auto; min-height:0; }
  #cv{ position:absolute; inset:0; width:100%; height:100%; display:block; cursor:grab; touch-action:none; }
  #cv.drag{ cursor:grabbing; }

  #hud{
    position:absolute; top:14px; left:14px; padding:12px 14px;
    background:var(--panel); border:1px solid var(--panel-brd); border-radius:14px;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); pointer-events:none;
    box-shadow:0 8px 30px rgba(0,0,0,0.35); max-width:60%;
  }
  #molName{ font-size:13px; color:var(--muted); font-weight:600; letter-spacing:0.3px; }
  #formula{ font-size:26px; font-weight:800; margin:2px 0 9px; letter-spacing:0.5px; }
  .legend{ display:flex; flex-wrap:wrap; gap:6px 12px; }
  .leg{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
  .leg b{ color:var(--txt); font-weight:700; }
  .swatch{ width:13px; height:13px; border-radius:50%; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.5); }

  #hint{
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    font-size:12px; color:var(--muted); background:rgba(8,12,22,0.6);
    padding:6px 14px; border-radius:999px; border:1px solid rgba(255,255,255,0.06);
    pointer-events:none; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }

  footer{
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:11px 14px; flex-wrap:wrap; border-top:1px solid rgba(255,255,255,0.05);
    background:rgba(7,11,22,0.55);
  }
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    border:1px solid var(--panel-brd); background:rgba(255,255,255,0.05);
    color:var(--txt); padding:8px 13px; border-radius:11px; font-size:13px;
    font-weight:600; cursor:pointer; transition:all .15s ease;
  }
  .btn:hover{ background:rgba(124,156,255,0.16); border-color:rgba(124,156,255,0.5); }
  .btn:active{ transform:translateY(1px); }
  .btn.on{ background:linear-gradient(180deg,#7df0ff,#39bfe6); color:#04101c; border-color:transparent; }
  .btn .ic{ width:15px; height:15px; display:inline-block; }
  .sep{ width:1px; height:24px; background:rgba(255,255,255,0.1); margin:0 4px; }

  @media (max-width:640px){
    .brand h1{ font-size:15px; }
    #formula{ font-size:21px; }
    #hud{ max-width:72%; padding:10px 12px; }
    .chip{ padding:5px 10px; font-size:11.5px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><div class="dot"></div><h1>Molecule<span>3D</span></h1></div>
    <div id="chips" class="chips"></div>
  </header>

  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="hud">
      <div id="molName">Benzene</div>
      <div id="formula">C&#8326;H&#8326;</div>
      <div id="legend" class="legend"></div>
    </div>
    <div id="hint">Drag to rotate &middot; Scroll to zoom</div>
  </div>

  <footer id="controls"></footer>
</div>

<script>
(function(){
  "use strict";

  // ---------- Element data (CPK-inspired) ----------
  var ELEMENTS = {
    H: { name:"Hydrogen", color:"#eef2f8", r:0.31 },
    C: { name:"Carbon",   color:"#3c4456", r:0.44 },
    N: { name:"Nitrogen", color:"#3b6bff", r:0.42 },
    O: { name:"Oxygen",   color:"#ff4536", r:0.43 },
    S: { name:"Sulfur",   color:"#ffce3a", r:0.48 },
    P: { name:"Phosphorus", color:"#ff8a3a", r:0.47 },
    X: { name:"Atom",     color:"#d96bd9", r:0.44 }
  };
  function el(sym){ return ELEMENTS[sym] || ELEMENTS.X; }

  // ---------- Procedural builders ----------
  function benzene(){
    var a=[], b=[], i, t;
    for(i=0;i<6;i++){ t=i*Math.PI/3; a.push(["C",1.39*Math.cos(t),1.39*Math.sin(t),0]); }
    for(i=0;i<6;i++){ t=i*Math.PI/3; a.push(["H",2.47*Math.cos(t),2.47*Math.sin(t),0]); }
    for(i=0;i<6;i++){ b.push([i,(i+1)%6, (i%2===0)?2:1]); }
    for(i=0;i<6;i++){ b.push([i,6+i,1]); }
    return { atoms:a, bonds:b };
  }
  function cyclohexane(){
    var a=[], b=[], i, t, s, z, R=1.456, h=0.25, f=0.83;
    for(i=0;i<6;i++){ t=i*Math.PI/3; s=(i%2)?-1:1; a.push(["C",R*Math.cos(t),R*Math.sin(t),s*h]); }
    for(i=0;i<6;i++){ b.push([i,(i+1)%6,1]); }
    for(i=0;i<6;i++){
      t=i*Math.PI/3; s=(i%2)?-1:1; z=s*h;
      var ax=a.length; a.push(["H",R*Math.cos(t),R*Math.sin(t),z+s*1.0]); b.push([i,ax,1]);
      var eq=a.length; a.push(["H",R*Math.cos(t)+f*Math.cos(t),R*Math.sin(t)+f*Math.sin(t),z-s*0.45]); b.push([i,eq,1]);
    }
    return { atoms:a, bonds:b };
  }

  // ---------- Molecule library ----------
  var MOLECULES = {
    water:   { name:"Water",
      atoms:[["O",0,0,0],["H",0.757,0.586,0],["H",-0.757,0.586,0]],
      bonds:[[0,1,1],[0,2,1]] },
    co2:     { name:"Carbon Dioxide",
      atoms:[["C",0,0,0],["O",1.16,0,0],["O",-1.16,0,0]],
      bonds:[[0,1,2],[0,2,2]] },
    ammonia: { name:"Ammonia",
      atoms:[["N",0,0,0.12],["H",0.94,0,-0.27],["H",-0.47,0.814,-0.27],["H",-0.47,-0.814,-0.27]],
      bonds:[[0,1,1],[0,2,1],[0,3,1]] },
    methane: { name:"Methane",
      atoms:[["C",0,0,0],["H",0.629,0.629,0.629],["H",-0.629,-0.629,0.629],["H",-0.629,0.629,-0.629],["H",0.629,-0.629,-0.629]],
      bonds:[[0,1,1],[0,2,1],[0,3,1],[0,4,1]] },
    ethylene:{ name:"Ethylene",
      atoms:[["C",0.667,0,0],["C",-0.667,0,0],["H",1.232,0.94,0],["H",1.232,-0.94,0],["H",-1.232,0.94,0],["H",-1.232,-0.94,0]],
      bonds:[[0,1,2],[0,2,1],[0,3,1],[1,4,1],[1,5,1]] },
    ethanol: { name:"Ethanol",
      atoms:[["C",1.168,-0.402,0],["C",0,0.563,0],["O",-1.19,-0.205,0],["H",-1.926,0.421,0],
             ["H",0.046,1.211,0.88],["H",0.046,1.211,-0.88],["H",2.115,0.137,0],
             ["H",1.128,-1.041,0.881],["H",1.128,-1.041,-0.881]],
      bonds:[[0,1,1],[1,2,1],[2,3,1],[1,4,1],[1,5,1],[0,6,1],[0,7,1],[0,8,1]] },
    benzene: Object.assign({ name:"Benzene" }, benzene()),
    cyclohexane: Object.assign({ name:"Cyclohexane" }, cyclohexane())
  };
  var ORDER = ["water","co2","ammonia","methane","ethylene","ethanol","benzene","cyclohexane"];

  // ---------- Helpers ----------
  function adj(hex, t){ // t>0 lighten toward white, t<0 darken
    var c=hex.replace("#",""), r=parseInt(c.substr(0,2),16), g=parseInt(c.substr(2,2),16), b=parseInt(c.substr(4,2),16);
    var tgt=(t>=0)?255:0, a=Math.abs(t);
    r=Math.round(r+(tgt-r)*a); g=Math.round(g+(tgt-g)*a); b=Math.round(b+(tgt-b)*a);
    return "rgb("+r+","+g+","+b+")";
  }
  function lum(hex){
    var c=hex.replace("#",""), r=parseInt(c.substr(0,2),16), g=parseInt(c.substr(2,2),16), b=parseInt(c.substr(4,2),16);
    return (0.299*r+0.587*g+0.114*b)/255;
  }
  var SUB="₀₁₂₃₄₅₆₇₈₉";
  function subnum(n){ return String(n).split("").map(function(d){ return SUB[+d]; }).join(""); }
  function formulaOf(atoms){
    var counts={}, k;
    atoms.forEach(function(a){ counts[a[0]]=(counts[a[0]]||0)+1; });
    var keys=Object.keys(counts), out=[];
    var has=function(s){ return keys.indexOf(s)>=0; };
    var push=function(s){ out.push(s + (counts[s]>1?subnum(counts[s]):"")); };
    var rest=keys.slice();
    if(has("C")){ push("C"); rest.splice(rest.indexOf("C"),1);
      if(has("H")){ push("H"); rest.splice(rest.indexOf("H"),1); } }
    rest.sort().forEach(push);
    return out.join("");
  }

  // ---------- State ----------
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d");
  var dpr=Math.max(1, Math.min(3, window.devicePixelRatio||1));
  var cw=0, ch=0, cx=0, cy=0, baseScale=1;
  var rx=-0.32, ry=0.55, vrx=0, vry=0;
  var zoom=1, autoRotate=true, showLabels=false;
  var current=null;

  function load(key){
    var src=MOLECULES[key];
    var atoms=src.atoms.map(function(a){ return { el:a[0], x:a[1], y:a[2], z:a[3] }; });
    var n=atoms.length, cxx=0,cyy=0,czz=0, i;
    for(i=0;i<n;i++){ cxx+=atoms[i].x; cyy+=atoms[i].y; czz+=atoms[i].z; }
    cxx/=n; cyy/=n; czz/=n;
    var maxR=0;
    for(i=0;i<n;i++){
      atoms[i].x-=cxx; atoms[i].y-=cyy; atoms[i].z-=czz;
      var d=Math.sqrt(atoms[i].x*atoms[i].x+atoms[i].y*atoms[i].y+atoms[i].z*atoms[i].z);
      if(d>maxR) maxR=d;
    }
    current={ key:key, name:src.name, atoms:atoms, bonds:src.bonds, maxR:maxR, formula:formulaOf(src.atoms) };
    rx=-0.32; ry=0.55; vrx=0; vry=0; zoom=1;
    resize();
    updateHud();
    updateChips();
  }

  function resize(){
    var rect=cv.getBoundingClientRect();
    cw=rect.width; ch=rect.height;
    cv.width=Math.round(cw*dpr); cv.height=Math.round(ch*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cx=cw/2; cy=ch/2;
    if(current){ baseScale=0.42*Math.min(cw,ch)/(current.maxR+0.65); }
  }

  function rotate(p){
    var cyr=Math.cos(ry), syr=Math.sin(ry);
    var x1=p.x*cyr+p.z*syr, z1=-p.x*syr+p.z*cyr, y1=p.y;
    var cxr=Math.cos(rx), sxr=Math.sin(rx);
    var y2=y1*cxr-z1*sxr, z2=y1*sxr+z1*cxr;
    return { x:x1, y:y2, z:z2 };
  }

  // ---------- Drawing primitives ----------
  function stick(x1,y1,x2,y2,color,width){
    ctx.lineCap="round";
    ctx.lineWidth=width; ctx.strokeStyle=adj(color,-0.18);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.lineWidth=Math.max(1,width*0.34); ctx.strokeStyle=adj(color,0.32);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  function drawBond(P, b){
    var i=b[0], j=b[1], order=b[2];
    var A=P[i], B=P[j];
    var ax=A.sx, ay=A.sy, bx=B.sx, by=B.sy;
    var mx=(ax+bx)/2, my=(ay+by)/2;
    var cA=el(current.atoms[i].el).color, cB=el(current.atoms[j].el).color;
    var w=0.16*baseScale*zoom*((A.f+B.f)/2);
    if(order>=2){
      var dx=bx-ax, dy=by-ay, len=Math.sqrt(dx*dx+dy*dy)||1;
      var px=-dy/len, py=dx/len, g=w*0.52, sw=w*0.46;
      var off=[g,-g];
      for(var k=0;k<2;k++){
        var ox=px*off[k], oy=py*off[k];
        stick(ax+ox,ay+oy,mx+ox,my+oy,cA,sw);
        stick(mx+ox,my+oy,bx+ox,by+oy,cB,sw);
      }
    } else {
      stick(ax,ay,mx,my,cA,w*0.92);
      stick(mx,my,bx,by,cB,w*0.92);
    }
  }

  function drawAtom(P, i){
    var a=current.atoms[i], info=el(a.el), p=P[i];
    var r=info.r*baseScale*zoom*p.f;
    if(r<1) r=1;
    var col=info.color;
    var grad=ctx.createRadialGradient(p.sx-r*0.36, p.sy-r*0.38, r*0.1, p.sx, p.sy, r);
    grad.addColorStop(0, adj(col,0.55));
    grad.addColorStop(0.45, col);
    grad.addColorStop(1, adj(col,-0.5));
    ctx.beginPath(); ctx.arc(p.sx,p.sy,r,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
    ctx.lineWidth=1; ctx.strokeStyle=adj(col,-0.62); ctx.stroke();
    // specular highlight
    ctx.beginPath(); ctx.arc(p.sx-r*0.34, p.sy-r*0.36, r*0.2, 0, Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.55)"; ctx.fill();
    if(showLabels){
      ctx.fillStyle=(lum(col)>0.58)?"#11151f":"#ffffff";
      ctx.font="700 "+Math.max(9,r*0.95).toFixed(0)+"px -apple-system,Helvetica,Arial,sans-serif";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(a.el, p.sx, p.sy+r*0.04);
    }
  }

  // ---------- Render loop ----------
  function render(){
    ctx.clearRect(0,0,cw,ch);
    if(!current) return;
    var atoms=current.atoms, n=atoms.length, P=new Array(n), i;
    var focal=9;
    for(i=0;i<n;i++){
      var rp=rotate(atoms[i]);
      var f=focal/(focal-rp.z);
      P[i]={ x:rp.x, y:rp.y, z:rp.z, f:f,
        sx:cx+rp.x*baseScale*zoom*f, sy:cy-rp.y*baseScale*zoom*f };
    }
    // unified draw list (painter's algorithm)
    var list=[];
    for(i=0;i<n;i++){ list.push({ z:P[i].z, kind:0, i:i }); }
    current.bonds.forEach(function(b){
      list.push({ z:(P[b[0]].z+P[b[1]].z)/2 - 0.001, kind:1, b:b });
    });
    list.sort(function(p,q){ return p.z-q.z; });
    for(i=0;i<list.length;i++){
      var it=list[i];
      if(it.kind===1) drawBond(P, it.b); else drawAtom(P, it.i);
    }
  }

  function tick(){
    if(!dragging){
      ry+=vry; rx+=vrx;
      vry*=0.93; vrx*=0.93;
      if(Math.abs(vry)<1e-4) vry=0;
      if(Math.abs(vrx)<1e-4) vrx=0;
    }
    if(autoRotate && !dragging){ ry+=0.006; }
    render();
    requestAnimationFrame(tick);
  }

  // ---------- Interaction ----------
  var dragging=false, lastX=0, lastY=0;
  function down(x,y){ dragging=true; lastX=x; lastY=y; vrx=0; vry=0; cv.classList.add("drag"); }
  function move(x,y){
    if(!dragging) return;
    var dx=x-lastX, dy=y-lastY; lastX=x; lastY=y;
    ry+=dx*0.01; rx+=dy*0.01;
    vry=dx*0.01; vrx=dy*0.01;
  }
  function up(){ dragging=false; cv.classList.remove("drag"); }

  cv.addEventListener("mousedown", function(e){ down(e.clientX,e.clientY); });
  window.addEventListener("mousemove", function(e){ move(e.clientX,e.clientY); });
  window.addEventListener("mouseup", up);
  cv.addEventListener("touchstart", function(e){ var t=e.touches[0]; down(t.clientX,t.clientY); e.preventDefault(); }, {passive:false});
  cv.addEventListener("touchmove", function(e){ var t=e.touches[0]; move(t.clientX,t.clientY); e.preventDefault(); }, {passive:false});
  cv.addEventListener("touchend", up);
  cv.addEventListener("wheel", function(e){
    e.preventDefault();
    zoom *= (e.deltaY<0)?1.1:0.9;
    zoom=Math.max(0.45, Math.min(4.5, zoom));
  }, {passive:false});

  window.addEventListener("resize", resize);

  // ---------- UI construction ----------
  var chipsEl=document.getElementById("chips");
  function updateChips(){
    chipsEl.innerHTML="";
    ORDER.forEach(function(key){
      var btn=document.createElement("button");
      btn.className="chip"+(current && current.key===key?" active":"");
      btn.textContent=MOLECULES[key].name;
      btn.addEventListener("click", function(){ load(key); });
      chipsEl.appendChild(btn);
    });
  }

  function updateHud(){
    document.getElementById("molName").textContent=current.name;
    document.getElementById("formula").textContent=current.formula;
    var present={};
    current.atoms.forEach(function(a){ present[a.el]=true; });
    var leg=document.getElementById("legend"); leg.innerHTML="";
    Object.keys(present).forEach(function(sym){
      var info=el(sym);
      var d=document.createElement("div"); d.className="leg";
      d.innerHTML='<span class="swatch" style="background:radial-gradient(circle at 32% 30%, '+
        adj(info.color,0.5)+' 0%, '+info.color+' 55%, '+adj(info.color,-0.45)+' 100%)"></span>'+
        '<b>'+sym+'</b> '+info.name;
      leg.appendChild(d);
    });
  }

  var controls=document.getElementById("controls");
  function mkBtn(label, icon, onClick, id){
    var b=document.createElement("button");
    b.className="btn"; if(id) b.id=id;
    b.innerHTML=(icon?icon+" ":"")+"<span>"+label+"</span>";
    b.addEventListener("click", onClick);
    controls.appendChild(b);
    return b;
  }
  var icSpin='<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>';
  var icTag='<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h10"/></svg>';
  var icReset='<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.7 3"/><path d="M3 3v5h5"/></svg>';

  var spinBtn=mkBtn("Auto-rotate", icSpin, function(){
    autoRotate=!autoRotate; spinBtn.classList.toggle("on", autoRotate);
  });
  spinBtn.classList.toggle("on", autoRotate);

  var labelBtn=mkBtn("Labels", icTag, function(){
    showLabels=!showLabels; labelBtn.classList.toggle("on", showLabels);
  });

  var sep=document.createElement("div"); sep.className="sep"; controls.appendChild(sep);
  mkBtn("−", "", function(){ zoom=Math.max(0.45, zoom*0.85); });
  mkBtn("+", "", function(){ zoom=Math.min(4.5, zoom*1.15); });
  mkBtn("Reset view", icReset, function(){ rx=-0.32; ry=0.55; vrx=0; vry=0; zoom=1; });

  // ---------- Boot ----------
  load("benzene");
  resize();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
