<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>Checkers</title><style>*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:#FFFFFF;color:#000;font-family:'IBM Plex Mono','Courier New',monospace;font-weight:700;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;overscroll-behavior:none;touch-action:manipulation}body{display:flex;flex-direction:column;align-items:center;padding:8px;gap:8px;min-height:100vh;min-height:100dvh}.row{width:100%;max-width:480px}.panel{border:4px solid #000;background:#FFFFFF}.header{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px}.title{font-size:20px;letter-spacing:3px}.tags{display:flex;gap:6px;font-size:11px;align-items:center}.tag{padding:3px 8px;letter-spacing:1px;border:2px solid #000;background:#FFF;color:#000}.tag.accent{background:#EAB308;color:#000}.tag.solid{background:#000;color:#FFF}.status-bar{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;font-size:13px;letter-spacing:1px}.turn-info{display:flex;align-items:center;gap:8px}.dot{width:14px;height:14px;border:3px solid #000;display:inline-block;flex-shrink:0}.dot.light{background:#FFF}.dot.dark{background:#000}.dot.thinking{background:#EAB308;animation:blink 0.7s infinite}@keyframes blink{0%,100%{background:#EAB308}50%{background:#FFF}}.score{display:flex;gap:6px;font-size:11px}.score span{padding:3px 6px;border:2px solid #000}.score .you{background:#FFF;color:#000}.score .cpu{background:#000;color:#FFF}.board-wrap{width:100%;max-width:480px;aspect-ratio:1;border:4px solid #000;background:#000}.board{width:100%;height:100%;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr)}.cell{position:relative;display:flex;align-items:center;justify-content:center}.cell.sq-light{background:#FFFFFF}.cell.sq-dark{background:#525252}.cell.last-move{box-shadow:inset 0 0 0 4px #EAB308}.cell.jump-source{box-shadow:inset 0 0 0 4px #22C55E}.cell.valid{cursor:pointer}.cell.valid::after{content:'';position:absolute;inset:25%;background:#22C55E;border:3px solid #000;border-radius:50%;z-index:1;pointer-events:none;animation:pulseGreen 0.9s ease-in-out infinite}@keyframes pulseGreen{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}.piece{position:relative;width:80%;height:80%;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none}.piece.light{background:#FFFFFF;border:3px solid #000}.piece.dark{background:#000000;border:3px solid #000}.piece.light::before,.piece.dark::before{content:'';position:absolute;inset:5px;border-radius:50%;border:2px solid;pointer-events:none}.piece.light::before{border-color:#000;opacity:0.35}.piece.dark::before{border-color:#FFF;opacity:0.55}.piece.king::after{content:'\2605';position:absolute;z-index:3;color:#EAB308;font-size:22px;font-weight:900;text-shadow:1px 1px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;line-height:1}.piece.selected{outline:4px solid #EAB308;outline-offset:1px;z-index:4}.piece.dying{animation:die 0.32s forwards;z-index:5}@keyframes die{0%{transform:scale(1);opacity:1}40%{transform:scale(1.35);background:#EF4444 !important;border-color:#000 !important}100%{transform:scale(0.1);opacity:0}}.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{background:#FFFFFF;color:#000;border:4px solid #000;padding:14px 12px;font:inherit;font-weight:700;text-transform:uppercase;cursor:pointer;letter-spacing:2px;font-size:13px;transition:transform 0.05s}.btn:active{background:#000;color:#FFF;transform:translate(2px,2px)}.btn.primary{background:#EAB308}.btn.primary:active{background:#000;color:#EAB308}.btn:disabled{background:#E5E5E5;color:#999;cursor:not-allowed;border-color:#999}.help{font-size:11px;letter-spacing:1px;padding:6px 10px;text-align:center;color:#000;border:2px solid #000;background:#FFF}.help b{background:#22C55E;padding:1px 5px;border:2px solid #000}.help i{font-style:normal;background:#EAB308;padding:1px 5px;border:2px solid #000}.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}.overlay.show{display:flex}.modal{background:#FFFFFF;border:6px solid #000;padding:20px;max-width:340px;width:100%;text-align:center;box-shadow:8px 8px 0 #EAB308}.modal h2{font-size:26px;letter-spacing:3px;margin-bottom:14px;background:#000;color:#FFF;padding:10px;border:3px solid #000}.modal h2.win{background:#EAB308;color:#000}.modal-line{margin:8px 0;font-size:14px;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;gap:10px}.modal-line .lbl{color:#000}.modal-line .val{font-size:22px;background:#EAB308;padding:2px 10px;border:2px solid #000;min-width:50px;text-align:center}.modal-line .val.muted{background:#FFF}.modal .btn{margin-top:14px;width:100%}@media (max-width:380px){.title{font-size:16px;letter-spacing:2px}.header{padding:6px 10px}.piece.king::after{font-size:18px}.tag{padding:2px 6px;font-size:10px}.status-bar{font-size:12px;padding:6px 10px}}</style></head><body><div class="row panel header"><div class="title">CHECKERS</div><div class="tags"><span class="tag accent" id="streakLabel">STREAK 0</span><span class="tag solid" id="bestLabel">BEST 0</span></div></div><div class="row panel status-bar"><div class="turn-info"><span class="dot" id="turnDot"></span><span id="status">YOUR TURN</span></div><div class="score"><span class="you" id="youScore">YOU 12</span><span class="cpu" id="cpuScore">CPU 12</span></div></div><div class="board-wrap"><div class="board" id="board"></div></div><div class="row controls"><button class="btn" id="newBtn">NEW GAME</button><button class="btn primary" id="undoBtn">UNDO</button></div><div class="row help" id="help">TAP A PIECE → TAP <b>GREEN</b> TO MOVE • <i>★</i> = KING</div><div class="overlay" id="overlay"><div class="modal"><h2 id="modalTitle">YOU WIN</h2><div class="modal-line"><span class="lbl" id="modalSub">Streak extended</span></div><div class="modal-line"><span class="lbl">STREAK</span><span class="val" id="modalStreak">0</span></div><div class="modal-line"><span class="lbl">BEST</span><span class="val muted" id="modalBest">0</span></div><button class="btn primary" id="modalBtn">PLAY AGAIN</button></div></div><script>(function(){var LIGHT='light',DARK='dark';var HUMAN=LIGHT,CPU=DARK;var STREAK_KEY='checkers_streak_v1',BEST_KEY='checkers_best_v1';var state={board:null,current:LIGHT,selected:null,validMoves:[],history:[],winStreak:0,bestStreak:0,thinking:false,gameOver:false,lastMove:null,dying:null,busy:false};function newBoard(){var b=[];for(var r=0;r<8;r++){var row=[];for(var c=0;c<8;c++)row.push(null);b.push(row);}for(var r=0;r<3;r++)for(var c=0;c<8;c++)if((r+c)%2===1)b[r][c]={color:DARK,king:false};for(var r=5;r<8;r++)for(var c=0;c<8;c++)if((r+c)%2===1)b[r][c]={color:LIGHT,king:false};return b;}function cloneBoard(b){var nb=[];for(var r=0;r<8;r++){var row=[];for(var c=0;c<8;c++){var p=b[r][c];row.push(p?{color:p.color,king:p.king}:null);}nb.push(row);}return nb;}function sleep(ms){return new Promise(function(res){setTimeout(res,ms);});}function getJumpSequences(board,sr,sc){var piece=board[sr][sc];if(!piece)return[];var startKing=piece.king;var results=[];function recurse(r,c,captures,path,curBoard,curKing){var dirs=curKing?[[-1,-1],[-1,1],[1,-1],[1,1]]:(piece.color===LIGHT?[[-1,-1],[-1,1]]:[[1,-1],[1,1]]);for(var i=0;i<dirs.length;i++){var dr=dirs[i][0],dc=dirs[i][1];var mr=r+dr,mc=c+dc,lr=r+2*dr,lc=c+2*dc;if(lr<0||lr>7||lc<0||lc>7)continue;var mid=curBoard[mr][mc];if(!mid||mid.color===piece.color)continue;var alreadyCap=false;for(var k=0;k<captures.length;k++){if(captures[k][0]===mr&&captures[k][1]===mc){alreadyCap=true;break;}}if(alreadyCap)continue;if(curBoard[lr][lc])continue;var justKing=!curKing&&((piece.color===LIGHT&&lr===0)||(piece.color===DARK&&lr===7));var nb=cloneBoard(curBoard);nb[r][c]=null;nb[mr][mc]=null;nb[lr][lc]={color:piece.color,king:curKing||justKing};var nc=captures.concat([[mr,mc]]);var np=path.concat([[lr,lc]]);if(justKing){results.push({from:[sr,sc],to:[lr,lc],captures:nc,path:np});}else{var before=results.length;recurse(lr,lc,nc,np,nb,curKing);if(results.length===before){results.push({from:[sr,sc],to:[lr,lc],captures:nc,path:np});}}}}recurse(sr,sc,[],[[sr,sc]],board,startKing);return results;}function getSimpleMoves(board,r,c){var piece=board[r][c];if(!piece)return[];var dirs=piece.king?[[-1,-1],[-1,1],[1,-1],[1,1]]:(piece.color===LIGHT?[[-1,-1],[-1,1]]:[[1,-1],[1,1]]);var out=[];for(var i=0;i<dirs.length;i++){var nr=r+dirs[i][0],nc=c+dirs[i][1];if(nr<0||nr>7||nc<0||nc>7)continue;if(board[nr][nc])continue;out.push({from:[r,c],to:[nr,nc],captures:[],path:[[r,c],[nr,nc]]});}return out;}function getAllLegalMoves(board,color){var jumps=[];for(var r=0;r<8;r++)for(var c=0;c<8;c++){var p=board[r][c];if(!p||p.color!==color)continue;var js=getJumpSequences(board,r,c);for(var k=0;k<js.length;k++)jumps.push(js[k]);}/* HUB-22 2026-05-17 jumping optional, append simple moves to jumps */var simple=[];for(var r=0;r<8;r++)for(var c=0;c<8;c++){var p=board[r][c];if(!p||p.color!==color)continue;var sm=getSimpleMoves(board,r,c);for(var k=0;k<sm.length;k++)simple.push(sm[k]);}return jumps.concat(simple);}function applyMove(board,move){var nb=cloneBoard(board);var piece=nb[move.from[0]][move.from[1]];nb[move.from[0]][move.from[1]]=null;for(var i=0;i<move.captures.length;i++)nb[move.captures[i][0]][move.captures[i][1]]=null;var tr=move.to[0],tc=move.to[1];var becameKing=piece.king||(piece.color===LIGHT&&tr===0)||(piece.color===DARK&&tr===7);nb[tr][tc]={color:piece.color,king:becameKing};return nb;}function evaluate(board){var s=0;for(var r=0;r<8;r++)for(var c=0;c<8;c++){var p=board[r][c];if(!p)continue;var v=p.king?1.75:1;if(!p.king){if(p.color===DARK)v+=r*0.06;else v+=(7-r)*0.06;}else{var cd=Math.min(Math.min(r,7-r),Math.min(c,7-c));v+=cd*0.04;}if(!p.king){if(p.color===DARK&&r===0)v+=0.35;if(p.color===LIGHT&&r===7)v+=0.35;}if(c===0||c===7)v+=0.05;if(p.color===DARK)s+=v;else s-=v;}return s;}function minimax(board,depth,alpha,beta,maximizing,color){var moves=getAllLegalMoves(board,color);if(moves.length===0)return color===DARK?-9999+depth:9999-depth;if(depth===0)return evaluate(board);moves.sort(function(a,b){return b.captures.length-a.captures.length;});if(maximizing){var best=-Infinity;for(var i=0;i<moves.length;i++){var nb=applyMove(board,moves[i]);var v=minimax(nb,depth-1,alpha,beta,false,LIGHT);if(v>best)best=v;if(v>alpha)alpha=v;if(beta<=alpha)break;}return best;}else{var best=Infinity;for(var i=0;i<moves.length;i++){var nb=applyMove(board,moves[i]);var v=minimax(nb,depth-1,alpha,beta,true,DARK);if(v<best)best=v;if(v<beta)beta=v;if(beta<=alpha)break;}return best;}}function pickAIMove(board){var moves=getAllLegalMoves(board,DARK);if(moves.length===0)return null;moves.sort(function(a,b){return b.captures.length-a.captures.length;});var bestScore=-Infinity;var bestList=[];for(var i=0;i<moves.length;i++){var nb=applyMove(board,moves[i]);var s=minimax(nb,3,-Infinity,Infinity,false,LIGHT);if(s>bestScore){bestScore=s;bestList=[moves[i]];}else if(s===bestScore)bestList.push(moves[i]);}return bestList[Math.floor(Math.random()*bestList.length)];}function render(){var boardEl=document.getElementById('board');boardEl.innerHTML='';var validTo={};if(state.selected&&!state.busy){for(var i=0;i<state.validMoves.length;i++){var m=state.validMoves[i];if(m.from[0]===state.selected[0]&&m.from[1]===state.selected[1]){validTo[m.to[0]+','+m.to[1]]=true;}}}var jumpSources={};var hasJump=false;if(!state.gameOver&&!state.thinking&&!state.busy&&state.current===HUMAN){for(var i=0;i<state.validMoves.length;i++){if(state.validMoves[i].captures.length>0){hasJump=true;jumpSources[state.validMoves[i].from[0]+','+state.validMoves[i].from[1]]=true;}}}for(var r=0;r<8;r++){for(var c=0;c<8;c++){var cell=document.createElement('div');var isDarkSq=((r+c)%2===1);cell.className='cell '+(isDarkSq?'sq-dark':'sq-light');cell.dataset.r=r;cell.dataset.c=c;if(state.lastMove){var lm=state.lastMove;if((lm.from[0]===r&&lm.from[1]===c)||(lm.to[0]===r&&lm.to[1]===c))cell.classList.add('last-move');}if(jumpSources[r+','+c])cell.classList.add('jump-source');var piece=state.board[r][c];if(piece){var pe=document.createElement('div');var cls='piece '+piece.color;if(piece.king)cls+=' king';if(state.selected&&state.selected[0]===r&&state.selected[1]===c)cls+=' selected';if(state.dying){for(var dk=0;dk<state.dying.length;dk++){if(state.dying[dk][0]===r&&state.dying[dk][1]===c){cls+=' dying';break;}}}pe.className=cls;cell.appendChild(pe);}if(validTo[r+','+c])cell.classList.add('valid');(function(rr,cc){cell.addEventListener('click',function(){onCellClick(rr,cc);});})(r,c);boardEl.appendChild(cell);}}document.getElementById('streakLabel').textContent='STREAK '+state.winStreak;document.getElementById('bestLabel').textContent='BEST '+state.bestStreak;var lc=0,dc=0;for(var r=0;r<8;r++)for(var c=0;c<8;c++){var p=state.board[r][c];if(!p)continue;if(p.color===LIGHT)lc++;else dc++;}document.getElementById('youScore').textContent='YOU '+lc;document.getElementById('cpuScore').textContent='CPU '+dc;var dot=document.getElementById('turnDot');var st=document.getElementById('status');dot.className='dot';if(state.gameOver){st.textContent='GAME OVER';}else if(state.thinking){dot.classList.add('thinking');st.textContent='CPU THINKING...';}else if(state.current===HUMAN){dot.classList.add('light');st.textContent=hasJump?'JUMP AVAILABLE':'YOUR TURN';}else{dot.classList.add('dark');st.textContent="CPU'S TURN";}document.getElementById('undoBtn').disabled=(state.history.length===0||state.busy||state.thinking);}function onCellClick(r,c){if(state.busy||state.gameOver||state.thinking||state.current!==HUMAN)return;var piece=state.board[r][c];if(piece&&piece.color===HUMAN){var canMove=false;for(var i=0;i<state.validMoves.length;i++){if(state.validMoves[i].from[0]===r&&state.validMoves[i].from[1]===c){canMove=true;break;}}if(!canMove){if(state.selected){state.selected=null;render();}return;}if(state.selected&&state.selected[0]===r&&state.selected[1]===c){state.selected=null;render();return;}state.selected=[r,c];render();return;}if(state.selected){var move=null;for(var i=0;i<state.validMoves.length;i++){var m=state.validMoves[i];if(m.from[0]===state.selected[0]&&m.from[1]===state.selected[1]&&m.to[0]===r&&m.to[1]===c){move=m;break;}}if(move){executeMove(move);}else{state.selected=null;render();}}}function executeMove(move){return new Promise(function(resolve){_runMove(move).then(resolve);});}function _runMove(move){return new Promise(function(resolve){state.busy=true;state.history.push({board:cloneBoard(state.board),current:state.current,winStreak:state.winStreak,lastMove:state.lastMove?{from:state.lastMove.from.slice(),to:state.lastMove.to.slice()}:null});state.selected=null;state.lastMove={from:move.from.slice(),to:move.to.slice()};var isHuman=(state.current===HUMAN);var stepDelay=isHuman?180:360;var i=0;function nextStep(){if(i>=move.path.length-1){var fin=state.board[move.to[0]][move.to[1]];if(fin&&!fin.king&&((fin.color===LIGHT&&move.to[0]===0)||(fin.color===DARK&&move.to[0]===7))){fin.king=true;render();setTimeout(afterMove,200);}else{afterMove();}return;}var fr=move.path[i][0],fc=move.path[i][1];var tr=move.path[i+1][0],tc=move.path[i+1][1];var captured=null;if(Math.abs(tr-fr)===2){captured=[(fr+tr)/2,(fc+tc)/2];}var moving=state.board[fr][fc];state.board[fr][fc]=null;state.board[tr][tc]=moving;if(captured)state.dying=[captured];render();setTimeout(function(){if(captured){state.board[captured[0]][captured[1]]=null;state.dying=null;}i++;nextStep();},stepDelay);}function afterMove(){render();var lc=0,dc=0;for(var r=0;r<8;r++)for(var c=0;c<8;c++){var p=state.board[r][c];if(!p)continue;if(p.color===LIGHT)lc++;else dc++;}if(lc===0){state.busy=false;declareWinner(DARK);return resolve();}if(dc===0){state.busy=false;declareWinner(LIGHT);return resolve();}state.current=state.current===LIGHT?DARK:LIGHT;state.validMoves=getAllLegalMoves(state.board,state.current);if(state.validMoves.length===0){state.busy=false;declareWinner(state.current===LIGHT?DARK:LIGHT);return resolve();}state.busy=false;render();if(state.current===CPU){state.thinking=true;render();setTimeout(function(){var aiMove=pickAIMove(state.board);state.thinking=false;if(aiMove){_runMove(aiMove).then(resolve);}else{declareWinner(LIGHT);resolve();}},380);}else{resolve();}}nextStep();});}function declareWinner(color){state.gameOver=true;if(color===HUMAN){state.winStreak++;if(state.winStreak>state.bestStreak)state.bestStreak=state.winStreak;}else{state.winStreak=0;}saveStreaks();render();showOverlay(color===HUMAN);}function showOverlay(youWon){document.getElementById('overlay').classList.add('show');var t=document.getElementById('modalTitle');t.textContent=youWon?'YOU WIN':'CPU WINS';t.className=youWon?'win':'';document.getElementById('modalSub').textContent=youWon?'Streak extended.':'Streak reset.';document.getElementById('modalStreak').textContent=state.winStreak;document.getElementById('modalBest').textContent=state.bestStreak;}function loadStreaks(){try{var b=parseInt(localStorage.getItem(BEST_KEY),10);state.bestStreak=(!isNaN(b)&&b>=0)?b:0;var s=parseInt(localStorage.getItem(STREAK_KEY),10);state.winStreak=(!isNaN(s)&&s>=0)?s:0;}catch(e){state.bestStreak=0;state.winStreak=0;}}function saveStreaks(){try{localStorage.setItem(STREAK_KEY,String(state.winStreak));localStorage.setItem(BEST_KEY,String(state.bestStreak));}catch(e){}}function startNewGame(){state.board=newBoard();state.current=LIGHT;state.selected=null;state.history=[];state.gameOver=false;state.thinking=false;state.busy=false;state.lastMove=null;state.dying=null;state.validMoves=getAllLegalMoves(state.board,LIGHT);document.getElementById('overlay').classList.remove('show');render();}document.getElementById('newBtn').addEventListener('click',function(){if(state.busy)return;startNewGame();});document.getElementById('undoBtn').addEventListener('click',function(){if(state.busy||state.thinking||state.history.length===0)return;while(state.history.length>0){var prev=state.history.pop();state.board=prev.board;state.current=prev.current;state.winStreak=prev.winStreak;state.lastMove=prev.lastMove;state.gameOver=false;if(state.current===HUMAN)break;}state.selected=null;state.thinking=false;state.busy=false;state.dying=null;state.validMoves=getAllLegalMoves(state.board,state.current);document.getElementById('overlay').classList.remove('show');render();});document.getElementById('modalBtn').addEventListener('click',function(){document.getElementById('overlay').classList.remove('show');startNewGame();});loadStreaks();startNewGame();})();</script></body></html>
