  // the Send button even if the textarea is empty, so a "5 stars, no words"
  // submission is a valid vote).
  var selectedRating = null;     // null | 1..5

  var ratingClear = panel.querySelector('#mchatai-fb-rating-clear');
  function paintStars(previewValue) {
    var effective = previewValue != null ? previewValue : (selectedRating || 0);
    ratingStars.forEach(function (s) {
      var v = parseInt(s.getAttribute('data-value'), 10);
      s.classList.remove('filled', 'preview');
      s.textContent = v <= effective ? '★' : '☆';
      if (previewValue != null && v <= previewValue && v > (selectedRating || 0)) {
        s.classList.add('preview');
      } else if (v <= (selectedRating || 0)) {
        s.classList.add('filled');
      }
      s.setAttribute('aria-checked', String(v === selectedRating));
    });
    ratingClear.hidden = selectedRating == null;
  }
  ratingStars.forEach(function (s) {
    var v = parseInt(s.getAttribute('data-value'), 10);
    s.addEventListener('mouseenter', function () { paintStars(v); });
    s.addEventListener('mouseleave', function () { paintStars(null); });
    s.addEventListener('click', function () {
      // Click on currently-selected star → clear. Click elsewhere → set.
      selectedRating = (selectedRating === v) ? null : v;
      paintStars(null);
      updateSendState();
    });
  });

    selectedRating = null;
    paintStars(null);

  var textArea = panel.querySelector('#mchatai-fb-text');
  var sendBtn = panel.querySelector('#mchatai-fb-send');
  var statusEl = panel.querySelector('#mchatai-fb-status');

  var shotBtn = panel.querySelector('#mchatai-fb-shot-btn');

  var shotRemove = panel.querySelector('#mchatai-fb-shot-remove');

  // Lets users drop-in a 5-star vote without writing a novel.
  function updateSendState() {
    var hasText = textArea.value.trim().length >= 4;
    var hasRating = selectedRating != null;
    sendBtn.disabled = !(hasText || hasRating);
  }

  // Phase RT.2 follow-up: isolate typing inside the feedback panel from the
  // underlying game. Many games install keyboard listeners on window and
  // document — when the user types a space into the textarea, the event
  // bubbles up and the game also receives it (e.g. battleship-vs-ai toggles
  // ship orientation on any spacebar press). Capture-phase listeners on
  // window fire BEFORE the game's bubble-phase listeners — we stop
  // propagation + stop immediate propagation on any keyboard event whose
  // target is inside our panel. The panel input itself still gets the event
  // because stopPropagation at capture phase does not prevent the target
  // from receiving it, only the ancestors.
  function isInsideFeedbackPanel(el) {
    while (el && el !== document) {
      if (el === panel || el === pill || el === backPill) return true;
      el = el.parentNode;
    }
    return false;
  }
  // IMPORTANT: only keyboard events get intercepted. Previously I also blocked
  // pointer/click/mousedown at capture phase, which broke every button inside
  // the panel (sign-in, send, star rating, attach screenshot) because
  // stopImmediatePropagation at capture prevents ALL listeners — including
  // the panel's own click handlers registered via addEventListener('click').
  // Keyboard-only is the right scope: games listen for arrow keys / space /
  // letters on window, but they listen for pointer events on their canvas
  // element — not on window — so click events never bubbled to them anyway.
  ['keydown', 'keyup', 'keypress'].forEach(function (evName) {
    window.addEventListener(evName, function (e) {
      if (!panel.classList.contains('open')) return;
      if (!isInsideFeedbackPanel(e.target)) return;
      // stopPropagation (not stopImmediatePropagation) — the panel's own
      // listeners already ran on the target; we only need to prevent the
      // event from reaching ancestor window/document listeners the game
      // installed. Using stopImmediatePropagation here would kill the
      // textarea's native input handling in some edge cases.
      e.stopPropagation();
    }, true); // capture phase fires before the game's bubble-phase listener
  });

  // ── Screenshot attachment (opt-in per product) ──────────────────────────
  // The row itself is hidden by default. It only reveals after we confirm the
  // product has opted in (feedbackAutomation.acceptScreenshots=true on the
  // Firestore endProduct doc). We query once per panel open via an endpoint
  // that returns just the opt-in flag — no auth needed, cheap boolean.
  var capturedScreenshot = null;   // { dataURL: "data:image/jpeg;base64,..." , width, height, bytes }
  var screenshotAllowed = false;

  async function checkScreenshotOptIn() {
    if (!slug) return false;
    try {
      var resp = await fetch(API_BASE + '/v1/endproducts/feedback-config?slug=' + encodeURIComponent(slug), {
        method: 'GET',
      });
      if (!resp.ok) return false;
      var body = await resp.json();
      return !!body.acceptScreenshots;
    } catch (e) {
      return false;
    }
  }

  async function captureScreenshot() {
    // Gate: require real sign-in before capturing. Attributable + rate-limitable.
    shotBtn.disabled = true;
    shotBtn.textContent = '🔑 Signing in…';
    statusEl.textContent = '';
    try {
      try {
        await ensureSignedIn();
      } catch (authErr) {
        throw new Error('Sign-in required for screenshots: ' + authErr.message);
      }
      shotBtn.textContent = '📸 Select the tab to share…';
      if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
        throw new Error('Screen capture not supported on this browser');
      }
      var stream = await navigator.mediaDevices.getDisplayMedia({
        video: { displaySurface: 'browser' },
        audio: false,
        preferCurrentTab: true,
      });
      var track = stream.getVideoTracks()[0];

      // Grab one frame via ImageCapture if available, else via a video element.
      var bitmap;
      if (window.ImageCapture) {
        var capture = new ImageCapture(track);
        bitmap = await capture.grabFrame();
      } else {
        var video = document.createElement('video');
        video.srcObject = stream;
        video.muted = true;
        await video.play();
        bitmap = {
          width: video.videoWidth,
          height: video.videoHeight,
          _video: video,
        };
      }

      // Resize to max 800×600 (fit, keep aspect) and JPEG 0.7 to stay under
      // the 200KB server cap. Typical output is 30-80KB.
      var MAX_W = 800, MAX_H = 600;
      var scale = Math.min(MAX_W / bitmap.width, MAX_H / bitmap.height, 1);
      var outW = Math.round(bitmap.width * scale);
      var outH = Math.round(bitmap.height * scale);
      var canvas = document.createElement('canvas');
      canvas.width = outW;
      canvas.height = outH;
      var ctx = canvas.getContext('2d');
      if (bitmap._video) {
        ctx.drawImage(bitmap._video, 0, 0, outW, outH);
      } else {
        ctx.drawImage(bitmap, 0, 0, outW, outH);
      }
      track.stop();

      var dataURL = canvas.toDataURL('image/jpeg', 0.7);
      // base64 portion length * 0.75 ≈ byte count
      var bytes = Math.round((dataURL.length - 'data:image/jpeg;base64,'.length) * 0.75);
      if (bytes > 200 * 1024) {
        throw new Error('Screenshot too large after compression (' + Math.round(bytes/1024) + 'KB, max 200KB)');
      }

      capturedScreenshot = { dataURL: dataURL, width: outW, height: outH, bytes: bytes };
      shotPreview.src = dataURL;
      shotPreviewWrap.style.display = 'block';
      shotBtn.style.display = 'none';
      shotBtn.disabled = false;
      shotBtn.textContent = '📸 Attach screenshot';
    } catch (err) {
      shotBtn.disabled = false;
      shotBtn.textContent = '📸 Attach screenshot';
      statusEl.style.color = '#e26766';
      statusEl.textContent = err.message || 'Screenshot capture failed';
    }
  }

  function removeScreenshot() {
    capturedScreenshot = null;
    shotPreview.src = '';
    shotPreviewWrap.style.display = 'none';
    shotBtn.style.display = 'block';
  }

  shotBtn.addEventListener('click', captureScreenshot);
  shotRemove.addEventListener('click', removeScreenshot);

  // Phase RT.2 follow-up: user chip click — sign-in when signed-out,
  // sign-out when signed-in.
  var userChip = panel.querySelector('#mchatai-fb-user');
  if (userChip) {
    userChip.addEventListener('click', async function () {
      if (cachedIdToken) {
        if (confirm('Sign out? Future submissions will be anonymous until you sign back in.')) {
          clearToken();
        }
        return;
      }
      try {
        await ensureSignedIn();
      } catch (e) {
        // Don't block the panel — user might just have dismissed the popup.
        console.warn('[feedback] sign-in skipped:', e.message);
      }
    });
  }
  // Render initial state.
  updateUserChip();

  // ── Real auth for screenshot uploads ───────────────────────────────────
  // Text-only feedback posts anonymously to /v1/feedback. Screenshots require
  // real Google sign-in (not anonymous) so:
  //   1. Abuse is attributable to a real account we can disable
  //   2. Bot operators can't programmatically create sign-in accounts
  //   3. The server rate-limits per UID with a hard ceiling that survives
  //      tab-closes / incognito resets (anon tokens would rotate every session)
  //
  // Sign-in flow: if user clicks "Attach screenshot" without a cached token, we
  // open an Identity Toolkit OAuth popup for Google. Token cached in session
  // storage so repeated submissions don't re-prompt. Cleared on Remove or when
  // the server reports the UID was abuse-disabled (403 reason=disabled).
  // Phase RT.2 follow-up: token persistence moved from sessionStorage to
  // localStorage. sessionStorage dies on tab close AND is isolated per tab,
  // so users had to re-sign-in constantly when hopping between products.
  // localStorage is shared across tabs and persists across browser restarts,
  // matching the "you are signed in" mental model. Firebase ID tokens expire
  // after ~1h; we detect expiry in updateUserChip (decoded .exp claim) and
  // auto-clear the token when it is stale, which triggers a silent re-check
  // via the /feedback-signin iframe (see silentlyRefreshToken below) so
  // long-lived users do not keep seeing sign-in prompts as tokens age.
  var TOKEN_KEY = 'mchatai_fb_idtoken';
  // Migration: if an older session put a token in sessionStorage, promote it
  // to localStorage so the user does not lose their sign-in on this refresh.
  (function migrateOldToken() {
    try {
      if (!localStorage.getItem(TOKEN_KEY) && sessionStorage.getItem(TOKEN_KEY)) {
        localStorage.setItem(TOKEN_KEY, sessionStorage.getItem(TOKEN_KEY));
      }
      sessionStorage.removeItem(TOKEN_KEY);
    } catch (e) {}
  })();
  var cachedIdToken = (function () {
    try { return localStorage.getItem(TOKEN_KEY) || null; } catch (e) { return null; }
  })();

  function storeToken(tok) {
    cachedIdToken = tok;
    try { localStorage.setItem(TOKEN_KEY, tok); } catch (e) {}
    updateUserChip();
  }

  function clearToken() {
    cachedIdToken = null;
    try { localStorage.removeItem(TOKEN_KEY); } catch (e) {}
    updateUserChip();
  }

  // Silent-refresh: when the cached token is missing or expired, try to pull
  // a fresh one from /feedback-signin.html via a hidden iframe. The signin
  // page runs Firebase Web SDK which persists auth in IndexedDB — if the
  // user signed in on any mchatai.com page at any point, Firebase still has
  // the session and onAuthStateChanged fires with the user, which posts a
  // fresh ID token back to the widget via postMessage. No visible popup,
  // no user action required — the sign-in just "carries over."
  function silentlyRefreshToken() {
    return new Promise(function (resolve) {
      var iframe = document.createElement('iframe');
      iframe.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;border:0;';
      iframe.src = 'https://mchatai.com/feedback-signin.html?silent=1';
      var done = false;
      var finish = function (token) {
        if (done) return;
        done = true;
        window.removeEventListener('message', handler);
        try { document.body.removeChild(iframe); } catch (e) {}
        if (token) storeToken(token);
        resolve(token || null);
      };
      var handler = function (ev) {
        if (ev.origin !== 'https://mchatai.com') return;
        if (!ev.data || ev.data.type !== 'mchatai-fb-signin') return;
        finish(ev.data.idToken || null);
      };
      window.addEventListener('message', handler);
      document.body.appendChild(iframe);
      // 3s timeout — if Firebase has no cached session the iframe just sits
      // idle at the button prompt. Give up silently.
      setTimeout(function () { finish(null); }, 3000);
    });
  }

  /* Phase RT.2 follow-up: decode a Firebase ID token's payload (the middle
     JWT segment — base64url-encoded JSON). We only need name/email/picture,
     so we do NOT verify the signature here (server revalidates on every
     request). Returns null on any decode failure. */
  function decodeIdToken(token) {
    if (!token) return null;
    try {
      var parts = token.split('.');
      if (parts.length < 2) return null;
      var b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
      while (b64.length % 4) b64 += '=';
      return JSON.parse(atob(b64));
    } catch (e) {
      return null;
    }
  }

  function updateUserChip() {
    var chip = document.getElementById('mchatai-fb-user');
    if (!chip) return;
    var claims = decodeIdToken(cachedIdToken);
    if (claims && claims.exp && claims.exp * 1000 < Date.now()) {
      // Token expired — treat as signed-out so the chip prompts sign-in again.
      claims = null;
      try { sessionStorage.removeItem('mchatai_fb_idtoken'); } catch (e) {}
      cachedIdToken = null;
    }
    // Build the chip contents via DOM APIs rather than innerHTML with nested
    // quotes — the IIFE string gets concatenated into an HTML response, and
    // any backslash-escaped quote here breaks the whole widget at parse time
    // in the browser. Lost an entire deploy to this — don't regress.
    while (chip.firstChild) chip.removeChild(chip.firstChild);
    if (claims) {
      chip.classList.add('signed-in');
      chip.title = 'Signed in as ' + (claims.email || claims.name || 'you') + ' — click to sign out';
      var displayName = claims.name || (claims.email ? claims.email.split('@')[0] : 'you');
      var shortName = displayName.length > 14 ? displayName.slice(0, 13) + '…' : displayName;
      var initial = displayName.charAt(0).toUpperCase();
      // Try avatar image first; fall back to initial-letter span on error.
      if (claims.picture) {
        var img = document.createElement('img');
        img.src = claims.picture;
        img.alt = '';
        img.referrerPolicy = 'no-referrer';
        img.addEventListener('error', function () {
          var fallback = document.createElement('span');
          fallback.className = 'mchatai-fb-user-avatar-fallback';
          fallback.textContent = initial;
          if (img.parentNode) img.parentNode.replaceChild(fallback, img);
        });
        chip.appendChild(img);
      } else {
        var fallbackSpan = document.createElement('span');
        fallbackSpan.className = 'mchatai-fb-user-avatar-fallback';
        fallbackSpan.textContent = initial;
        chip.appendChild(fallbackSpan);
      }
      var nameSpan = document.createElement('span');
      nameSpan.className = 'mchatai-fb-user-name';
      nameSpan.textContent = shortName;
      chip.appendChild(nameSpan);
    } else {
      chip.classList.remove('signed-in');
      chip.title = 'Sign in to enable screenshots';
      var icon = document.createElement('span');
      icon.setAttribute('aria-hidden', 'true');
      icon.textContent = '👤';
      var label = document.createElement('span');
      label.className = 'mchatai-fb-user-name';
      label.textContent = 'Sign in';
      chip.appendChild(icon);
      chip.appendChild(label);
    }
    // Also refresh the screenshot row so the "Sign in first" CTA flips to
    // "Attach screenshot" once signed-in (or vice versa).
    updateScreenshotRow();
  }

  /* Phase RT.2 follow-up: keep the screenshot button's label + disabled state
     in sync with sign-in state so users understand why they can't click it. */
  function updateScreenshotRow() {
    var row = document.getElementById('mchatai-fb-screenshot-row');
    var btn = document.getElementById('mchatai-fb-shot-btn');
    if (!row || !btn) return;
    if (!screenshotAllowed) {
      row.style.display = 'none';
      return;
    }
    row.style.display = 'block';
    if (cachedIdToken) {
      btn.textContent = '📸 Attach screenshot';
      btn.disabled = false;
    } else {
      btn.textContent = '🔒 Sign in to attach screenshot';
      btn.disabled = false;  // clickable — click triggers sign-in popup
    }
  }

  async function ensureSignedIn() {
    if (cachedIdToken) return cachedIdToken;
    // Use Firebase's identitytoolkit OAuth popup flow. We use the
    // createAuthUri + verifyAssertion pattern via a popup. Keep it minimal —
    // the user gets a Google chooser and a standard OAuth consent screen.
    return new Promise(function (resolve, reject) {
      var popupW = 500, popupH = 600;
      var left = (screen.width - popupW) / 2;
      var top = (screen.height - popupH) / 2;
      // Firebase Hosting has a stock sign-in handler at __/auth/handler. We'll
      // send the user to a small sign-in page we host at /feedback-signin that
      // runs Firebase JS SDK, does signInWithPopup(Google), and posts the
      // idToken back to the opener via postMessage.
      var popup = window.open(
        'https://mchatai.com/feedback-signin.html?return=' + encodeURIComponent(location.href),
        'mchatai-fb-signin',
        'width=' + popupW + ',height=' + popupH + ',left=' + left + ',top=' + top
      );
      if (!popup) {
        reject(new Error('Sign-in popup blocked. Allow popups and try again.'));
        return;
      }
      var handler = function (ev) {
        if (ev.origin !== 'https://mchatai.com') return;
        if (!ev.data || ev.data.type !== 'mchatai-fb-signin') return;
        window.removeEventListener('message', handler);
        try { popup.close(); } catch (e) {}
        if (ev.data.idToken) {
          storeToken(ev.data.idToken);
          resolve(ev.data.idToken);
        } else {
          reject(new Error(ev.data.error || 'Sign-in canceled'));
        }
      };
      window.addEventListener('message', handler);
      // Watchdog — if the popup closes without posting, reject after 5 min.
      var watch = setInterval(function () {
        if (popup.closed) {
          clearInterval(watch);
          window.removeEventListener('message', handler);
          reject(new Error('Sign-in window closed'));
        }
      }, 500);
    });
  }

  sendBtn.addEventListener('click', async function () {
    var text = textArea.value.trim();
    // Phase RT.1: allow rating-only submissions. Require at least one signal.
    if (text.length < 4 && selectedRating == null) return;

    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending…';
    statusEl.textContent = '';

    // Phase RT.1: resolve a rating context version so iterations don't pool
    // their ratings across builds. Prefer a meta tag the product set at publish
    // time; fall back to the HTML's Last-Modified (set by serveUserProject) or
    // today's date. The server also records server-side createdAt, so this is
    // only a hint for cross-build grouping.
    var ratingContextVersion = null;
    var versionMeta = document.querySelector('meta[name="mchatai-version"]');
    if (versionMeta && versionMeta.content) {
      ratingContextVersion = versionMeta.content;
    } else {
      ratingContextVersion = new Date().toISOString().slice(0, 10); // YYYY-MM-DD bucket
    }

    // When only a rating (no text), synthesize a short description so the
    // ticket still has searchable content in the review queue.
    var effectiveText = text;
    if (effectiveText.length < 4 && selectedRating != null) {
      effectiveText = selectedRating + '-star rating (no comment)';
    }

    var payload = {
      title: effectiveText.split('\n')[0].slice(0, 80),
      description: effectiveText,
      type: selectedType,
      severity: selectedType === 'bug' ? 'medium' : 'low',
      rating: selectedRating,
      ratingContextVersion: ratingContextVersion,
      endProductSlug: slug,
      previewURL: location.href,
      source: 'web.user-project-widget',
      metadata: {
        consoleErrors: __consoleErrors.slice(),
        userAgent: navigator.userAgent,
        viewport: window.innerWidth + 'x' + window.innerHeight,
        shortUid: shortUid,
      },
    };

    // Screenshot attached → attach base64 + dimensions. Server will decode,
    // verify size, upload to GCS, and embed the URL on the ticket.
    if (capturedScreenshot) {
      payload.screenshot = {
        dataURL: capturedScreenshot.dataURL,
        width: capturedScreenshot.width,
        height: capturedScreenshot.height,
      };
    }

    try {
      var headers = { 'Content-Type': 'application/json' };
      // Include auth only if we have a token; screenshot submissions require it
      // but we let the server reject rather than blocking client-side — cheaper
      // to handle edge cases (stale token, abuse-disabled account) in one place.
      if (cachedIdToken) headers['Authorization'] = 'Bearer ' + cachedIdToken;

      var resp = await fetch(API_BASE + '/v1/feedback', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify(payload),
      });
      var body = await resp.json().catch(function () { return {}; });

      // Server telling us the user is abuse-disabled → clear token so the next
      // attempt forces a fresh sign-in. The abuse-disable lives on the UID in
      // Firestore so a re-sign-in with the same account will re-reject; only
      // recovery is to sign in with a different account or contact support.
      if (resp.status === 403 && body && body.reason === 'user-disabled') {
        clearToken();
        removeScreenshot();
      }

      if (resp.ok && body.ok) {
        statusEl.style.color = '#5db77a';
        statusEl.textContent = selectedRating != null
          ? 'Thanks! Your ' + selectedRating + '-star rating was logged.'
          : 'Thanks! Your feedback was logged.';
        textArea.value = '';
        selectedRating = null;
        paintStars(null);
        removeScreenshot();
        setTimeout(closePanel, 1400);
      } else {
        statusEl.style.color = '#e26766';
        statusEl.textContent = body.error || ('Error ' + resp.status);
      }
    } catch (err) {
      statusEl.style.color = '#e26766';
      statusEl.textContent = 'Network error — try again.';
    } finally {
      sendBtn.textContent = 'Send';
      updateSendState();
    }
  });
})();
</script></body></html>
