<!DOCTYPE html> <html lang='en'> <head> <meta charset='utf-8'> <meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover'> <title>CANDLE RUSH: Day Trader</title> <script src='https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js'></script> <style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none} html,body{margin:0;height:100%;background:#0a0e14;color:#cdd9e5;font-family:'SF Mono','Roboto Mono',Menlo,Consolas,monospace;overflow:hidden} #app{position:relative;display:flex;flex-direction:column;width:100vw;height:100vh;height:100dvh;max-width:560px;margin:0 auto;overflow:hidden} #hdr{padding:8px 10px 5px;background:linear-gradient(#0d131c,#0a0e14);border-bottom:1px solid #1a2430;flex:0 0 auto} #top{display:flex;align-items:center;gap:8px} #brand{color:#3bf0a8;font-weight:700;font-size:15px;letter-spacing:1px;flex:1;text-shadow:0 0 12px rgba(59,240,168,.5)} .pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;background:#3bf0a8;color:#08110a;letter-spacing:1px} #cnt{font-size:12px;color:#7c93a8} #barwrap{height:4px;background:#161f29;border-radius:3px;margin:7px 0 6px;overflow:hidden} #bar{height:100%;width:0;background:linear-gradient(90deg,#3bf0a8,#ffce4d);transition:width .3s} #stats{display:flex;gap:6px} .cell{flex:1;background:#0e151e;border:1px solid #1a2430;border-radius:8px;padding:5px 8px;display:flex;flex-direction:column} .cell label{font-size:9px;color:#5d7187;letter-spacing:1px} .cell span{font-size:16px;font-weight:700;margin-top:1px} .gold{color:#ffce4d;text-shadow:0 0 10px rgba(255,206,77,.4)} #chartwrap{position:relative;flex:1 1 auto;min-height:0;display:flex;padding:4px 2px} #chart{width:100%;height:100%;display:block} #combo{position:absolute;top:10px;left:12px;display:none;background:#ffce4d;color:#1a1206;font-weight:800;font-size:13px;padding:4px 11px;border-radius:12px;letter-spacing:1px;box-shadow:0 0 16px rgba(255,206,77,.7);animation:pop .3s} #pnl{display:none;text-align:center;font-size:13px;font-weight:700;letter-spacing:1px;padding:3px} #controls{display:flex;gap:10px;padding:10px 12px calc(12px + env(safe-area-inset-bottom));flex:0 0 auto} .big{flex:1;border:0;border-radius:14px;font-family:inherit;font-weight:800;font-size:20px;letter-spacing:1px;padding:18px 8px;color:#08110a;cursor:pointer;transition:transform .08s,filter .15s} .big:active{transform:scale(.96)} .big:disabled{opacity:.32;filter:grayscale(.5)} .buy{background:linear-gradient(#46ffba,#1fc98a);box-shadow:0 6px 18px rgba(31,201,138,.35)} .sell{background:linear-gradient(#ffd96b,#ff9d3d);box-shadow:0 6px 18px rgba(255,157,61,.35)} .sub{font-size:13px;font-weight:700;opacity:.85} .go{background:linear-gradient(#46ffba,#1fc98a);box-shadow:0 6px 22px rgba(31,201,138,.4);width:100%} .overlay{position:absolute;inset:0;background:rgba(6,9,14,.93);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:20;padding:20px} .overlay.hidden{display:none} .card{width:100%;max-width:380px;text-align:center;background:#0d141d;border:1px solid #1f2a38;border-radius:18px;padding:24px 20px;box-shadow:0 10px 50px rgba(0,0,0,.6)} .card h1{margin:0;font-size:30px;color:#3bf0a8;letter-spacing:1px;text-shadow:0 0 18px rgba(59,240,168,.5)} .card h2{margin:2px 0 12px;font-size:15px;color:#ffce4d;letter-spacing:5px;font-weight:700} .card p{font-size:13px;line-height:1.5;color:#9fb1c2;margin:10px 0 16px} .card b{color:#3bf0a8} .bestrow{font-size:12px;color:#7c93a8;margin-bottom:16px;letter-spacing:1px} .ostats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 18px} .ocell{background:#0a1019;border:1px solid #1c2735;border-radius:10px;padding:9px} .ocell label{display:block;font-size:9px;color:#5d7187;letter-spacing:1px;margin-bottom:3px} .ocell span{font-size:18px;font-weight:800} .big-n{font-size:24px} #nrbanner{display:none;background:linear-gradient(90deg,#ffce4d,#ff9d3d);color:#1a1206;font-weight:800;letter-spacing:2px;padding:6px;border-radius:8px;margin-bottom:12px;font-size:14px;animation:pop .4s} @keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}} .shake{animation:shake .5s} @keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-9px)}30%{transform:translateX(8px)}45%{transform:translateX(-7px)}60%{transform:translateX(6px)}75%{transform:translateX(-4px)}} .ring{fill:none;stroke:#ffce4d;stroke-width:2;animation:ripple 1.25s ease-out infinite} @keyframes ripple{0%{r:6px;opacity:.75}100%{r:22px;opacity:0}}</style> </head> <body> <div id='app'>  <div id='hdr'>   <div id='top'><span id='brand'>&#9650; CANDLE RUSH</span><span id='lvl' class='pill'>CALM</span><span id='cnt'>0 / 60</span></div>   <div id='barwrap'><div id='bar'></div></div>   <div id='stats'>    <div class='cell'><label>NET WORTH</label><span id='nw' class='gold'>$10,000</span></div>    <div class='cell'><label>CASH</label><span id='cash'>$10,000</span></div>    <div class='cell'><label>PRICE</label><span id='price'>$100.00</span></div>   </div>  </div>  <div id='chartwrap'><svg id='chart' viewBox='0 0 1000 560' preserveAspectRatio='xMidYMid meet'></svg><span id='combo'></span></div>  <div id='pnl'></div>  <div id='controls'>   <button id='buy' class='big buy'>BUY</button>   <button id='sell' class='big sell' disabled>SELL</button>  </div>  <div id='start' class='overlay'>   <div class='card'>    <h1>&#9650; CANDLE RUSH</h1>    <h2>DAY TRADER</h2>    <p>Read the candlesticks D3 draws live. <b>BUY</b> to go long, <b>SELL</b> to bank profit. Survive 60 candles through CALM, CHOPPY and CRASH &mdash; don't trigger a margin call.</p>    <div class='bestrow'>BEST NET WORTH &nbsp;<span id='sbest' class='gold'>$10,000</span></div>    <button id='startbtn' class='big go'>START TRADING</button>   </div>  </div>  <div id='over' class='overlay hidden'>   <div class='card'>    <div id='nrbanner'>&#9733; NEW RECORD &#9733;</div>    <h1 id='overban'>RUN COMPLETE</h1>    <p id='oversub'></p>    <div class='ostats'>     <div class='ocell'><label>FINAL NET WORTH</label><span id='ofinal' class='gold big-n'>$0</span></div>     <div class='ocell'><label>P/L</label><span id='opnl'>$0</span></div>     <div class='ocell'><label>BEST</label><span id='obest'>$0</span></div>     <div class='ocell'><label>MAX COMBO</label><span id='ocombo'>x0</span></div>    </div>    <button id='againbtn' class='big go'>TRADE AGAIN</button>   </div>  </div> </div> <script> const $=s=>document.querySelector(s); const fmt=n=>d3.format('$,.0f')(n); const fmt2=n=>d3.format('$,.2f')(n); const LEVELS=[  {name:'CALM',vol:0.011,mstep:0.05,shock:0.0,col:'#3bf0a8'},  {name:'CHOPPY',vol:0.020,mstep:0.10,shock:0.06,col:'#ffce4d'},  {name:'CRASH',vol:0.035,mstep:0.16,shock:0.13,col:'#ff5d6c'} ]; const TOTAL=60, WINDOW=32, STEP=60000, TICKMS=700; const START_CASH=10000, MARGIN=2000; const BASE=new Date(2024,0,2,9,30,0).getTime(); let S={}; function fresh(){  S={candles:[],idx:0,cash:START_CASH,shares:0,entry:0,entryT:0,long:false,combo:0,maxCombo:0,momentum:0,price:100,running:false,timer:null}; } let AC; function ac(){ if(!AC){AC=new (window.AudioContext||window.webkitAudioContext)();} if(AC.state==='suspended'){AC.resume();} return AC; } function beep(f,dur,type,vol,delay){ try{ const a=ac(); const o=a.createOscillator(); const g=a.createGain(); o.type=type; o.frequency.value=f; const t=a.currentTime+(delay||0); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur+0.03);}catch(e){} } function sTick(){ beep(720,0.05,'square',0.05,0); } function sShock(){ beep(220,0.12,'sawtooth',0.12,0); beep(150,0.16,'sawtooth',0.1,0.04); } function sBuy(){ beep(440,0.07,'square',0.12,0); beep(660,0.08,'square',0.1,0.05); } function sWin(){ beep(1318,0.12,'triangle',0.2,0); beep(1760,0.16,'triangle',0.18,0.09); beep(2637,0.22,'sine',0.12,0.17); } function sLoss(){ beep(180,0.22,'sawtooth',0.18,0); beep(120,0.3,'sawtooth',0.16,0.06); } let svg,root,gGrid,gCandle,maPath,gPos,gXAxis,gYAxis; const VW=1000,VH=560,M={t:14,r:78,b:26,l:10}; const IW=VW-M.l-M.r, IH=VH-M.t-M.b; function buildChart(){  svg=d3.select('#chart'); svg.selectAll('*').remove();  const defs=svg.append('defs');  const f=defs.append('filter').attr('id','glow').attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%');  f.append('feGaussianBlur').attr('stdDeviation','3.6').attr('result','b');  const mg=f.append('feMerge'); mg.append('feMergeNode').attr('in','b'); mg.append('feMergeNode').attr('in','SourceGraphic');  root=svg.append('g').attr('transform',`translate(${M.l},${M.t})`);  gGrid=root.append('g'); gCandle=root.append('g');  maPath=root.append('g').append('path').attr('fill','none').attr('stroke','#7aa2ff').attr('stroke-width',2.2).attr('opacity',0.9).attr('stroke-linejoin','round');  gPos=root.append('g');  gXAxis=root.append('g').attr('transform',`translate(0,${IH})`);  gYAxis=root.append('g').attr('transform',`translate(${IW},0)`); } function netWorth(){ return S.cash + S.shares*S.price; } function step(){  const lv=LEVELS[Math.min(2,Math.floor(S.idx/20))];  const prev=S.candles.length?S.candles[S.candles.length-1].c:S.price;  S.momentum=S.momentum*0.85+(Math.random()-0.5)*lv.mstep;  const bias=lv.name==='CRASH'?-0.05:(lv.name==='CHOPPY'?-0.01:0.02);  let open=prev, shock=false;  if(Math.random()<lv.shock){ shock=true; const dir=Math.random()<0.42?1:-1; open=prev*(1+dir*(0.03+Math.random()*0.06)); }  const ret=S.momentum*lv.vol*1.3+(Math.random()-0.5)*2*lv.vol+bias*lv.vol;  let close=open*(1+ret); if(close<2)close=2;  const wu=Math.random()*lv.vol*open*0.9, wd=Math.random()*lv.vol*open*0.9;  const high=Math.max(open,close)+wu, low=Math.max(1,Math.min(open,close)-wd);  const t=new Date(BASE+S.idx*STEP);  const c={t:t,o:open,h:high,l:low,c:close,shock:shock,ma:null};  S.candles.push(c); S.price=close; S.idx++;  const n=S.candles.length;  if(n>=5){ let s=0; for(let i=n-5;i<n;i++)s+=S.candles[i].c; S.candles[n-1].ma=s/5; }  if(shock)sShock(); else sTick();  draw(); updateHUD();  if(S.long && netWorth()<MARGIN){ endGame('margin'); return; }  if(S.idx>=TOTAL){ endGame('done'); return; }  S.timer=setTimeout(step,TICKMS); } function buy(){  if(!S.running||S.long||!S.candles.length)return;  const p=S.price; S.shares=S.cash/p; S.entry=p; S.entryT=S.candles[S.candles.length-1].t.getTime(); S.cash=0; S.long=true;  sBuy(); draw(); updateHUD(); updateButtons(); } function sell(){  if(!S.running||!S.long)return;  const p=S.price; const proceeds=S.shares*p; const cost=S.shares*S.entry; const pnl=proceeds-cost; let bonus=0;  if(pnl>=0){ S.combo++; if(S.combo>S.maxCombo)S.maxCombo=S.combo; bonus=pnl*(S.combo-1)*0.1; sWin(); floatLabel('+'+fmt(pnl+bonus),'#3bf0a8'); }  else { S.combo=0; sLoss(); shake(); floatLabel(fmt(pnl),'#ff5d6c'); }  S.cash=proceeds+bonus; S.shares=0; S.long=false; S.entryT=0;  draw(); updateHUD(); updateButtons(); } function floatLabel(txt,col){  if(!root)return;  const x=IW-120, y0=IH*0.34;  root.append('text').attr('x',x).attr('y',y0).attr('fill',col).attr('font-size',38).attr('font-weight',800).attr('font-family','monospace').attr('text-anchor','middle').attr('filter','url(#glow)').text(txt)   .transition().duration(1200).ease(d3.easeCubicOut).attr('y',y0-120).style('opacity',0).remove(); } function shake(){ const a=$('#app'); a.classList.remove('shake'); void a.offsetWidth; a.classList.add('shake'); setTimeout(()=>a.classList.remove('shake'),520); } function styleAxis(g){ g.selectAll('text').attr('fill','#5d7187').attr('font-size',13).attr('font-family','monospace'); g.selectAll('.domain').attr('stroke','#27323f'); g.selectAll('.tick line').attr('stroke','#27323f'); } function draw(){  if(!S.candles.length)return;  const vis=S.candles.slice(Math.max(0,S.candles.length-WINDOW));  const x=d3.scaleTime().domain([new Date(vis[0].t.getTime()-STEP),new Date(vis[vis.length-1].t.getTime()+STEP)]).range([0,IW]);  const lo=d3.min(vis,d=>d.l), hi=d3.max(vis,d=>d.h);  const pad=(hi-lo)*0.12||1;  const y=d3.scaleLinear().domain([lo-pad,hi+pad]).range([IH,0]).nice();  const cw=Math.max(3,IW/WINDOW*0.6);  const yt=y.ticks(5);  gGrid.selectAll('line').data(yt).join('line').attr('x1',0).attr('x2',IW).attr('y1',d=>y(d)).attr('y2',d=>y(d)).attr('stroke','#141d27').attr('stroke-width',1);  const up='#3bf0a8',dn='#ff5d6c';  const sel=gCandle.selectAll('g.cd').data(vis,d=>d.t.getTime());  sel.exit().remove();  const en=sel.enter().append('g').attr('class','cd');  en.append('line').attr('class','wk');  en.append('rect').attr('class','bd').attr('rx',1);  const all=en.merge(sel).attr('transform',d=>`translate(${x(d.t)},0)`);  all.select('.wk').attr('x1',0).attr('x2',0).attr('y1',d=>y(d.h)).attr('y2',d=>y(d.l)).attr('stroke',d=>d.c>=d.o?up:dn).attr('stroke-width',1.5);  all.select('.bd').attr('x',-cw/2).attr('width',cw).attr('y',d=>Math.min(y(d.o),y(d.c))).attr('height',d=>Math.max(1.6,Math.abs(y(d.o)-y(d.c)))).attr('fill',d=>d.c>=d.o?up:dn).attr('opacity',d=>d.shock?1:0.95).attr('stroke',d=>d.shock?'#ffffff':'none').attr('stroke-width',d=>d.shock?1.4:0);  const maData=vis.filter(d=>d.ma!=null);  const ln=d3.line().x(d=>x(d.t)).y(d=>y(d.ma)).curve(d3.curveMonotoneX);  maPath.attr('d',maData.length>1?ln(maData):null);  gXAxis.call(d3.axisBottom(x).ticks(5).tickFormat(d3.timeFormat('%H:%M'))); styleAxis(gXAxis);  gYAxis.call(d3.axisRight(y).ticks(5).tickFormat(d3.format('$,.0f'))); styleAxis(gYAxis);  drawPos(x,y); } function drawPos(x,y){  gPos.selectAll('*').remove();  const last=S.candles[S.candles.length-1];  const cy=y(last.c);  const upc=last.c>=last.o?'#3bf0a8':'#ff5d6c';  gPos.append('line').attr('x1',0).attr('x2',IW).attr('y1',cy).attr('y2',cy).attr('stroke',upc).attr('stroke-dasharray','2 4').attr('stroke-width',1).attr('opacity',0.45);  gPos.append('rect').attr('x',IW).attr('y',cy-11).attr('width',M.r).attr('height',22).attr('fill',last.c>=last.o?'#12352a':'#3a1620').attr('rx',3);  gPos.append('text').attr('x',IW+M.r/2).attr('y',cy+4).attr('text-anchor','middle').attr('fill',upc).attr('font-size',13).attr('font-weight',700).attr('font-family','monospace').text(d3.format('$,.0f')(last.c));  if(S.long){   const ey=y(S.entry);   gPos.append('line').attr('x1',0).attr('x2',IW).attr('y1',ey).attr('y2',ey).attr('stroke','#ffce4d').attr('stroke-dasharray','7 5').attr('stroke-width',1.7).attr('opacity',0.9);   const ex=Math.max(0,Math.min(IW,x(new Date(S.entryT))));   gPos.append('circle').attr('class','ring').attr('cx',ex).attr('cy',ey);   gPos.append('circle').attr('cx',ex).attr('cy',ey).attr('r',6).attr('fill','#ffce4d').attr('filter','url(#glow)');   gPos.append('text').attr('x',6).attr('y',ey-9).attr('fill','#ffce4d').attr('font-size',13).attr('font-weight',700).attr('font-family','monospace').text('ENTRY '+d3.format('$,.0f')(S.entry));  } } function updateHUD(){  const last=S.candles.length?S.candles[S.candles.length-1]:null;  $('#nw').textContent=fmt(netWorth());  $('#cash').textContent=S.long?'IN TRADE':fmt(S.cash);  const pe=$('#price'); pe.textContent=fmt2(last?last.c:S.price); pe.style.color=last&&last.c>=last.o?'#3bf0a8':'#ff5d6c';  const lv=LEVELS[Math.min(2,Math.floor(Math.max(0,S.idx-1)/20))];  const lp=$('#lvl'); lp.textContent=lv.name; lp.style.background=lv.col; lp.style.color='#08110a';  $('#cnt').textContent=Math.min(S.idx,TOTAL)+' / '+TOTAL;  $('#bar').style.width=(Math.min(S.idx,TOTAL)/TOTAL*100)+'%';  const cb=$('#combo'); if(S.combo>1){cb.style.display='inline-block';cb.textContent='COMBO x'+S.combo;} else {cb.style.display='none';}  updateButtons(); } function updateButtons(){  const b=$('#buy'),s=$('#sell'),pnlEl=$('#pnl');  if(!S.running){ b.disabled=true; s.disabled=true; pnlEl.style.display='none'; return; }  b.disabled=S.long; s.disabled=!S.long;  if(S.long){   const up=S.shares*(S.price-S.entry);   s.innerHTML='CLOSE <span class=sub>'+(up>=0?'+':'')+fmt(up)+'</span>';   pnlEl.style.display='block';   pnlEl.textContent=(up>=0?'+ ':'- ')+fmt(Math.abs(up))+' UNREALIZED';   pnlEl.style.color=up>=0?'#ffce4d':'#ff5d6c';  } else { s.innerHTML='SELL'; pnlEl.style.display='none'; } } function startGame(){  fresh(); buildChart(); S.running=true;  $('#start').classList.add('hidden'); $('#over').classList.add('hidden');  ac();  step(); updateButtons(); } function showOver(reason,nw,prevBest,record){  const o=$('#over'); o.classList.remove('hidden');  const ban=$('#overban'), sub=$('#oversub');  if(reason==='margin'){ ban.textContent='MARGIN CALL'; ban.style.color='#ff5d6c'; sub.textContent='Wiped out — net worth dropped below '+fmt(MARGIN); shake(); }  else if(record){ ban.textContent='NEW RECORD'; ban.style.color='#ffce4d'; sub.textContent='You smashed your best net worth!'; }  else { ban.textContent='RUN COMPLETE'; ban.style.color='#3bf0a8'; sub.textContent='60 candles closed. Beat '+fmt(prevBest)+' to set a record.'; }  $('#ofinal').textContent=fmt(nw);  const pnl=nw-START_CASH; const pe=$('#opnl'); pe.textContent=(pnl>=0?'+ ':'- ')+fmt(Math.abs(pnl)); pe.style.color=pnl>=0?'#3bf0a8':'#ff5d6c';  $('#obest').textContent=fmt(Math.max(nw,prevBest));  $('#ocombo').textContent='x'+S.maxCombo;  $('#nrbanner').style.display=record?'block':'none'; } function endGame(reason){  S.running=false; if(S.timer){clearTimeout(S.timer);S.timer=null;}  if(S.long){ S.cash=S.shares*S.price; S.shares=0; S.long=false; S.entryT=0; }  draw(); updateHUD(); updateButtons();  const nw=S.cash;  const prevBest=+(localStorage.getItem('candlerush_best')||START_CASH);  const record= reason!=='margin' && nw>prevBest;  if(record){ localStorage.setItem('candlerush_best',Math.round(nw)); }  if(record)sWin(); else if(reason==='margin')sLoss();  showOver(reason,nw,prevBest,record); } $('#startbtn').addEventListener('click',startGame); $('#againbtn').addEventListener('click',startGame); $('#buy').addEventListener('click',buy); $('#sell').addEventListener('click',sell); window.addEventListener('keydown',e=>{ if(e.key==='b'||e.key==='B'){buy();} else if(e.key==='s'||e.key==='S'||e.key===' '){e.preventDefault();sell();} }); buildChart(); $('#sbest').textContent=fmt(+(localStorage.getItem('candlerush_best')||START_CASH));  </script> </body> </html>
