<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<title>Chess</title>
<style>
 html,body{height:100%;margin:0;background:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Open Sans','Helvetica Neue',sans-serif;color:#f1f1f1;display:flex;justify-content:center;align-items:center}
 #game-container{display:flex;flex-direction:column;align-items:center;gap:12px}
 h2{margin:0;font-weight:600;font-size:20px}
 /* Board grid */
 .board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);border:6px solid #5c3d2e;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,0.55);user-select:none;width:88vmin;max-width:560px;height:88vmin;max-height:560px;position:relative}
 .cell{display:flex;align-items:center;justify-content:center;font-size:calc(6vmin + 8px);line-height:1;width:100%;height:100%;cursor:pointer;transition:background 0.15s}
 .light{background:#d2b48c;background:linear-gradient(135deg,#d9ba94 0%,#c19a6b 100%)}
 .dark{background:#a07b54;background:linear-gradient(135deg,#8a6945 0%,#6f4f2f 100%)}
 .cell:hover{filter:brightness(1.08)}
 .highlight{box-shadow:inset 0 0 0 4px rgba(50,205,50,0.65)}
 .selected{box-shadow:inset 0 0 0 4px rgba(75,155,255,0.9)}
 .in-check{box-shadow:inset 0 0 0 6px rgba(255,0,0,0.8)}
 /* Controls */
 #controls{display:flex;gap:12px}
 button{padding:8px 18px;border:none;border-radius:6px;background:#374151;color:#f9fafb;font-size:16px;font-weight:600;cursor:pointer;transition:background 0.2s,opacity 0.2s}
 button:hover:enabled{background:#4b5563}
 button:disabled{opacity:0.45;cursor:not-allowed}
 /* Modal */
 .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:999}
 .hidden{display:none}
 .modal-content{background:#1e293b;padding:20px 30px;border-radius:10px;text-align:center;min-width:260px;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
 .promo-options{display:flex;gap:12px;margin-top:14px;justify-content:center}
 .promo-btn{font-size:36px;line-height:1;background:none;border:none;color:#fff;cursor:pointer;transition:transform 0.15s}
 .promo-btn:hover{transform:scale(1.2)}
 /* Coordinates */
 .coord{position:absolute;font-size:11px;font-weight:600;color:#e2e8f0}
 .file{bottom:2px;right:4px}
 .rank{top:2px;left:4px}
 @media(prefers-color-scheme:light){html,body{background:#f5f5f5;color:#1a1a1a}}
</style>
</head>
<body>
<!-- Compact feedback control -->
<a href='https://mchatai.com/feedback?dna=49571777-968A-42DE-804B-5B9EBC5204FC&v=1.0.0&src=ChessMiniApp' target='_blank' aria-label='Provide Feedback / Report Bug' title='Provide Feedback / Report Bug' style='position: fixed; top: 14px; right: 14px; z-index: 9999; width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; background: rgba(127,127,127,0.16); color: inherit; border: 1px solid rgba(127,127,127,0.28); text-decoration: none; font-weight: 700; font-size: 16px;'>?</a>
<div id='game-container'>
  <h2 id='turn-indicator'>White to move</h2>
  <div id='board' class='board' aria-label='Chess board'></div>
  <div id='controls'>
    <button id='undo-btn' disabled>Undo</button>
    <button id='restart-btn'>Restart</button>
  </div>
</div>
<!-- Promotion Modal -->
<div id='promotion-modal' class='modal hidden' role='dialog' aria-modal='true'>
  <div class='modal-content'>
    <p>Select promotion piece</p>
    <div class='promo-options'>
      <button class='promo-btn' data-piece='q'>&#9813;</button>
      <button class='promo-btn' data-piece='r'>&#9814;</button>
      <button class='promo-btn' data-piece='b'>&#9815;</button>
      <button class='promo-btn' data-piece='n'>&#9816;</button>
    </div>
  </div>
</div>
<!-- Game Over Modal -->
<div id='game-over' class='modal hidden' role='dialog' aria-modal='true'>
  <div class='modal-content'>
    <h2 id='game-over-text'></h2>
    <div style='margin-top:16px;display:flex;gap:12px;justify-content:center'>
      <button id='restart-btn-2'>Restart</button>
      <button id='close-overlay-btn'>Close</button>
    </div>
  </div>
</div>
<script>
/*
 * Complete inline chess engine for mChatAI Chess mini-app.
 * Implements all standard chess rules: piece movement, captures, castling,
 * en passant, pawn promotion, check/checkmate/stalemate detection,
 * 50-move rule, insufficient material, threefold repetition.
 *
 * Uses 0x88 board representation for efficient off-board detection.
 */
(function() {

  var STARTING_FEN = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';

  var PIECE_OFFSETS = {
    n: [-18, -33, -31, -14, 18, 33, 31, 14],
    b: [-17, -15, 17, 15],
    r: [-16, 1, 16, -1],
    q: [-17, -16, -15, -1, 1, 15, 16, 17],
    k: [-17, -16, -15, -1, 1, 15, 16, 17]
  };

  var KSIDE_CASTLE = 1;
  var QSIDE_CASTLE = 2;

  // Build square lookup tables for 0x88 board
  var SQUARES = {};
  var SQUARE_NAMES = [];
  var FILES_STR = 'abcdefgh';
  for (var ri = 0; ri < 8; ri++) {
    for (var fi = 0; fi < 8; fi++) {
      var sqName = FILES_STR[fi] + (ri + 1);
      var sqIdx = ri * 16 + fi;
      SQUARES[sqName] = sqIdx;
      SQUARE_NAMES[sqIdx] = sqName;
    }
  }

  function rank_of(sq) { return sq >> 4; }
  function file_of(sq) { return sq & 0x0f; }
  function is_valid_square(sq) { return (sq >= 0) && ((sq & 0x88) === 0); }
  function algebraic(sq) { return SQUARE_NAMES[sq]; }
  function sq_from_algebraic(s) { return SQUARES[s]; }
  function swap_color(c) { return c === 'w' ? 'b' : 'w'; }

  function Chess(fen) {
    var board = new Array(128);
    var turn = 'w';
    var castling = { w: 0, b: 0 };
    var ep_square = -1;
    var half_moves = 0;
    var move_number = 1;
    var kings = { w: -1, b: -1 };
    var history_stack = [];
    var position_counts = {};

    // --- Internal helpers ---

    function clear_board() {
      for (var i = 0; i < 128; i++) board[i] = null;
      turn = 'w';
      castling = { w: 0, b: 0 };
      ep_square = -1;
      half_moves = 0;
      move_number = 1;
      kings = { w: -1, b: -1 };
      history_stack = [];
      position_counts = {};
    }

    function put_piece(piece, sq) {
      board[sq] = piece;
      if (piece.type === 'k') kings[piece.color] = sq;
    }

    function position_key() {
      var key = '';
      for (var i = 0; i < 128; i++) {
        if (i & 0x88) { i += 7; continue; }
        var p = board[i];
        key += p ? (p.color === 'w' ? p.type.toUpperCase() : p.type) : '.';
      }
      key += turn + castling.w + castling.b + ep_square;
      return key;
    }

    function inc_pos_count() {
      var key = position_key();
      position_counts[key] = (position_counts[key] || 0) + 1;
    }

    function dec_pos_count() {
      var key = position_key();
      if (position_counts[key]) {
        position_counts[key]--;
        if (position_counts[key] <= 0) delete position_counts[key];
      }
    }

    function load_fen(fen_str) {
      if (fen_str === 'startpos') fen_str = STARTING_FEN;
      clear_board();

      var parts = fen_str.split(/\s+/);
      var rows = parts[0].split('/');

      for (var row = 7; row >= 0; row--) {
        var row_str = rows[7 - row];
        var col = 0;
        for (var ci = 0; ci < row_str.length; ci++) {
          var ch = row_str[ci];
          if (ch >= '1' && ch <= '8') {
            col += parseInt(ch, 10);
          } else {
            var color = ch === ch.toUpperCase() ? 'w' : 'b';
            var type = ch.toLowerCase();
            put_piece({ type: type, color: color }, row * 16 + col);
            col++;
          }
        }
      }

      turn = parts.length > 1 ? parts[1] : 'w';

      castling = { w: 0, b: 0 };
      if (parts.length > 2 && parts[2] !== '-') {
        if (parts[2].indexOf('K') !== -1) castling.w |= KSIDE_CASTLE;
        if (parts[2].indexOf('Q') !== -1) castling.w |= QSIDE_CASTLE;
        if (parts[2].indexOf('k') !== -1) castling.b |= KSIDE_CASTLE;
        if (parts[2].indexOf('q') !== -1) castling.b |= QSIDE_CASTLE;
      }

      ep_square = -1;
      if (parts.length > 3 && parts[3] !== '-') {
        ep_square = sq_from_algebraic(parts[3]);
        if (ep_square === undefined) ep_square = -1;
      }

      half_moves = parts.length > 4 ? parseInt(parts[4], 10) : 0;
      move_number = parts.length > 5 ? parseInt(parts[5], 10) : 1;

      history_stack = [];
      position_counts = {};
      inc_pos_count();
      return true;
    }

    function generate_fen() {
      var fen = '';
      for (var row = 7; row >= 0; row--) {
        var empty = 0;
        for (var col = 0; col < 8; col++) {
          var piece = board[row * 16 + col];
          if (piece) {
            if (empty > 0) { fen += empty; empty = 0; }
            fen += piece.color === 'w' ? piece.type.toUpperCase() : piece.type;
          } else {
            empty++;
          }
        }
        if (empty > 0) fen += empty;
        if (row > 0) fen += '/';
      }

      fen += ' ' + turn;

      var c_str = '';
      if (castling.w & KSIDE_CASTLE) c_str += 'K';
      if (castling.w & QSIDE_CASTLE) c_str += 'Q';
      if (castling.b & KSIDE_CASTLE) c_str += 'k';
      if (castling.b & QSIDE_CASTLE) c_str += 'q';
      fen += ' ' + (c_str || '-');

      fen += ' ' + (ep_square !== -1 ? algebraic(ep_square) : '-');
      fen += ' ' + half_moves;
      fen += ' ' + move_number;

      return fen;
    }

    // --- Attack detection ---

    function is_attacked(sq, by_color) {
      // Pawn attacks (check squares a pawn of by_color would stand on to attack sq)
      var pawn_dirs = by_color === 'w' ? [15, 17] : [-15, -17];
      for (var pi = 0; pi < 2; pi++) {
        var psq = sq - pawn_dirs[pi];
        if (is_valid_square(psq)) {
          var pp = board[psq];
          if (pp && pp.type === 'p' && pp.color === by_color) return true;
        }
      }

      // Knight
      var n_offs = PIECE_OFFSETS.n;
      for (var ni = 0; ni < n_offs.length; ni++) {
        var nsq = sq + n_offs[ni];
        if (is_valid_square(nsq)) {
          var np = board[nsq];
          if (np && np.type === 'n' && np.color === by_color) return true;
        }
      }

      // King
      var k_offs = PIECE_OFFSETS.k;
      for (var ki = 0; ki < k_offs.length; ki++) {
        var ksq = sq + k_offs[ki];
        if (is_valid_square(ksq)) {
          var kp = board[ksq];
          if (kp && kp.type === 'k' && kp.color === by_color) return true;
        }
      }

      // Bishop/Queen on diagonals
      var diags = PIECE_OFFSETS.b;
      for (var di = 0; di < diags.length; di++) {
        var dsq = sq + diags[di];
        while (is_valid_square(dsq)) {
          var dp = board[dsq];
          if (dp) {
            if (dp.color === by_color && (dp.type === 'b' || dp.type === 'q')) return true;
            break;
          }
          dsq += diags[di];
        }
      }

      // Rook/Queen on ranks/files
      var straights = PIECE_OFFSETS.r;
      for (var si = 0; si < straights.length; si++) {
        var ssq = sq + straights[si];
        while (is_valid_square(ssq)) {
          var sp = board[ssq];
          if (sp) {
            if (sp.color === by_color && (sp.type === 'r' || sp.type === 'q')) return true;
            break;
          }
          ssq += straights[si];
        }
      }

      return false;
    }

    function king_in_check(color) {
      var ksq = kings[color];
      if (ksq === -1) return false;
      return is_attacked(ksq, swap_color(color));
    }

    // --- Move object creation ---

    function mk_move(from, to, piece, captured, promotion, is_castle, is_bigpawn, is_ep) {
      return {
        from: algebraic(from),
        to: algebraic(to),
        piece: piece.type,
        color: piece.color,
        captured: captured ? captured.type : null,
        promotion: promotion || null,
        flags: (is_castle ? 'c' : '') + (is_ep ? 'e' : '') + (is_bigpawn ? 'b' : '') + (captured ? 'x' : '') + (promotion ? 'p' : ''),
        _from: from,
        _to: to,
        _castle: is_castle,
        _ep: is_ep,
        _bigpawn: is_bigpawn
      };
    }

    // --- Pseudo-legal move generation ---

    function gen_pseudo(options) {
      var moves = [];
      var us = turn;
      var them = swap_color(us);
      var only_sq = (options && options.square) ? sq_from_algebraic(options.square) : -1;

      for (var sq = 0; sq < 128; sq++) {
        if (sq & 0x88) { sq += 7; continue; }
        if (only_sq !== -1 && sq !== only_sq) continue;

        var piece = board[sq];
        if (!piece || piece.color !== us) continue;

        if (piece.type === 'p') {
          var dir = us === 'w' ? 16 : -16;
          var startRank = us === 'w' ? 1 : 6;
          var promoRank = us === 'w' ? 7 : 0;

          // Single push
          var ahead1 = sq + dir;
          if (is_valid_square(ahead1) && !board[ahead1]) {
            if (rank_of(ahead1) === promoRank) {
              moves.push(mk_move(sq, ahead1, piece, null, 'q', false, false, false));
              moves.push(mk_move(sq, ahead1, piece, null, 'r', false, false, false));
              moves.push(mk_move(sq, ahead1, piece, null, 'b', false, false, false));
              moves.push(mk_move(sq, ahead1, piece, null, 'n', false, false, false));
            } else {
              moves.push(mk_move(sq, ahead1, piece, null, null, false, false, false));
            }
            // Double push
            if (rank_of(sq) === startRank) {
              var ahead2 = sq + dir * 2;
              if (is_valid_square(ahead2) && !board[ahead2]) {
                moves.push(mk_move(sq, ahead2, piece, null, null, false, true, false));
              }
            }
          }

          // Captures
          var cap_dirs = us === 'w' ? [15, 17] : [-15, -17];
          for (var ci = 0; ci < 2; ci++) {
            var csq = sq + cap_dirs[ci];
            if (!is_valid_square(csq)) continue;
            if (board[csq] && board[csq].color === them) {
              if (rank_of(csq) === promoRank) {
                moves.push(mk_move(sq, csq, piece, board[csq], 'q', false, false, false));
                moves.push(mk_move(sq, csq, piece, board[csq], 'r', false, false, false));
                moves.push(mk_move(sq, csq, piece, board[csq], 'b', false, false, false));
                moves.push(mk_move(sq, csq, piece, board[csq], 'n', false, false, false));
              } else {
                moves.push(mk_move(sq, csq, piece, board[csq], null, false, false, false));
              }
            } else if (csq === ep_square) {
              moves.push(mk_move(sq, csq, piece, { type: 'p', color: them }, null, false, false, true));
            }
          }

        } else if (piece.type === 'n') {
          var noffs = PIECE_OFFSETS.n;
          for (var ni = 0; ni < noffs.length; ni++) {
            var nt = sq + noffs[ni];
            if (!is_valid_square(nt)) continue;
            var ntp = board[nt];
            if (ntp && ntp.color === us) continue;
            moves.push(mk_move(sq, nt, piece, ntp, null, false, false, false));
          }

        } else if (piece.type === 'k') {
          var koffs = PIECE_OFFSETS.k;
          for (var koi = 0; koi < koffs.length; koi++) {
            var kt = sq + koffs[koi];
            if (!is_valid_square(kt)) continue;
            var ktp = board[kt];
            if (ktp && ktp.color === us) continue;
            moves.push(mk_move(sq, kt, piece, ktp, null, false, false, false));
          }

          // Castling (only if king not in check)
          if (!is_attacked(sq, them)) {
            if (castling[us] & KSIDE_CASTLE) {
              var ks1 = sq + 1, ks2 = sq + 2, ksR = sq + 3;
              if (!board[ks1] && !board[ks2] &&
                  board[ksR] && board[ksR].type === 'r' && board[ksR].color === us &&
                  !is_attacked(ks1, them) && !is_attacked(ks2, them)) {
                moves.push(mk_move(sq, ks2, piece, null, null, true, false, false));
              }
            }
            if (castling[us] & QSIDE_CASTLE) {
              var qs1 = sq - 1, qs2 = sq - 2, qs3 = sq - 3, qsR = sq - 4;
              if (!board[qs1] && !board[qs2] && !board[qs3] &&
                  board[qsR] && board[qsR].type === 'r' && board[qsR].color === us &&
                  !is_attacked(qs1, them) && !is_attacked(qs2, them)) {
                moves.push(mk_move(sq, qs2, piece, null, null, true, false, false));
              }
            }
          }

        } else {
          // Sliding pieces: b, r, q
          var sdirs = PIECE_OFFSETS[piece.type];
          for (var sdi = 0; sdi < sdirs.length; sdi++) {
            var ssq = sq + sdirs[sdi];
            while (is_valid_square(ssq)) {
              var sp = board[ssq];
              if (sp) {
                if (sp.color !== us) moves.push(mk_move(sq, ssq, piece, sp, null, false, false, false));
                break;
              }
              moves.push(mk_move(sq, ssq, piece, null, null, false, false, false));
              ssq += sdirs[sdi];
            }
          }
        }
      }

      return moves;
    }

    // --- Make / unmake moves on the board ---

    function do_move(move) {
      var from_sq = move._from;
      var to_sq = move._to;
      var us = turn;
      var them = swap_color(us);

      // Save full undo state
      var state = {
        from_piece: board[from_sq] ? { type: board[from_sq].type, color: board[from_sq].color } : null,
        to_piece: board[to_sq] ? { type: board[to_sq].type, color: board[to_sq].color } : null,
        turn: turn,
        cw: castling.w, cb: castling.b,
        ep: ep_square,
        hm: half_moves, mn: move_number,
        kw: kings.w, kb: kings.b,
        move: move,
        ep_cap_sq: -1, ep_cap_piece: null,
        rook_from: -1, rook_to: -1, rook_piece: null
      };

      dec_pos_count();

      var piece = board[from_sq];
      var captured = board[to_sq];

      // En passant capture: remove the actual pawn
      if (move._ep) {
        var ep_psq = us === 'w' ? to_sq - 16 : to_sq + 16;
        state.ep_cap_sq = ep_psq;
        state.ep_cap_piece = board[ep_psq] ? { type: board[ep_psq].type, color: board[ep_psq].color } : null;
        board[ep_psq] = null;
      }

      // Move piece
      board[to_sq] = piece;
      board[from_sq] = null;

      // Promotion
      if (move.promotion) {
        board[to_sq] = { type: move.promotion, color: us };
      }

      // King tracking
      if (piece.type === 'k') {
        kings[us] = to_sq;
      }

      // Castling: move rook
      if (move._castle) {
        var rf, rt;
        if (to_sq > from_sq) { rf = from_sq + 3; rt = from_sq + 1; } // kingside
        else { rf = from_sq - 4; rt = from_sq - 1; }                  // queenside
        state.rook_from = rf;
        state.rook_to = rt;
        state.rook_piece = board[rf] ? { type: board[rf].type, color: board[rf].color } : null;
        board[rt] = board[rf];
        board[rf] = null;
      }

      // En passant square update
      ep_square = move._bigpawn ? (us === 'w' ? from_sq + 16 : from_sq - 16) : -1;

      // Castling rights
      if (piece.type === 'k') castling[us] = 0;
      if (piece.type === 'r') {
        if (from_sq === (us === 'w' ? 0 : 112)) castling[us] &= ~QSIDE_CASTLE;
        if (from_sq === (us === 'w' ? 7 : 119)) castling[us] &= ~KSIDE_CASTLE;
      }
      if (captured && captured.type === 'r') {
        if (to_sq === (them === 'w' ? 0 : 112)) castling[them] &= ~QSIDE_CASTLE;
        if (to_sq === (them === 'w' ? 7 : 119)) castling[them] &= ~KSIDE_CASTLE;
      }

      // Half-move clock
      half_moves = (piece.type === 'p' || captured || move._ep) ? 0 : half_moves + 1;

      // Full move number
      if (us === 'b') move_number++;

      // Switch turn
      turn = them;
      inc_pos_count();
      history_stack.push(state);

      return move;
    }

    function undo_move() {
      if (history_stack.length === 0) return null;
      var state = history_stack.pop();
      var move = state.move;
      var from_sq = move._from;
      var to_sq = move._to;

      dec_pos_count();

      // Restore from-square piece
      board[from_sq] = state.from_piece ? { type: state.from_piece.type, color: state.from_piece.color } : null;
      // Restore to-square piece (captured or null)
      board[to_sq] = state.to_piece ? { type: state.to_piece.type, color: state.to_piece.color } : null;

      // Restore EP captured pawn
      if (state.ep_cap_sq !== -1 && state.ep_cap_piece) {
        board[state.ep_cap_sq] = { type: state.ep_cap_piece.type, color: state.ep_cap_piece.color };
      }

      // Restore castling rook
      if (state.rook_from !== -1) {
        board[state.rook_from] = state.rook_piece ? { type: state.rook_piece.type, color: state.rook_piece.color } : null;
        board[state.rook_to] = null;
      }

      turn = state.turn;
      castling.w = state.cw;
      castling.b = state.cb;
      ep_square = state.ep;
      half_moves = state.hm;
      move_number = state.mn;
      kings.w = state.kw;
      kings.b = state.kb;

      inc_pos_count();
      return move;
    }

    // --- Legal move generation (filter pseudo-legal for check) ---

    function gen_legal(options) {
      var pseudo = gen_pseudo(options);
      var legal = [];
      var us = turn;
      for (var i = 0; i < pseudo.length; i++) {
        do_move(pseudo[i]);
        if (!king_in_check(us)) legal.push(pseudo[i]);
        undo_move();
      }
      return legal;
    }

    // --- Draw detection helpers ---

    function insufficient_material() {
      var w_pieces = [], b_pieces = [];
      var w_bsq = [], b_bsq = [];
      for (var sq = 0; sq < 128; sq++) {
        if (sq & 0x88) { sq += 7; continue; }
        var p = board[sq];
        if (!p || p.type === 'k') continue;
        if (p.color === 'w') {
          w_pieces.push(p.type);
          if (p.type === 'b') w_bsq.push((rank_of(sq) + file_of(sq)) % 2);
        } else {
          b_pieces.push(p.type);
          if (p.type === 'b') b_bsq.push((rank_of(sq) + file_of(sq)) % 2);
        }
      }
      if (w_pieces.length === 0 && b_pieces.length === 0) return true;
      if (w_pieces.length === 0 && b_pieces.length === 1 && (b_pieces[0] === 'n' || b_pieces[0] === 'b')) return true;
      if (b_pieces.length === 0 && w_pieces.length === 1 && (w_pieces[0] === 'n' || w_pieces[0] === 'b')) return true;
      if (w_pieces.length === 1 && b_pieces.length === 1 && w_pieces[0] === 'b' && b_pieces[0] === 'b' && w_bsq[0] === b_bsq[0]) return true;
      return false;
    }

    function threefold() {
      var key = position_key();
      return (position_counts[key] || 0) >= 3;
    }

    // ===== PUBLIC API =====

    this.clear = function() { clear_board(); };

    this.reset = function() { load_fen(STARTING_FEN); };

    this.load = function(fen_str) { return load_fen(fen_str); };

    this.fen = function() { return generate_fen(); };

    this.turn = function() { return turn; };

    this.board = function() {
      var result = [];
      for (var row = 7; row >= 0; row--) {
        var r = [];
        for (var col = 0; col < 8; col++) {
          var p = board[row * 16 + col];
          r.push(p ? { type: p.type, color: p.color } : null);
        }
        result.push(r);
      }
      return result;
    };

    this.get = function(square) {
      var sq = sq_from_algebraic(square);
      if (sq === undefined) return null;
      var p = board[sq];
      return p ? { type: p.type, color: p.color } : null;
    };

    this.moves = function(options) {
      var legal = gen_legal(options);
      if (options && options.verbose) {
        return legal.map(function(m) {
          return { from: m.from, to: m.to, piece: m.piece, color: m.color, captured: m.captured, promotion: m.promotion, flags: m.flags };
        });
      }
      return legal.map(function(m) {
        if (m._castle) return m._to > m._from ? 'O-O' : 'O-O-O';
        var san = '';
        if (m.piece === 'p') {
          if (m.captured) san += m.from[0] + 'x';
          san += m.to;
          if (m.promotion) san += '=' + m.promotion.toUpperCase();
        } else {
          san += m.piece.toUpperCase();
          if (m.captured) san += 'x';
          san += m.to;
        }
        return san;
      });
    };

    this.move = function(input) {
      if (!input || typeof input !== 'object') return null;
      var legal = gen_legal();
      var from_str = input.from, to_str = input.to, promo = input.promotion || null;
      for (var i = 0; i < legal.length; i++) {
        var m = legal[i];
        if (m.from === from_str && m.to === to_str) {
          if (m.promotion) {
            if (promo && m.promotion === promo) return do_move(m);
          } else {
            return do_move(m);
          }
        }
      }
      return null;
    };

    this.undo = function() { return undo_move(); };

    this.in_check = function() { return king_in_check(turn); };

    this.in_checkmate = function() { return king_in_check(turn) && gen_legal().length === 0; };

    this.in_stalemate = function() { return !king_in_check(turn) && gen_legal().length === 0; };

    this.in_draw = function() { return this.in_stalemate() || insufficient_material() || half_moves >= 100 || threefold(); };

    this.game_over = function() { return this.in_checkmate() || this.in_draw(); };

    // Initialize
    load_fen(fen || STARTING_FEN);
  }

  if (typeof exports === 'object') module.exports = Chess;
  else window.Chess = Chess;

})();
</script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const boardEl=document.getElementById('board');
  const turnEl=document.getElementById('turn-indicator');
  const undoBtn=document.getElementById('undo-btn');
  const restartBtn=document.getElementById('restart-btn');
  const restartBtn2=document.getElementById('restart-btn-2');
  const closeOverlayBtn=document.getElementById('close-overlay-btn');
  const promoModal=document.getElementById('promotion-modal');
  const gameOverModal=document.getElementById('game-over');
  const gameOverText=document.getElementById('game-over-text');
  let awaitingPromotion=null; // {from,to}

  const unicodePieces={
    w:{k:'\u2654',q:'\u2655',r:'\u2656',b:'\u2657',n:'\u2658',p:'\u2659'},
    b:{k:'\u265A',q:'\u265B',r:'\u265C',b:'\u265D',n:'\u265E',p:'\u265F'}
  };

  let chess=new Chess();
  let history=[];

  const files=['a','b','c','d','e','f','g','h'];

  function createBoard(){
    boardEl.innerHTML='';
    for(let rank=8;rank>=1;rank--){
      for(let fileIndex=0;fileIndex<8;fileIndex++){
        const file=files[fileIndex];
        const square=file+rank;
        const cell=document.createElement('div');
        cell.id=square;
        cell.className='cell '+(((rank+fileIndex)%2===0)?'light':'dark');
        cell.setAttribute('role','button');
        cell.setAttribute('aria-label',square);
        if(rank===1){const coord=document.createElement('span');coord.textContent=file;coord.className='coord file';cell.appendChild(coord);}
        if(fileIndex===0){const coord=document.createElement('span');coord.textContent=rank;coord.className='coord rank';cell.appendChild(coord);}
        cell.addEventListener('click',()=>onSquareClick(square));
        boardEl.appendChild(cell);
      }
    }
  }

  function render(){
    document.querySelectorAll('.cell').forEach(c=>{c.classList.remove('highlight','selected','in-check');c.textContent='';});
    const board=chess.board();
    for(let rank=0;rank<8;rank++){
      for(let file=0;file<8;file++){
        const piece=board[rank][file];
        if(piece){
          const square=files[file]+(8-rank);
          const cell=document.getElementById(square);
          cell.textContent=unicodePieces[piece.color][piece.type];
          cell.style.pointerEvents='auto';
        }
      }
    }
    if(chess.in_check()){
      const kingSq=findKingSquare(chess.turn());
      if(kingSq){document.getElementById(kingSq).classList.add('in-check');}
    }
    if(chess.game_over()){
      turnEl.textContent='Game Over';
    }else{
      turnEl.textContent=(chess.turn()==='w'?'White':'Black')+' to move';
    }
    undoBtn.disabled=history.length<2||chess.game_over();
  }

  function findKingSquare(color){
    const board=chess.board();
    for(let r=0;r<8;r++){
      for(let f=0;f<8;f++){
        const p=board[r][f];
        if(p&&p.type==='k'&&p.color===color){return files[f]+(8-r);}
      }
    }
    return null;
  }

  let selected=null;
  let validDestinations=[];

  function onSquareClick(square){
    if(chess.game_over())return;
    if(awaitingPromotion)return;
    if(chess.turn()!=='w')return;

    if(selected){
      if(validDestinations.includes(square)){
        makePlayerMove(selected,square);
        clearSelection();
      }else if(selected===square){
        clearSelection();
      }else if(isOwnPiece(square)){
        selectSquare(square);
      }else{
        clearSelection();
      }
    }else if(isOwnPiece(square)){
      selectSquare(square);
    }
  }

  function isOwnPiece(square){
    const piece=chess.get(square);
    return piece&&piece.color==='w';
  }

  function selectSquare(square){
    clearSelection();
    selected=square;
    document.getElementById(square).classList.add('selected');
    validDestinations=chess.moves({square,verbose:true}).map(m=>m.to);
    validDestinations.forEach(dest=>{document.getElementById(dest).classList.add('highlight');});
  }

  function clearSelection(){
    document.querySelectorAll('.cell').forEach(c=>c.classList.remove('highlight','selected'));
    selected=null;validDestinations=[];
  }

  function makePlayerMove(from,to){
    let moveObj={from,to};
    const piece=chess.get(from);
    if(piece&&piece.type==='p'&&to[1]==='8'){
      awaitingPromotion={from,to};
      showPromotionModal();
      return;
    }
    finalizeMove(moveObj);
  }

  function finalizeMove(move){
    const result=chess.move(move);
    if(result){
      history.push(result);
      render();
      if(checkGameOver())return;
      setTimeout(()=>aiMove(),400);
    }
  }

  function showPromotionModal(){
    promoModal.classList.remove('hidden');
  }

  document.querySelectorAll('.promo-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const piece=btn.dataset.piece;
      promoModal.classList.add('hidden');
      if(awaitingPromotion){
        finalizeMove({from:awaitingPromotion.from,to:awaitingPromotion.to,promotion:piece});
        awaitingPromotion=null;
      }
    });
  });

  function aiMove(){
    if(chess.turn()!=='b'||chess.game_over())return;
    const moves=chess.moves({verbose:true});
    if(!moves.length){checkGameOver();return;}
    const move=moves[Math.floor(Math.random()*moves.length)];
    chess.move(move);
    history.push(move);
    render();
    checkGameOver();
  }

  function checkGameOver(){
    if(chess.in_checkmate()){
      endGame((chess.turn()==='w'?'Black':'White')+' wins by Checkmate');return!0;
    }else if(chess.in_stalemate()||chess.in_draw()){
      endGame('Draw');return!0;
    }
    return!1;
  }

  function endGame(text){
    gameOverText.textContent=text;
    gameOverModal.classList.remove('hidden');
    render();
  }

  undoBtn.addEventListener('click',()=>{
    if(history.length>=2){chess.undo();chess.undo();history.pop();history.pop();render();clearSelection();}
  });

  function restart(){
    chess.reset();history=[];clearSelection();promoModal.classList.add('hidden');gameOverModal.classList.add('hidden');render();}

  restartBtn.addEventListener('click',restart);
  restartBtn2.addEventListener('click',()=>{gameOverModal.classList.add('hidden');restart();});
  closeOverlayBtn.addEventListener('click',()=>gameOverModal.classList.add('hidden'));

  createBoard();
  chess.reset();
  render();
});
</script>

  pill.id = 'mchatai-fb-pill';
  pill.innerHTML = '<span aria-hidden="true">💬</span><span>Feedback</span>';
  pill.title = 'Send feedback about this game';
  pill.setAttribute('role', 'button');
  pill.setAttribute('aria-label', 'Send feedback');

  var panel = document.createElement('div');
  panel.id = 'mchatai-fb-panel';
  panel.innerHTML = [
    '<header>',
    '  <span>Send feedback</span>',
    '  <div style="display:flex;align-items:center;gap:10px;">',
    '    <button id="mchatai-fb-user" type="button" title="Sign in to enable screenshots"><span aria-hidden="true">👤</span><span class="mchatai-fb-user-name">anonymous</span></button>',
    '    <button id="mchatai-fb-close" aria-label="Close feedback panel">×</button>',
    '  </div>',
    '</header>',
    '<div id="mchatai-fb-types">',
    '  <button class="mchatai-fb-type active" data-type="bug">🐞 Bug</button>',
    '  <button class="mchatai-fb-type" data-type="feature">✨ Idea</button>',
    '  <button class="mchatai-fb-type" data-type="other">💬 Other</button>',
    '</div>',
    '<div id="mchatai-fb-rating" role="radiogroup" aria-label="Rate this product">',
    '  <span id="mchatai-fb-rating-label">Rating:</span>',
    '  <button type="button" class="mchatai-fb-star" data-value="1" role="radio" aria-label="1 star" aria-checked="false">☆</button>',
    '  <button type="button" class="mchatai-fb-star" data-value="2" role="radio" aria-label="2 stars" aria-checked="false">☆</button>',
    '  <button type="button" class="mchatai-fb-star" data-value="3" role="radio" aria-label="3 stars" aria-checked="false">☆</button>',
    '  <button type="button" class="mchatai-fb-star" data-value="4" role="radio" aria-label="4 stars" aria-checked="false">☆</button>',
    '  <button type="button" class="mchatai-fb-star" data-value="5" role="radio" aria-label="5 stars" aria-checked="false">☆</button>',
    '  <button type="button" id="mchatai-fb-rating-clear" hidden>clear</button>',
    '</div>',
    '<textarea id="mchatai-fb-text" placeholder="What happened? What did you expect?" maxlength="2000"></textarea>',
    '<div id="mchatai-fb-screenshot-row" style="display:none;padding:0 10px;">',
    '  <button id="mchatai-fb-shot-btn" type="button">📸 Attach screenshot</button>',
    '  <div id="mchatai-fb-shot-preview-wrap" style="display:none;"><img id="mchatai-fb-shot-preview" alt="screenshot preview" /><button id="mchatai-fb-shot-remove" type="button" aria-label="Remove screenshot">×</button></div>',
    '</div>',
    '<div id="mchatai-fb-status" aria-live="polite"></div>',
    '<div id="mchatai-fb-actions">',
    '  <span id="mchatai-fb-meta"></span>',
    '  <button id="mchatai-fb-send" disabled>Send</button>',
    '</div>',
  ].join('');

  // Back-to-hub pill. The hub houses mini-apps, games, agents, skills, pipelines —
  // "Hub" is the right word. Icon is a house, not an arrow, since it's a home
  // button, not a linear back button. Rendered as an <a> so right-click → new tab works.
  var backPill = document.createElement('a');
  backPill.id = 'mchatai-back-pill';
  backPill.href = 'https://mchatai.com/hub';
  backPill.title = 'Back to Hub';
  backPill.setAttribute('aria-label', 'Back to Hub');
  backPill.innerHTML = [
    '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">',
    '  <path d="M2 7l6-5 6 5v7a1 1 0 0 1-1 1h-3v-5H6v5H3a1 1 0 0 1-1-1V7z"/>',
    '</svg>',
    '<span>Hub</span>'
  ].join('');

  document.body.appendChild(backPill);
  document.body.appendChild(pill);
  document.body.appendChild(panel);

  // ── Idle fade ────────────────────────────────────────────────────────────
  var idleTimer = null;
  function bumpActivity() {
    pill.classList.remove('idle');
    backPill.classList.remove('idle');
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(function () {
      pill.classList.add('idle');
      backPill.classList.add('idle');
    }, 3000);
  }
  ['mousemove', 'keydown', 'touchstart', 'scroll'].forEach(function (ev) {
    window.addEventListener(ev, bumpActivity, { passive: true });
  });
  bumpActivity();

  // ── Open / close ─────────────────────────────────────────────────────────
  async function openPanel() {
    panel.classList.add('open');
    pill.style.display = 'none';
    var meta = document.getElementById('mchatai-fb-meta');
    meta.textContent = slug ? slug : 'feedback';
    setTimeout(function () { document.getElementById('mchatai-fb-text').focus(); }, 50);
    // Phase RT.2 follow-up: refresh the user chip in case the token expired
    // or the user signed in a different tab between panel opens.
    updateUserChip();
    // Silent refresh: if no cached token but Firebase still has a session on
    // mchatai.com, this pulls a fresh token via a hidden iframe so the user
    // does not have to click Sign in every single time. Idempotent + bounded
    // by a 3s timeout so there is no visible delay if they have never signed
    // in.
    if (!cachedIdToken) {
      silentlyRefreshToken().then(function (tok) {
        if (tok) updateUserChip();
      });
    }

    // Async probe for the product's screenshot opt-in flag. Runs concurrently
    // with the user reading/typing — if it comes back true, the screenshot
    // row fades into view.
    console.log('[feedback-widget] probing screenshot opt-in for slug:', slug);
    checkScreenshotOptIn().then(function (allowed) {
      console.log('[feedback-widget] screenshotAllowed =', allowed);
      screenshotAllowed = allowed;
      updateScreenshotRow();
      // Defensive: ALSO directly reveal the row in case updateScreenshotRow
      // runs before some dependency is wired up. Belt-and-suspenders.
      if (allowed) {
        var row = document.getElementById('mchatai-fb-screenshot-row');
        if (row) {
          row.style.display = 'block';
          console.log('[feedback-widget] screenshot row revealed');
        } else {
          console.warn('[feedback-widget] screenshot row element not found!');
        }
      }
    }).catch(function (err) {
      console.warn('[feedback-widget] probe failed:', err);
    });
  }
  function closePanel() {
    panel.classList.remove('open');
    pill.style.display = 'flex';
    bumpActivity();
  }
  pill.addEventListener('click', openPanel);
  panel.querySelector('#mchatai-fb-close').addEventListener('click', closePanel);

  // ── Type picker ──────────────────────────────────────────────────────────
  var selectedType = 'bug';
  panel.querySelectorAll('.mchatai-fb-type').forEach(function (btn) {
    btn.addEventListener('click', function () {
      panel.querySelectorAll('.mchatai-fb-type').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      selectedType = btn.getAttribute('data-type');
    });
  });

  // ── Rating picker (Phase RT.1) ───────────────────────────────────────────
  // Optional 1-5 stars. Rating is its own signal — users can send text
  // without a rating, or send a rating without text (any rating auto-enables
  // the Send button even if the textarea is empty, so a "5 stars, no words"
  // submission is a valid vote).
  var selectedRating = null;     // null | 1..5
  var ratingStars = panel.querySelectorAll('.mchatai-fb-star');
  var ratingClear = panel.querySelector('#mchatai-fb-rating-clear');
  function paintStars(previewValue) {
    var effective = previewValue != null ? previewValue : (selectedRating || 0);
    ratingStars.forEach(function (s) {
      var v = parseInt(s.getAttribute('data-value'), 10);
      s.classList.remove('filled', 'preview');
      s.textContent = v <= effective ? '★' : '☆';
      if (previewValue != null && v <= previewValue && v > (selectedRating || 0)) {
        s.classList.add('preview');
      } else if (v <= (selectedRating || 0)) {
        s.classList.add('filled');
      }
      s.setAttribute('aria-checked', String(v === selectedRating));
    });
    ratingClear.hidden = selectedRating == null;
  }
  ratingStars.forEach(function (s) {
    var v = parseInt(s.getAttribute('data-value'), 10);
    s.addEventListener('mouseenter', function () { paintStars(v); });
    s.addEventListener('mouseleave', function () { paintStars(null); });
    s.addEventListener('click', function () {
      // Click on currently-selected star → clear. Click elsewhere → set.
      selectedRating = (selectedRating === v) ? null : v;
      paintStars(null);
      updateSendState();
    });
  });
  ratingClear.addEventListener('click', function () {
    selectedRating = null;
    paintStars(null);
    updateSendState();
  });

  // ── Send button gating + submission ──────────────────────────────────────
  var textArea = panel.querySelector('#mchatai-fb-text');
  var sendBtn = panel.querySelector('#mchatai-fb-send');
  var statusEl = panel.querySelector('#mchatai-fb-status');
  var shotRow = panel.querySelector('#mchatai-fb-screenshot-row');
  var shotBtn = panel.querySelector('#mchatai-fb-shot-btn');
  var shotPreviewWrap = panel.querySelector('#mchatai-fb-shot-preview-wrap');
  var shotPreview = panel.querySelector('#mchatai-fb-shot-preview');
  var shotRemove = panel.querySelector('#mchatai-fb-shot-remove');

  // Phase RT.1: either a rating OR a text comment (≥4 chars) is enough to send.
  // Lets users drop-in a 5-star vote without writing a novel.
  function updateSendState() {
    var hasText = textArea.value.trim().length >= 4;
    var hasRating = selectedRating != null;
    sendBtn.disabled = !(hasText || hasRating);
  }
  textArea.addEventListener('input', updateSendState);

  // Phase RT.2 follow-up: isolate typing inside the feedback panel from the
  // underlying game. Many games install keyboard listeners on window and
  // document — when the user types a space into the textarea, the event
  // bubbles up and the game also receives it (e.g. battleship-vs-ai toggles
  // ship orientation on any spacebar press). Capture-phase listeners on
  // window fire BEFORE the game's bubble-phase listeners — we stop
  // propagation + stop immediate propagation on any keyboard event whose
  // target is inside our panel. The panel input itself still gets the event
  // because stopPropagation at capture phase does not prevent the target
  // from receiving it, only the ancestors.
  function isInsideFeedbackPanel(el) {
    while (el && el !== document) {
      if (el === panel || el === pill || el === backPill) return true;
      el = el.parentNode;
    }
    return false;
  }
  // IMPORTANT: only keyboard events get intercepted. Previously I also blocked
  // pointer/click/mousedown at capture phase, which broke every button inside
  // the panel (sign-in, send, star rating, attach screenshot) because
  // stopImmediatePropagation at capture prevents ALL listeners — including
  // the panel's own click handlers registered via addEventListener('click').
  // Keyboard-only is the right scope: games listen for arrow keys / space /
  // letters on window, but they listen for pointer events on their canvas
  // element — not on window — so click events never bubbled to them anyway.
  ['keydown', 'keyup', 'keypress'].forEach(function (evName) {
    window.addEventListener(evName, function (e) {
      if (!panel.classList.contains('open')) return;
      if (!isInsideFeedbackPanel(e.target)) return;
      // stopPropagation (not stopImmediatePropagation) — the panel's own
      // listeners already ran on the target; we only need to prevent the
      // event from reaching ancestor window/document listeners the game
      // installed. Using stopImmediatePropagation here would kill the
      // textarea's native input handling in some edge cases.
      e.stopPropagation();
    }, true); // capture phase fires before the game's bubble-phase listener
  });

  // ── Screenshot attachment (opt-in per product) ──────────────────────────
  // The row itself is hidden by default. It only reveals after we confirm the
  // product has opted in (feedbackAutomation.acceptScreenshots=true on the
  // Firestore endProduct doc). We query once per panel open via an endpoint
  // that returns just the opt-in flag — no auth needed, cheap boolean.
  var capturedScreenshot = null;   // { dataURL: "data:image/jpeg;base64,..." , width, height, bytes }
  var screenshotAllowed = false;

  async function checkScreenshotOptIn() {
    if (!slug) return false;
    try {
      var resp = await fetch(API_BASE + '/v1/endproducts/feedback-config?slug=' + encodeURIComponent(slug), {
        method: 'GET',
      });
      if (!resp.ok) return false;
      var body = await resp.json();
      return !!body.acceptScreenshots;
    } catch (e) {
      return false;
    }
  }

  async function captureScreenshot() {
    // Gate: require real sign-in before capturing. Attributable + rate-limitable.
    shotBtn.disabled = true;
    shotBtn.textContent = '🔑 Signing in…';
    statusEl.textContent = '';
    try {
      try {
        await ensureSignedIn();
      } catch (authErr) {
        throw new Error('Sign-in required for screenshots: ' + authErr.message);
      }
      shotBtn.textContent = '📸 Select the tab to share…';
      if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
        throw new Error('Screen capture not supported on this browser');
      }
      var stream = await navigator.mediaDevices.getDisplayMedia({
        video: { displaySurface: 'browser' },
        audio: false,
        preferCurrentTab: true,
      });
      var track = stream.getVideoTracks()[0];

      // Grab one frame via ImageCapture if available, else via a video element.
      var bitmap;
      if (window.ImageCapture) {
        var capture = new ImageCapture(track);
        bitmap = await capture.grabFrame();
      } else {
        var video = document.createElement('video');
        video.srcObject = stream;
        video.muted = true;
        await video.play();
        bitmap = {
          width: video.videoWidth,
          height: video.videoHeight,
          _video: video,
        };
      }

      // Resize to max 800×600 (fit, keep aspect) and JPEG 0.7 to stay under
      // the 200KB server cap. Typical output is 30-80KB.
      var MAX_W = 800, MAX_H = 600;
      var scale = Math.min(MAX_W / bitmap.width, MAX_H / bitmap.height, 1);
      var outW = Math.round(bitmap.width * scale);
      var outH = Math.round(bitmap.height * scale);
      var canvas = document.createElement('canvas');
      canvas.width = outW;
      canvas.height = outH;
      var ctx = canvas.getContext('2d');
      if (bitmap._video) {
        ctx.drawImage(bitmap._video, 0, 0, outW, outH);
      } else {
        ctx.drawImage(bitmap, 0, 0, outW, outH);
      }
      track.stop();

      var dataURL = canvas.toDataURL('image/jpeg', 0.7);
      // base64 portion length * 0.75 ≈ byte count
      var bytes = Math.round((dataURL.length - 'data:image/jpeg;base64,'.length) * 0.75);
      if (bytes > 200 * 1024) {
        throw new Error('Screenshot too large after compression (' + Math.round(bytes/1024) + 'KB, max 200KB)');
      }

      capturedScreenshot = { dataURL: dataURL, width: outW, height: outH, bytes: bytes };
      shotPreview.src = dataURL;
      shotPreviewWrap.style.display = 'block';
      shotBtn.style.display = 'none';
      shotBtn.disabled = false;
      shotBtn.textContent = '📸 Attach screenshot';
    } catch (err) {
      shotBtn.disabled = false;
      shotBtn.textContent = '📸 Attach screenshot';
      statusEl.style.color = '#e26766';
      statusEl.textContent = err.message || 'Screenshot capture failed';
    }
  }

  function removeScreenshot() {
    capturedScreenshot = null;
    shotPreview.src = '';
    shotPreviewWrap.style.display = 'none';
    shotBtn.style.display = 'block';
  }

  shotBtn.addEventListener('click', captureScreenshot);
  shotRemove.addEventListener('click', removeScreenshot);

  // Phase RT.2 follow-up: user chip click — sign-in when signed-out,
  // sign-out when signed-in.
  var userChip = panel.querySelector('#mchatai-fb-user');
  if (userChip) {
    userChip.addEventListener('click', async function () {
      if (cachedIdToken) {
        if (confirm('Sign out? Future submissions will be anonymous until you sign back in.')) {
          clearToken();
        }
        return;
      }
      try {
        await ensureSignedIn();
      } catch (e) {
        // Don't block the panel — user might just have dismissed the popup.
        console.warn('[feedback] sign-in skipped:', e.message);
      }
    });
  }
  // Render initial state.
  updateUserChip();

  // ── Real auth for screenshot uploads ───────────────────────────────────
  // Text-only feedback posts anonymously to /v1/feedback. Screenshots require
  // real Google sign-in (not anonymous) so:
  //   1. Abuse is attributable to a real account we can disable
  //   2. Bot operators can't programmatically create sign-in accounts
  //   3. The server rate-limits per UID with a hard ceiling that survives
  //      tab-closes / incognito resets (anon tokens would rotate every session)
  //
  // Sign-in flow: if user clicks "Attach screenshot" without a cached token, we
  // open an Identity Toolkit OAuth popup for Google. Token cached in session
  // storage so repeated submissions don't re-prompt. Cleared on Remove or when
  // the server reports the UID was abuse-disabled (403 reason=disabled).
  // Phase RT.2 follow-up: token persistence moved from sessionStorage to
  // localStorage. sessionStorage dies on tab close AND is isolated per tab,
  // so users had to re-sign-in constantly when hopping between products.
  // localStorage is shared across tabs and persists across browser restarts,
  // matching the "you are signed in" mental model. Firebase ID tokens expire
  // after ~1h; we detect expiry in updateUserChip (decoded .exp claim) and
  // auto-clear the token when it is stale, which triggers a silent re-check
  // via the /feedback-signin iframe (see silentlyRefreshToken below) so
  // long-lived users do not keep seeing sign-in prompts as tokens age.
  var TOKEN_KEY = 'mchatai_fb_idtoken';
  // Migration: if an older session put a token in sessionStorage, promote it
  // to localStorage so the user does not lose their sign-in on this refresh.
  (function migrateOldToken() {
    try {
      if (!localStorage.getItem(TOKEN_KEY) && sessionStorage.getItem(TOKEN_KEY)) {
        localStorage.setItem(TOKEN_KEY, sessionStorage.getItem(TOKEN_KEY));
      }
      sessionStorage.removeItem(TOKEN_KEY);
    } catch (e) {}
  })();
  var cachedIdToken = (function () {
    try { return localStorage.getItem(TOKEN_KEY) || null; } catch (e) { return null; }
  })();

  function storeToken(tok) {
    cachedIdToken = tok;
    try { localStorage.setItem(TOKEN_KEY, tok); } catch (e) {}
    updateUserChip();
  }

  function clearToken() {
    cachedIdToken = null;
    try { localStorage.removeItem(TOKEN_KEY); } catch (e) {}
    updateUserChip();
  }

  // Silent-refresh: when the cached token is missing or expired, try to pull
  // a fresh one from /feedback-signin.html via a hidden iframe. The signin
  // page runs Firebase Web SDK which persists auth in IndexedDB — if the
  // user signed in on any mchatai.com page at any point, Firebase still has
  // the session and onAuthStateChanged fires with the user, which posts a
  // fresh ID token back to the widget via postMessage. No visible popup,
  // no user action required — the sign-in just "carries over."
  function silentlyRefreshToken() {
    return new Promise(function (resolve) {
      var iframe = document.createElement('iframe');
      iframe.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;border:0;';
      iframe.src = 'https://mchatai.com/feedback-signin.html?silent=1';
      var done = false;
      var finish = function (token) {
        if (done) return;
        done = true;
        window.removeEventListener('message', handler);
        try { document.body.removeChild(iframe); } catch (e) {}
        if (token) storeToken(token);
        resolve(token || null);
      };
      var handler = function (ev) {
        if (ev.origin !== 'https://mchatai.com') return;
        if (!ev.data || ev.data.type !== 'mchatai-fb-signin') return;
        finish(ev.data.idToken || null);
      };
      window.addEventListener('message', handler);
      document.body.appendChild(iframe);
      // 3s timeout — if Firebase has no cached session the iframe just sits
      // idle at the button prompt. Give up silently.
      setTimeout(function () { finish(null); }, 3000);
    });
  }

  /* Phase RT.2 follow-up: decode a Firebase ID token's payload (the middle
     JWT segment — base64url-encoded JSON). We only need name/email/picture,
     so we do NOT verify the signature here (server revalidates on every
     request). Returns null on any decode failure. */
  function decodeIdToken(token) {
    if (!token) return null;
    try {
      var parts = token.split('.');
      if (parts.length < 2) return null;
      var b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
      while (b64.length % 4) b64 += '=';
      return JSON.parse(atob(b64));
    } catch (e) {
      return null;
    }
  }

  function updateUserChip() {
    var chip = document.getElementById('mchatai-fb-user');
    if (!chip) return;
    var claims = decodeIdToken(cachedIdToken);
    if (claims && claims.exp && claims.exp * 1000 < Date.now()) {
      // Token expired — treat as signed-out so the chip prompts sign-in again.
      claims = null;
      try { sessionStorage.removeItem('mchatai_fb_idtoken'); } catch (e) {}
      cachedIdToken = null;
    }
    // Build the chip contents via DOM APIs rather than innerHTML with nested
    // quotes — the IIFE string gets concatenated into an HTML response, and
    // any backslash-escaped quote here breaks the whole widget at parse time
    // in the browser. Lost an entire deploy to this — don't regress.
    while (chip.firstChild) chip.removeChild(chip.firstChild);
    if (claims) {
      chip.classList.add('signed-in');
      chip.title = 'Signed in as ' + (claims.email || claims.name || 'you') + ' — click to sign out';
      var displayName = claims.name || (claims.email ? claims.email.split('@')[0] : 'you');
      var shortName = displayName.length > 14 ? displayName.slice(0, 13) + '…' : displayName;
      var initial = displayName.charAt(0).toUpperCase();
      // Try avatar image first; fall back to initial-letter span on error.
      if (claims.picture) {
        var img = document.createElement('img');
        img.src = claims.picture;
        img.alt = '';
        img.referrerPolicy = 'no-referrer';
        img.addEventListener('error', function () {
          var fallback = document.createElement('span');
          fallback.className = 'mchatai-fb-user-avatar-fallback';
          fallback.textContent = initial;
          if (img.parentNode) img.parentNode.replaceChild(fallback, img);
        });
        chip.appendChild(img);
      } else {
        var fallbackSpan = document.createElement('span');
        fallbackSpan.className = 'mchatai-fb-user-avatar-fallback';
        fallbackSpan.textContent = initial;
        chip.appendChild(fallbackSpan);
      }
      var nameSpan = document.createElement('span');
      nameSpan.className = 'mchatai-fb-user-name';
      nameSpan.textContent = shortName;
      chip.appendChild(nameSpan);
    } else {
      chip.classList.remove('signed-in');
      chip.title = 'Sign in to enable screenshots';
      var icon = document.createElement('span');
      icon.setAttribute('aria-hidden', 'true');
      icon.textContent = '👤';
      var label = document.createElement('span');
      label.className = 'mchatai-fb-user-name';
      label.textContent = 'Sign in';
      chip.appendChild(icon);
      chip.appendChild(label);
    }
    // Also refresh the screenshot row so the "Sign in first" CTA flips to
    // "Attach screenshot" once signed-in (or vice versa).
    updateScreenshotRow();
  }

  /* Phase RT.2 follow-up: keep the screenshot button's label + disabled state
     in sync with sign-in state so users understand why they can't click it. */
  function updateScreenshotRow() {
    var row = document.getElementById('mchatai-fb-screenshot-row');
    var btn = document.getElementById('mchatai-fb-shot-btn');
    if (!row || !btn) return;
    if (!screenshotAllowed) {
      row.style.display = 'none';
      return;
    }
    row.style.display = 'block';
    if (cachedIdToken) {
      btn.textContent = '📸 Attach screenshot';
      btn.disabled = false;
    } else {
      btn.textContent = '🔒 Sign in to attach screenshot';
      btn.disabled = false;  // clickable — click triggers sign-in popup
    }
  }

  async function ensureSignedIn() {
    if (cachedIdToken) return cachedIdToken;
    // Use Firebase's identitytoolkit OAuth popup flow. We use the
    // createAuthUri + verifyAssertion pattern via a popup. Keep it minimal —
    // the user gets a Google chooser and a standard OAuth consent screen.
    return new Promise(function (resolve, reject) {
      var popupW = 500, popupH = 600;
      var left = (screen.width - popupW) / 2;
      var top = (screen.height - popupH) / 2;
      // Firebase Hosting has a stock sign-in handler at __/auth/handler. We'll
      // send the user to a small sign-in page we host at /feedback-signin that
      // runs Firebase JS SDK, does signInWithPopup(Google), and posts the
      // idToken back to the opener via postMessage.
      var popup = window.open(
        'https://mchatai.com/feedback-signin.html?return=' + encodeURIComponent(location.href),
        'mchatai-fb-signin',
        'width=' + popupW + ',height=' + popupH + ',left=' + left + ',top=' + top
      );
      if (!popup) {
        reject(new Error('Sign-in popup blocked. Allow popups and try again.'));
        return;
      }
      var handler = function (ev) {
        if (ev.origin !== 'https://mchatai.com') return;
        if (!ev.data || ev.data.type !== 'mchatai-fb-signin') return;
        window.removeEventListener('message', handler);
        try { popup.close(); } catch (e) {}
        if (ev.data.idToken) {
          storeToken(ev.data.idToken);
          resolve(ev.data.idToken);
        } else {
          reject(new Error(ev.data.error || 'Sign-in canceled'));
        }
      };
      window.addEventListener('message', handler);
      // Watchdog — if the popup closes without posting, reject after 5 min.
      var watch = setInterval(function () {
        if (popup.closed) {
          clearInterval(watch);
          window.removeEventListener('message', handler);
          reject(new Error('Sign-in window closed'));
        }
      }, 500);
    });
  }

  sendBtn.addEventListener('click', async function () {
    var text = textArea.value.trim();
    // Phase RT.1: allow rating-only submissions. Require at least one signal.
    if (text.length < 4 && selectedRating == null) return;

    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending…';
    statusEl.textContent = '';

    // Phase RT.1: resolve a rating context version so iterations don't pool
    // their ratings across builds. Prefer a meta tag the product set at publish
    // time; fall back to the HTML's Last-Modified (set by serveUserProject) or
    // today's date. The server also records server-side createdAt, so this is
    // only a hint for cross-build grouping.
    var ratingContextVersion = null;
    var versionMeta = document.querySelector('meta[name="mchatai-version"]');
    if (versionMeta && versionMeta.content) {
      ratingContextVersion = versionMeta.content;
    } else {
      ratingContextVersion = new Date().toISOString().slice(0, 10); // YYYY-MM-DD bucket
    }

    // When only a rating (no text), synthesize a short description so the
    // ticket still has searchable content in the review queue.
    var effectiveText = text;
    if (effectiveText.length < 4 && selectedRating != null) {
      effectiveText = selectedRating + '-star rating (no comment)';
    }

    var payload = {
      title: effectiveText.split('\n')[0].slice(0, 80),
      description: effectiveText,
      type: selectedType,
      severity: selectedType === 'bug' ? 'medium' : 'low',
      rating: selectedRating,
      ratingContextVersion: ratingContextVersion,
      endProductSlug: slug,
      previewURL: location.href,
      source: 'web.user-project-widget',
      metadata: {
        consoleErrors: __consoleErrors.slice(),
        userAgent: navigator.userAgent,
        viewport: window.innerWidth + 'x' + window.innerHeight,
        shortUid: shortUid,
      },
    };

    // Screenshot attached → attach base64 + dimensions. Server will decode,
    // verify size, upload to GCS, and embed the URL on the ticket.
    if (capturedScreenshot) {
      payload.screenshot = {
        dataURL: capturedScreenshot.dataURL,
        width: capturedScreenshot.width,
        height: capturedScreenshot.height,
      };
    }

    try {
      var headers = { 'Content-Type': 'application/json' };
      // Include auth only if we have a token; screenshot submissions require it
      // but we let the server reject rather than blocking client-side — cheaper
      // to handle edge cases (stale token, abuse-disabled account) in one place.
      if (cachedIdToken) headers['Authorization'] = 'Bearer ' + cachedIdToken;

      var resp = await fetch(API_BASE + '/v1/feedback', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify(payload),
      });
      var body = await resp.json().catch(function () { return {}; });

      // Server telling us the user is abuse-disabled → clear token so the next
      // attempt forces a fresh sign-in. The abuse-disable lives on the UID in
      // Firestore so a re-sign-in with the same account will re-reject; only
      // recovery is to sign in with a different account or contact support.
      if (resp.status === 403 && body && body.reason === 'user-disabled') {
        clearToken();
        removeScreenshot();
      }

      if (resp.ok && body.ok) {
        statusEl.style.color = '#5db77a';
        statusEl.textContent = selectedRating != null
          ? 'Thanks! Your ' + selectedRating + '-star rating was logged.'
          : 'Thanks! Your feedback was logged.';
        textArea.value = '';
        selectedRating = null;
        paintStars(null);
        removeScreenshot();
        setTimeout(closePanel, 1400);
      } else {
        statusEl.style.color = '#e26766';
        statusEl.textContent = body.error || ('Error ' + resp.status);
      }
    } catch (err) {
      statusEl.style.color = '#e26766';
      statusEl.textContent = 'Network error — try again.';
    } finally {
      sendBtn.textContent = 'Send';
      updateSendState();
    }
  });
})();
</script></body>
</html>
