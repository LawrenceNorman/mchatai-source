<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Comic Strip Builder</title>
<style>
:root{--bg:#fef3c7;--primary:#f59e0b;--accent:#ec4899;--dark:#1f2937;--paper:#fffbeb;--ok:#10b981;--bad:#ef4444}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Comic Sans MS','Marker Felt','Chalkboard SE',system-ui,sans-serif;background:var(--bg);color:var(--dark);overflow:hidden;touch-action:manipulation}
body{display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#f59e0b,#ec4899,#7c3aed);padding:10px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center;gap:8px;box-shadow:0 4px 0 rgba(0,0,0,.2);flex-wrap:wrap;z-index:5}
h1{font-size:22px;text-shadow:2px 2px 0 rgba(0,0,0,.25);letter-spacing:1px;white-space:nowrap}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:#fff;color:var(--dark);border:3px solid var(--dark);border-radius:12px;padding:7px 12px;font:bold 13px inherit;cursor:pointer;box-shadow:3px 3px 0 var(--dark);transition:transform .08s,box-shadow .08s;white-space:nowrap}
.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--dark)}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--dark)}
.btn.primary{background:var(--ok);color:#fff}
.btn.danger{background:var(--bad);color:#fff}
.btn.accent{background:var(--accent);color:#fff}
main{flex:1;display:flex;overflow:hidden;min-height:0}
aside{width:220px;background:var(--paper);border-right:4px dashed var(--dark);overflow-y:auto;padding:10px;flex-shrink:0}
.palette-group{margin-bottom:14px}
.palette-title{font-weight:bold;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#fff;margin-bottom:8px;background:var(--primary);padding:5px 10px;border-radius:10px;border:2px solid var(--dark);text-align:center;box-shadow:2px 2px 0 var(--dark)}
.palette-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.sticker-btn{background:#fff;border:2px solid var(--dark);border-radius:10px;aspect-ratio:1;cursor:grab;display:flex;align-items:center;justify-content:center;padding:4px;box-shadow:2px 2px 0 var(--dark);transition:transform .08s}
.sticker-btn:hover{transform:translate(-1px,-1px) rotate(-3deg);box-shadow:3px 3px 0 var(--dark)}
.sticker-btn:active{cursor:grabbing;transform:translate(1px,1px) scale(.95);box-shadow:1px 1px 0 var(--dark)}
.sticker-btn svg{width:100%;height:100%;pointer-events:none;display:block}
.bg-btn{background:#fff;border:2px solid var(--dark);border-radius:8px;cursor:pointer;height:42px;overflow:hidden;box-shadow:2px 2px 0 var(--dark);padding:0}
.bg-btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--dark)}
.bg-btn svg{width:100%;height:100%;display:block}
.workspace{flex:1;overflow:auto;padding:16px;background:repeating-linear-gradient(45deg,#fde68a,#fde68a 12px,#fcd34d 12px,#fcd34d 24px);display:flex;flex-direction:column;gap:10px;min-width:0}
.title-bar{background:#fff;padding:8px 14px;border-radius:12px;border:3px solid var(--dark);box-shadow:4px 4px 0 var(--dark);display:flex;gap:10px;align-items:center}
.title-bar label{font-weight:bold;font-size:13px;flex-shrink:0}
.title-bar input{flex:1;border:2px solid var(--dark);border-radius:8px;padding:6px 10px;font:bold 17px inherit;background:#fef3c7;color:var(--dark);min-width:0}
.title-bar input:focus{outline:none;background:#fff;box-shadow:0 0 0 3px var(--accent)}
.panels-row{display:flex;gap:12px;background:#fff;padding:12px;border-radius:16px;border:4px solid var(--dark);box-shadow:6px 6px 0 var(--dark)}
.panel{position:relative;flex:1 1 0;min-width:0;aspect-ratio:4/3;background:#fff;border:4px solid var(--dark);border-radius:6px;overflow:hidden;user-select:none;transition:box-shadow .15s}
.panel.selected{box-shadow:0 0 0 5px var(--accent),0 0 0 8px var(--dark)}
.panel-bg{position:absolute;inset:0;pointer-events:none}
.panel-bg svg{width:100%;height:100%;display:block}
.panel-label{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;padding:2px 9px;border-radius:10px;font-weight:bold;font-size:13px;border:2px solid var(--dark);pointer-events:none;z-index:5;box-shadow:1px 1px 0 var(--dark)}
.items-container{position:absolute;inset:0}
.item{position:absolute;cursor:move;transform-origin:center;will-change:transform}
.item.selected{outline:3px dashed var(--accent);outline-offset:3px;border-radius:4px}
.item svg{width:100%;height:100%;pointer-events:none;display:block}
.bubble{position:absolute;cursor:move;user-select:none;min-width:70px}
.bubble-shape{background:#fff;border:3px solid var(--dark);border-radius:18px;padding:7px 11px;font:bold 13px 'Comic Sans MS',sans-serif;color:var(--dark);text-align:center;position:relative;word-wrap:break-word;line-height:1.25;box-shadow:2px 2px 0 var(--dark)}
.bubble-tail{position:absolute;bottom:-15px;left:18px;width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:16px solid var(--dark)}
.bubble-tail::after{content:'';position:absolute;left:-8px;top:-17px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:12px solid #fff}
.bubble.thought .bubble-shape{border-radius:30px}
.bubble.thought .bubble-tail{display:none}
.bubble.thought .think-dots{position:absolute;bottom:-22px;left:10px;display:flex;gap:4px}
.bubble.thought .think-dots span{display:block;background:#fff;border:2px solid var(--dark);border-radius:50%}
.bubble.thought .think-dots span:nth-child(1){width:10px;height:10px}
.bubble.thought .think-dots span:nth-child(2){width:7px;height:7px;margin-top:5px}
.bubble.thought .think-dots span:nth-child(3){width:4px;height:4px;margin-top:9px}
.bubble.selected .bubble-shape{box-shadow:0 0 0 3px var(--accent),2px 2px 0 var(--dark)}
.item-controls{position:absolute;top:-32px;right:-4px;display:flex;gap:4px;z-index:100}
.ctrl{background:#fff;border:2px solid var(--dark);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:bold;box-shadow:1px 1px 0 var(--dark);user-select:none;color:var(--dark)}
.ctrl:active{transform:translate(1px,1px);box-shadow:0 0 0 var(--dark)}
.ctrl.del{background:var(--bad);color:#fff}
.ctrl.flip{background:#3b82f6;color:#fff}
.ctrl.rot{background:var(--ok);color:#fff}
.ctrl.edit{background:var(--primary);color:#fff}
.ctrl.layer{background:#a78bfa;color:#fff}
.resize-handle{position:absolute;bottom:-10px;right:-10px;width:20px;height:20px;background:var(--accent);border:2px solid var(--dark);border-radius:50%;cursor:nwse-resize;z-index:50;box-shadow:1px 1px 0 var(--dark)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:12px 22px;border-radius:14px;font:bold 14px 'Comic Sans MS',sans-serif;z-index:3000;opacity:0;transition:opacity .25s,transform .25s;border:3px solid #fff;box-shadow:0 4px 0 rgba(0,0,0,.3);pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.7);display:flex;align-items:center;justify-content:center;z-index:2000;padding:16px;backdrop-filter:blur(4px)}
.modal-content{background:#fff;padding:20px;border-radius:18px;border:4px solid var(--dark);box-shadow:8px 8px 0 var(--dark);max-width:560px;width:100%;max-height:92vh;overflow:auto;display:flex;flex-direction:column;gap:14px;align-items:center}
.modal h2{color:var(--dark);text-align:center}
.modal img{max-width:100%;border:3px solid var(--dark);border-radius:10px;display:block}
.modal textarea{width:100%;min-height:90px;border:3px solid var(--dark);border-radius:10px;padding:10px;font:bold 16px 'Comic Sans MS',sans-serif;resize:vertical;background:#fef3c7;color:var(--dark)}
.modal textarea:focus{outline:none;box-shadow:0 0 0 3px var(--accent)}
.modal p{color:var(--dark);font-weight:bold;text-align:center}
.tip{background:#fef3c7;border:2px dashed var(--dark);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--dark);font-weight:bold;line-height:1.4;text-align:center}
@media (max-width:760px){aside{width:130px;padding:6px}h1{font-size:17px}.btn{padding:6px 9px;font-size:12px}.palette-title{font-size:10px;padding:3px 6px}.panels-row{flex-direction:column;padding:8px;gap:8px}.panel{aspect-ratio:4/3;min-width:0}.workspace{padding:10px}.title-bar input{font-size:15px}.modal-content{padding:14px}}
@media (max-width:420px){aside{width:110px}.palette-grid{grid-template-columns:repeat(2,1fr);gap:4px}}
</style>
</head>
<body>

<header>
  <h1>🎨 Comic Builder</h1>
  <div class="actions">
    <button class="btn accent" id="addBubbleBtn">💬 Speech</button>
    <button class="btn" id="addThoughtBtn">💭 Thought</button>
    <button class="btn danger" id="clearBtn">🗑️ Clear</button>
    <button class="btn primary" id="exportBtn">📸 Export PNG</button>
  </div>
</header>

<main>
  <aside id="palette">
    <div class="tip">Drag or tap a sticker. Tap a panel to select it!</div>
    <div class="palette-group">
      <div class="palette-title">🎭 Characters</div>
      <div class="palette-grid" id="charactersGrid"></div>
    </div>
    <div class="palette-group">
      <div class="palette-title">✨ Props</div>
      <div class="palette-grid" id="propsGrid"></div>
    </div>
    <div class="palette-group">
      <div class="palette-title">🏞️ Scenes</div>
      <div class="palette-grid" id="bgGrid"></div>
    </div>
  </aside>

  <section class="workspace">
    <div class="title-bar">
      <label for="titleInput">Title:</label>
      <input id="titleInput" type="text" placeholder="My Awesome Comic!" value="My Awesome Comic!" maxlength="60">
    </div>
    <div class="panels-row" id="panelsRow"></div>
    <div class="tip">💡 Tap an item to flip, rotate, resize or delete it. Drag items to move them around the panel.</div>
  </section>
</main>

<div class="toast" id="toast"></div>

const CHARACTERS = ['cat','dog','robot','wizard','astronaut','dino','unicorn','monster','princess','ninja'];
const PROPS = ['heart','star','bolt','sun','cloud','rainbow','rocket','cake','ball','flower'];
const BGS = ['blank','park','space','beach','city','forest','sunset','underwater'];

let selectedPanelIdx = 0;
let selectedItem = null;
let dragData = null;
const panels = [
  { bg: 'park', items: [] },
  { bg: 'beach', items: [] },
  { bg: 'space', items: [] }
];

function uid(){ return Math.random().toString(36).slice(2,9); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeXml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c])); }

function renderPalette() {
  document.getElementById('charactersGrid').innerHTML = CHARACTERS.map(k =>
    `<button class="sticker-btn" data-sticker="${k}" aria-label="${k}">${SVG[k]}</button>`
  ).join('');
  document.getElementById('propsGrid').innerHTML = PROPS.map(k =>
    `<button class="sticker-btn" data-sticker="${k}" aria-label="${k}">${SVG[k]}</button>`
  ).join('');
  document.getElementById('bgGrid').innerHTML = BGS.map(k =>
    `<button class="bg-btn" data-bg="${k}" aria-label="${k} background"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">${BG_SVG[k]}</svg></button>`
  ).join('');
}

function renderPanels() {
  const row = document.getElementById('panelsRow');
  row.innerHTML = panels.map((p,i) => `
    <div class="panel ${i===selectedPanelIdx?'selected':''}" data-panel-idx="${i}">
      <div class="panel-bg"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">${BG_SVG[p.bg]}</svg></div>
      <div class="panel-label">${i+1}</div>
      <div class="items-container" data-items="${i}"></div>
    </div>
  `).join('');
  panels.forEach((p,i) => {
    const c = document.querySelector(`[data-items="${i}"]`);
    p.items.forEach(it => renderItem(it, c));
  });
}

function renderItem(item, container) {
  let el;
  if (item.type === 'sticker') {
    el = document.createElement('div');
    el.className = 'item';
    el.dataset.itemId = item.id;
    el.style.left = item.x + '%';
    el.style.top = item.y + '%';
    el.style.width = item.size + '%';
    el.style.aspectRatio = '1';
    el.style.transform = `rotate(${item.rot||0}deg) scaleX(${item.flip?-1:1})`;
    el.style.zIndex = item.z || 1;
    el.innerHTML = SVG[item.sticker];
  } else if (item.type === 'bubble') {
    el = document.createElement('div');
    el.className = 'bubble' + (item.thought ? ' thought' : '');
    el.dataset.itemId = item.id;
    el.style.left = item.x + '%';
    el.style.top = item.y + '%';
    el.style.width = item.width + '%';
    el.style.zIndex = item.z || 10;
    const inner = `<div class="bubble-shape">${escapeHtml(item.text)}</div>` +
      (item.thought
        ? '<div class="think-dots"><span></span><span></span><span></span></div>'
        : '<div class="bubble-tail"></div>');
    el.innerHTML = inner;
  }
  if (selectedItem === item.id) el.classList.add('selected');
  container.appendChild(el);

  if (selectedItem === item.id) {
    const controls = document.createElement('div');
    controls.className = 'item-controls';
    if (item.type === 'sticker') {
      controls.innerHTML = `
        <div class="ctrl flip" data-action="flip" title="Flip">↔</div>
        <div class="ctrl rot" data-action="rotate" title="Rotate">↻</div>
        <div class="ctrl layer" data-action="front" title="Bring to front">⬆</div>
        <div class="ctrl del" data-action="delete" title="Delete">×</div>
      `;
    } else {
      controls.innerHTML = `
        <div class="ctrl edit" data-action="edit" title="Edit text">✎</div>
        <div class="ctrl layer" data-action="front" title="Bring to front">⬆</div>
        <div class="ctrl del" data-action="delete" title="Delete">×</div>
      `;
    }
    el.appendChild(controls);
    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    handle.dataset.action = 'resize';
    el.appendChild(handle);
  }
}

function showToast(msg, duration=2000){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), duration);
}

function maxZ(panel){ return panel.items.reduce((m,it)=>Math.max(m, it.z||1), 1); }

function addStickerToPanel(stickerKey, panelIdx, x, y){
  const z = maxZ(panels[panelIdx]) + 1;
  const item = { id: uid(), type:'sticker', sticker:stickerKey,
    x: x ?? 32, y: y ?? 30, size: 32, rot: 0, flip: false, z };
  panels[panelIdx].items.push(item);
  selectedItem = item.id;
  renderPanels();
}

function addBubble(panelIdx, thought, text){
  const z = maxZ(panels[panelIdx]) + 1;
  const t = text ?? (thought ? 'Hmm...' : 'Hello!');
  const item = { id: uid(), type:'bubble', text:t, thought:!!thought,
    x: 10 + panels[panelIdx].items.length * 3, y: 8, width: 42, z };
  panels[panelIdx].items.push(item);
  selectedItem = item.id;
  renderPanels();
}

function deleteItem(itemId){
  panels.forEach(p => {
    const i = p.items.findIndex(it => it.id===itemId);
    if (i>=0) p.items.splice(i,1);
  });
  if (selectedItem === itemId) selectedItem = null;
  renderPanels();
}

function findItem(itemId){
  for (const p of panels) {
    const it = p.items.find(i => i.id===itemId);
    if (it) return { item: it, panel: p, panelIdx: panels.indexOf(p) };
  }
  return null;
}

function getPoint(e){
  const t = e.touches?.[0] || e.changedTouches?.[0] || e;
  return { x: t.clientX, y: t.clientY };
}

function startPaletteDrag(e){
  const bgBtn = e.target.closest('.bg-btn');
  if (bgBtn) {
    e.preventDefault();
    panels[selectedPanelIdx].bg = bgBtn.dataset.bg;
    renderPanels();
    showToast(`Scene set in panel ${selectedPanelIdx+1}!`);
    return;
  }
  const btn = e.target.closest('.sticker-btn');
  if (!btn) return;
  e.preventDefault();
  const stickerKey = btn.dataset.sticker;
  const point = getPoint(e);
  const ghost = createGhost(stickerKey, point.x, point.y);
  document.body.appendChild(ghost);
  dragData = {
    type: 'palette', stickerKey, ghost,
    startX: point.x, startY: point.y, moved: false
  };
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', endDrag);
  document.addEventListener('touchcancel', endDrag);
}

function createGhost(stickerKey, x, y){
  const g = document.createElement('div');
  g.style.cssText = `position:fixed;left:${x-32}px;top:${y-32}px;width:64px;height:64px;pointer-events:none;z-index:9999;opacity:.85;transform:rotate(-5deg);filter:drop-shadow(2px 4px 4px rgba(0,0,0,.3));`;
  g.innerHTML = SVG[stickerKey];
  const svg = g.querySelector('svg');
  if (svg) { svg.style.width = '100%'; svg.style.height = '100%'; svg.style.display = 'block'; }
  return g;
}

function onDragMove(e){
  if (!dragData) return;
  e.preventDefault();
  const point = getPoint(e);
  if (!dragData.moved && (Math.abs(point.x - dragData.startX) > 4 || Math.abs(point.y - dragData.startY) > 4)) {
    dragData.moved = true;
  }
  if (dragData.ghost) {
    dragData.ghost.style.left = (point.x - 32) + 'px';
    dragData.ghost.style.top = (point.y - 32) + 'px';
  }
  if (dragData.type === 'move' || dragData.type === 'resize') {
    handleItemDrag(point);
  }
}

function endDrag(e){
  if (!dragData) return;
  const point = getPoint(e);
  if (dragData.type === 'palette') {
    const elem = document.elementFromPoint(point.x, point.y);
    const panel = elem?.closest('.panel');
    if (panel) {
      const idx = +panel.dataset.panelIdx;
      const rect = panel.getBoundingClientRect();
      const x = ((point.x - rect.left) / rect.width) * 100 - 16;
      const y = ((point.y - rect.top) / rect.height) * 100 - 16;
      selectedPanelIdx = idx;
      addStickerToPanel(dragData.stickerKey, idx, Math.max(0, Math.min(70, x)), Math.max(0, Math.min(70, y)));
      showToast('Sticker added! ' + (dragData.moved ? '' : ''));
    } else if (!dragData.moved) {
      addStickerToPanel(dragData.stickerKey, selectedPanelIdx);
      showToast(`Added to panel ${selectedPanelIdx+1}!`);
    }
    if (dragData.ghost) dragData.ghost.remove();
  } else if (dragData.type === 'move' || dragData.type === 'resize') {
    renderPanels();
  }
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', endDrag);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', endDrag);
  document.removeEventListener('touchcancel', endDrag);
  dragData = null;
}

function onPanelMouseDown(e){
  const action = e.target.closest('[data-action]');
  if (action) {
    e.preventDefault();
    e.stopPropagation();
    const a = action.dataset.action;
    if (a === 'delete') { deleteItem(selectedItem); showToast('Removed!'); return; }
    if (a === 'flip') { const f = findItem(selectedItem); if (f) { f.item.flip = !f.item.flip; renderPanels(); } return; }
    if (a === 'rotate') { const f = findItem(selectedItem); if (f) { f.item.rot = ((f.item.rot||0)+15) % 360; renderPanels(); } return; }
    if (a === 'front') { const f = findItem(selectedItem); if (f) { f.item.z = maxZ(f.panel) + 1; renderPanels(); } return; }
    if (a === 'edit') { const f = findItem(selectedItem); if (f) editBubble(f.item); return; }
    if (a === 'resize') { startResize(e); return; }
  }
  const itemEl = e.target.closest('.item, .bubble');
  const panel = e.target.closest('.panel');
  if (!panel) return;
  const newPanelIdx = +panel.dataset.panelIdx;
  if (itemEl) {
    e.preventDefault();
    selectedPanelIdx = newPanelIdx;
    selectedItem = itemEl.dataset.itemId;
    renderPanels();
    startMove(e, selectedItem);
  } else {
    if (selectedPanelIdx !== newPanelIdx || selectedItem) {
      selectedPanelIdx = newPanelIdx;
      selectedItem = null;
      renderPanels();
    }
  }
}

function startMove(e, itemId){
  const point = getPoint(e);
  const itemData = findItem(itemId);
  if (!itemData) return;
  const panelEl = document.querySelector(`[data-panel-idx="${itemData.panelIdx}"]`);
  const rect = panelEl.getBoundingClientRect();
  dragData = {
    type: 'move', itemId,
    startX: point.x, startY: point.y,
    origX: itemData.item.x, origY: itemData.item.y,
    panelRect: rect, moved: false
  };
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', endDrag);
  document.addEventListener('touchcancel', endDrag);
}

function startResize(e){
  const point = getPoint(e);
  const itemData = findItem(selectedItem);
  if (!itemData) return;
  const panelEl = document.querySelector(`[data-panel-idx="${itemData.panelIdx}"]`);
  const rect = panelEl.getBoundingClientRect();
  dragData = {
    type: 'resize', itemId: selectedItem,
    startX: point.x, startY: point.y,
    origSize: itemData.item.type === 'sticker' ? itemData.item.size : itemData.item.width,
    panelRect: rect, moved: false
  };
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', endDrag);
  document.addEventListener('touchcancel', endDrag);
}

function handleItemDrag(point){
  const itemData = findItem(dragData.itemId);
  if (!itemData) return;
  if (dragData.type === 'move') {
    const dx = (point.x - dragData.startX) / dragData.panelRect.width * 100;
    const dy = (point.y - dragData.startY) / dragData.panelRect.height * 100;
    itemData.item.x = Math.max(-3, Math.min(95, dragData.origX + dx));
    itemData.item.y = Math.max(-3, Math.min(92, dragData.origY + dy));
    const el = document.querySelector(`[data-item-id="${dragData.itemId}"]`);
    if (el) {
      el.style.left = itemData.item.x + '%';
      el.style.top = itemData.item.y + '%';
    }
  } else if (dragData.type === 'resize') {
    const dx = (point.x - dragData.startX) / dragData.panelRect.width * 100;
    const minSize = itemData.item.type === 'sticker' ? 10 : 15;
    const maxSize = itemData.item.type === 'sticker' ? 80 : 90;
    const newSize = Math.max(minSize, Math.min(maxSize, dragData.origSize + dx));
    if (itemData.item.type === 'sticker') itemData.item.size = newSize;
    else itemData.item.width = newSize;
    const el = document.querySelector(`[data-item-id="${dragData.itemId}"]`);
    if (el) el.style.width = newSize + '%';
  }
}

function editBubble(item){
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-content">
      <h2>${item.thought ? '💭 Edit Thought' : '💬 Edit Speech'}</h2>
      <textarea id="bubbleText" maxlength="140">${escapeHtml(item.text)}</textarea>
      <div class="actions">
        <button class="btn" id="cancelEdit">Cancel</button>
        <button class="btn primary" id="saveEdit">Save</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  const ta = modal.querySelector('#bubbleText');
  setTimeout(()=>{ ta.focus(); ta.select(); }, 50);
  const close = ()=> modal.remove();
  const save = ()=> { item.text = (ta.value || '...').trim() || '...'; close(); renderPanels(); };
  modal.querySelector('#cancelEdit').onclick = close;
  modal.querySelector('#saveEdit').onclick = save;
  modal.onclick = (e)=>{ if (e.target === modal) close(); };
  ta.addEventListener('keydown', (e)=>{ if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) save(); });
}

function nsBg(bgKey, idx){
  return BG_SVG[bgKey].replace(/(id=")([a-zA-Z0-9_]+)/g, `$1$2_p${idx}`).replace(/(url\(#)([a-zA-Z0-9_]+)/g, `$1$2_p${idx}`);
}

function wrapText(text, maxChars){
  const paragraphs = text.split(/
+/);
  const out = [];
  for (const para of paragraphs) {
    const words = para.split(/\s+/);
    let cur = '';
    for (const w of words) {
      const candidate = (cur + ' ' + w).trim();
      if (candidate.length > maxChars && cur) {
        out.push(cur);
        cur = w;
      } else {
        cur = candidate;
      }
    }
    if (cur) out.push(cur);
  }
  return out.length ? out : [text];
}

async function exportComic(){
  showToast('Creating your comic...', 1200);
  await new Promise(r => setTimeout(r, 80));
  const title = (document.getElementById('titleInput').value || 'My Comic').trim();
  const PW = 480, PH = 360, GAP = 16, PAD = 24, TH = 64;
  const W = PW * 3 + GAP * 2 + PAD * 2;
  const H = PH + TH + PAD * 2 + 8;
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  svg += `<rect width="${W}" height="${H}" fill="#fef3c7"/>`;
  for (let i = 0; i < 30; i++) {
    const cx = (i * 137) % W;
    const cy = (i * 89) % H;
    svg += `<circle cx="${cx}" cy="${cy}" r="3" fill="#fcd34d" opacity="0.5"/>`;
  }
  svg += `<rect x="${PAD}" y="${PAD}" width="${W - PAD * 2}" height="${TH - 8}" rx="14" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>`;
  svg += `<rect x="${PAD + 4}" y="${PAD + 4}" width="${W - PAD * 2 - 8}" height="${TH - 16}" rx="10" fill="none" stroke="#ec4899" stroke-width="2" stroke-dasharray="6,4"/>`;
  svg += `<text x="${W / 2}" y="${PAD + (TH - 8) / 2 + 2}" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="30" font-weight="bold" fill="#1f2937" text-anchor="middle" dominant-baseline="middle">${escapeXml(title)}</text>`;
  for (let i = 0; i < 3; i++) {
    const px = PAD + i * (PW + GAP);
    const py = PAD + TH + 8;
    const p = panels[i];
    svg += `<defs><clipPath id="clip_p${i}"><rect x="${px}" y="${py}" width="${PW}" height="${PH}"/></clipPath></defs>`;
    svg += `<g clip-path="url(#clip_p${i})">`;
    svg += `<svg x="${px}" y="${py}" width="${PW}" height="${PH}" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">${nsBg(p.bg, i)}</svg>`;
    const sorted = [...p.items].sort((a, b) => (a.z || 1) - (b.z || 1));
    for (const item of sorted) {
      if (item.type === 'sticker') {
        const sx = px + (item.x / 100) * PW;
        const sy = py + (item.y / 100) * PH;
        const sw = (item.size / 100) * PW;
        const sh = sw;
        const cx = sx + sw / 2;
        const cy = sy + sh / 2;
        const ts = [];
        if (item.rot) ts.push(`rotate(${item.rot} ${cx} ${cy})`);
        if (item.flip) ts.push(`translate(${cx * 2} 0) scale(-1 1)`);
        const tStr = ts.length ? ` transform="${ts.join(' ')}"` : '';
        svg += `<g${tStr}><svg x="${sx}" y="${sy}" width="${sw}" height="${sh}" viewBox="0 0 100 100">${SVG[item.sticker]}</svg></g>`;
      } else if (item.type === 'bubble') {
        const bx = px + (item.x / 100) * PW;
        const by = py + (item.y / 100) * PH;
        const bw = (item.width / 100) * PW;
        const fontSize = 16;
        const charW = fontSize * 0.55;
        const maxChars = Math.max(8, Math.floor((bw - 20) / charW));
        const lines = wrapText(item.text, maxChars);
        const lineH = 20;
        const bh = lines.length * lineH + 18;
        const rx = item.thought ? 28 : 16;
        svg += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="${rx}" fill="#ffffff" stroke="#1f2937" stroke-width="3.5"/>`;
        if (!item.thought) {
          const tailX = bx + 22;
          const tailY = by + bh;
          svg += `<polygon points="${tailX},${tailY} ${tailX + 18},${tailY} ${tailX + 4},${tailY + 18}" fill="#ffffff" stroke="#1f2937" stroke-width="3.5" stroke-linejoin="round"/>`;
          svg += `<polygon points="${tailX + 2},${tailY - 1} ${tailX + 16},${tailY - 1} ${tailX + 5},${tailY + 14}" fill="#ffffff"/>`;
        } else {
          svg += `<circle cx="${bx + 18}" cy="${by + bh + 8}" r="5" fill="#ffffff" stroke="#1f2937" stroke-width="2.5"/>`;
          svg += `<circle cx="${bx + 10}" cy="${by + bh + 18}" r="3.5" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>`;
          svg += `<circle cx="${bx + 4}" cy="${by + bh + 25}" r="2" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>`;
        }
        lines.forEach((line, idx) => {
          const ty = by + 15 + idx * lineH;
          svg += `<text x="${bx + bw / 2}" y="${ty}" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="${fontSize}" font-weight="bold" fill="#1f2937" text-anchor="middle" dominant-baseline="hanging">${escapeXml(line)}</text>`;
        });
      }
    }
    svg += `</g>`;
    svg += `<rect x="${px}" y="${py}" width="${PW}" height="${PH}" fill="none" stroke="#1f2937" stroke-width="5"/>`;
    svg += `<rect x="${px + 8}" y="${py + 8}" width="30" height="22" rx="6" fill="#ec4899" stroke="#1f2937" stroke-width="2.5"/>`;
    svg += `<text x="${px + 23}" y="${py + 24}" font-family="Comic Sans MS, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">${i + 1}</text>`;
  }
  svg += `</svg>`;
  try {
    const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    await new Promise((res, rej) => {
      img.onload = res;
      img.onerror = ()=> rej(new Error('Could not render SVG'));
      img.src = url;
    });
    const canvas = document.createElement('canvas');
    const scale = 2;
    canvas.width = W * scale;
    canvas.height = H * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fef3c7';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    const pngUrl = canvas.toDataURL('image/png');
    showExportModal(pngUrl, title);
  } catch (err) {
    console.error(err);
    showToast('Export failed: ' + err.message, 3500);
  }
}

function showExportModal(dataUrl, title){
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-content">
      <h2>📸 Your Comic is Ready!</h2>
      <img src="${dataUrl}" alt="${escapeHtml(title)}">
      <p>Save it to your device or share with friends!</p>
      <div class="actions">
        <button class="btn" id="closeExport">Close</button>
        <button class="btn primary" id="downloadBtn">⬇️ Download PNG</button>
        <button class="btn accent" id="shareBtn">📤 Share</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  const close = ()=> modal.remove();
  modal.querySelector('#closeExport').onclick = close;
  modal.onclick = (e)=>{ if (e.target === modal) close(); };
  modal.querySelector('#downloadBtn').onclick = ()=>{
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = (title || 'comic').replace(/[^a-z0-9_-]+/gi,'_').toLowerCase() + '.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
    showToast('Downloaded!');
  };
  modal.querySelector('#shareBtn').onclick = async ()=>{
    try {
      const res = await fetch(dataUrl);
      const blob = await res.blob();
      const file = new File([blob], 'comic.png', { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title, text: 'Check out my comic!' });
        showToast('Shared!');
      } else if (navigator.clipboard && window.ClipboardItem) {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        showToast('Copied to clipboard!');
      } else {
        showToast('Share not supported — use Download', 2600);
      }
    } catch (err) {
      if (err.name !== 'AbortError') showToast('Could not share');
    }
  };
}

document.getElementById('palette').addEventListener('mousedown', startPaletteDrag);
document.getElementById('palette').addEventListener('touchstart', startPaletteDrag, { passive: false });
document.getElementById('panelsRow').addEventListener('mousedown', onPanelMouseDown);
document.getElementById('panelsRow').addEventListener('touchstart', onPanelMouseDown, { passive: false });

document.getElementById('addBubbleBtn').onclick = ()=> {
  addBubble(selectedPanelIdx, false);
  showToast(`Speech bubble added to panel ${selectedPanelIdx+1}`);
};
document.getElementById('addThoughtBtn').onclick = ()=> {
  addBubble(selectedPanelIdx, true);
  showToast(`Thought bubble added to panel ${selectedPanelIdx+1}`);
};
document.getElementById('clearBtn').onclick = ()=> {
  if (panels.every(p => p.items.length === 0)) { showToast('Nothing to clear!'); return; }
  if (confirm('Clear ALL panels? This cannot be undone.')) {
    panels.forEach(p => p.items = []);
    selectedItem = null;
    renderPanels();
    showToast('All cleared!');
  }
};
document.getElementById('exportBtn').onclick = exportComic;

document.addEventListener('keydown', (e)=>{
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedItem) {
    e.preventDefault();
    deleteItem(selectedItem);
    showToast('Removed!');
  }
  if (e.key === '1' || e.key === '2' || e.key === '3') {
    selectedPanelIdx = +e.key - 1;
    selectedItem = null;
    renderPanels();
  }
});
