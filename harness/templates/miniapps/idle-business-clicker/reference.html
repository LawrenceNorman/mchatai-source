<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>Adventure Capitalist</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}:root{--bg:#1a1a2e;--card:#16213e;--accent:#e94560;--gold:#f5c518;--green:#0f9b58;--text:#eee;--text-dim:#999;--blue:#4361ee}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}#app{max-width:480px;margin:0 auto;padding:8px 8px 100px}.header{text-align:center;padding:12px 8px;background:linear-gradient(135deg,#0f3460,#16213e);border-radius:12px;margin-bottom:8px;position:sticky;top:0;z-index:100}.header h1{font-size:18px;color:var(--gold);text-shadow:0 0 10px rgba(245,197,24,.3)}.money-display{font-size:28px;font-weight:bold;color:var(--green);margin:4px 0}.prestige-bar{display:flex;justify-content:center;gap:12px;font-size:12px;color:var(--text-dim)}.prestige-bar span{color:var(--gold)}.tabs{display:flex;gap:4px;margin-bottom:8px}.tab-btn{flex:1;padding:10px 6px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;background:#16213e;color:var(--text-dim)}.tab-btn.active{background:var(--accent);color:#fff}.businesses-list{display:flex;flex-direction:column;gap:8px}.biz-card{background:var(--card);border-radius:12px;padding:12px;border:1px solid #ffffff10;transition:.2s}.biz-card:active{transform:scale(.98)}.biz-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}.biz-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}.biz-info{flex:1;min-width:0}.biz-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.biz-earnings{font-size:12px;color:var(--green)}.biz-level{font-size:11px;color:var(--text-dim)}.biz-progress{width:100%;height:6px;background:#ffffff15;border-radius:3px;overflow:hidden;margin-bottom:8px}.biz-progress-fill{height:100%;border-radius:3px;transition:width .1s linear}.biz-actions{display:flex;gap:6px}.biz-btn{flex:1;padding:10px 4px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;min-height:44px;line-height:1.2}.biz-btn:disabled{opacity:.4;cursor:default}.biz-btn.run{background:var(--green);color:#fff}.biz-btn.buy{background:var(--blue);color:#fff}.biz-btn.mgr{background:#7c3aed;color:#fff}.biz-btn.mgr.hired{background:#374151;color:var(--green)}.upgrade-panel,.prestige-panel{display:none}.upgrade-panel.active,.prestige-panel.active,.businesses-list.active{display:flex;flex-direction:column;gap:8px}.upgrade-card{background:var(--card);border-radius:12px;padding:12px;border:1px solid #ffffff10}.upgrade-card h3{font-size:14px;margin-bottom:4px}.upgrade-card p{font-size:12px;color:var(--text-dim);margin-bottom:8px}.upgrade-buy-btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--gold);color:#1a1a2e;min-height:44px}.upgrade-buy-btn:disabled{opacity:.4;cursor:default}.prestige-panel{align-items:center;text-align:center;padding:20px}.prestige-panel h2{color:var(--gold);margin-bottom:12px;font-size:22px}.prestige-panel p{color:var(--text-dim);font-size:14px;margin-bottom:8px;line-height:1.5}.prestige-info{background:var(--card);border-radius:12px;padding:16px;width:100%;margin:12px 0}.prestige-info .big-num{font-size:36px;color:var(--gold);font-weight:bold}.prestige-btn{padding:16px 40px;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,var(--accent),#c0392b);color:#fff;min-height:50px;min-width:200px;margin-top:12px}.prestige-btn:disabled{opacity:.4;cursor:default}.float-text{position:fixed;pointer-events:none;font-weight:bold;color:var(--green);font-size:18px;z-index:9999;animation:floatUp .8s ease-out forwards;text-shadow:0 1px 3px rgba(0,0,0,.5)}@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:10000;animation:toastIn .3s ease;border:1px solid var(--gold)}.toast.out{animation:toastOut .3s ease forwards}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}</style></head><body><div id="app"><div class="header"><h1>Adventure Capitalist</h1><div class="money-display" id="moneyDisplay">$0.00</div><div class="prestige-bar"><div>Prestige: <span id="prestigeLvl">0</span></div><div>Multiplier: <span id="prestigeMult">1.0x</span></div></div></div><div class="tabs"><button class="tab-btn active" data-tab="businesses">Businesses</button><button class="tab-btn" data-tab="upgrades">Upgrades</button><button class="tab-btn" data-tab="prestige">Prestige</button></div><div class="businesses-list active" id="bizList"></div><div class="upgrade-panel" id="upgradePanel"></div><div class="prestige-panel" id="prestigePanel"><h2>Prestige Reset</h2><p>Reset all businesses and money to earn permanent multipliers that boost ALL future earnings!</p><div class="prestige-info"><p>You will earn:</p><div class="big-num" id="prestigeGain">0</div><p>Angel Investors</p><p style="margin-top:8px;font-size:12px">Each angel gives <span style="color:var(--gold)">+2%</span> to all profits</p></div><div class="prestige-info" style="margin-top:8px"><p>Current Angels: <span id="curAngels" style="color:var(--gold);font-size:20px">0</span></p><p>Lifetime Earnings: <span id="lifetimeEarn" style="color:var(--green)">$0</span></p></div><button class="prestige-btn" id="prestigeBtn">Prestige Now</button></div></div><script>(function(){const BUSINESSES=[{name:'Lemonade Stand',icon:'\ud83c\udf4b',color:'#f59e0b',baseCost:4,baseRevenue:1,baseTime:1000},{name:'Newspaper Delivery',icon:'\ud83d\udcf0',color:'#6366f1',baseCost:60,baseRevenue:60,baseTime:3000},{name:'Car Wash',icon:'\ud83d\ude97',color:'#3b82f6',baseCost:720,baseRevenue:540,baseTime:6000},{name:'Pizza Delivery',icon:'\ud83c\udf55',color:'#ef4444',baseCost:8640,baseRevenue:4320,baseTime:12000},{name:'Donut Shop',icon:'\ud83c\udf69',color:'#ec4899',baseCost:103680,baseRevenue:51840,baseTime:24000},{name:'Ice Cream Truck',icon:'\ud83c\udf66',color:'#14b8a6',baseCost:1244160,baseRevenue:622080,baseTime:48000}];const UPGRADES=[{name:'Golden Lemons',desc:'Lemonade earns 3x more',bizIdx:0,mult:3,cost:500},{name:'Faster Presses',desc:'Newspaper earns 3x more',bizIdx:1,mult:3,cost:5000},{name:'Wax Finish',desc:'Car Wash earns 3x more',bizIdx:2,mult:3,cost:50000},{name:'Wood-Fired Oven',desc:'Pizza earns 3x more',bizIdx:3,mult:3,cost:500000},{name:'Secret Recipe',desc:'Donut Shop earns 3x more',bizIdx:4,mult:3,cost:5000000},{name:'Turbo Engine',desc:'Ice Cream Truck earns 3x more',bizIdx:5,mult:3,cost:50000000},{name:'Mega Lemons',desc:'Lemonade earns 5x more',bizIdx:0,mult:5,cost:25000},{name:'Digital Edition',desc:'Newspaper earns 5x more',bizIdx:1,mult:5,cost:250000},{name:'Detailing Package',desc:'Car Wash earns 5x more',bizIdx:2,mult:5,cost:2500000},{name:'Express Delivery',desc:'Pizza earns 5x more',bizIdx:3,mult:5,cost:25000000},{name:'Franchise Deal',desc:'Donut Shop earns 5x more',bizIdx:4,mult:5,cost:250000000},{name:'Ice Cream Empire',desc:'Ice Cream Truck earns 5x more',bizIdx:5,mult:5,cost:2500000000}];let state=loadState();if(state.money<4&&state.businesses.every(b=>b.level===0))state.money=5;function defaultState(){return{money:5,lifetimeEarnings:0,angels:0,angelsClaimed:0,businesses:BUSINESSES.map(()=>({level:0,hasManager:false,running:false,progress:0,upgradeMult:1})),purchasedUpgrades:[]}}function loadState(){try{const s=localStorage.getItem('advcap_save');if(s){const p=JSON.parse(s);if(!p||typeof p.money!=='number'||p.money<0)return defaultState();if(!Array.isArray(p.businesses)||p.businesses.length!==6)return defaultState();if(!Array.isArray(p.purchasedUpgrades))p.purchasedUpgrades=[];if(typeof p.lifetimeEarnings!=='number'||p.lifetimeEarnings<0)p.lifetimeEarnings=0;if(typeof p.angels!=='number'||p.angels<0)p.angels=0;if(typeof p.angelsClaimed!=='number'||p.angelsClaimed<0)p.angelsClaimed=0;return p}}catch(e){}return defaultState()}function saveState(){localStorage.setItem('advcap_save',JSON.stringify(state))}function fmt(n){if(n>=1e15)return(n/1e15).toFixed(2)+' Quad';if(n>=1e12)return(n/1e12).toFixed(2)+' Tril';if(n>=1e9)return(n/1e9).toFixed(2)+' Bil';if(n>=1e6)return(n/1e6).toFixed(2)+' Mil';if(n>=1e3)return(n/1e3).toFixed(2)+'K';return n<100?'$'+n.toFixed(2):'$'+Math.floor(n)}function fmtMoney(n){return'$'+fmt(n).replace('$','')}function getCost(bizIdx,currentLevel){const b=BUSINESSES[bizIdx];return Math.floor(b.baseCost*Math.pow(1.15,currentLevel))}function getRevenue(bizIdx){const b=BUSINESSES[bizIdx];const s=state.businesses[bizIdx];if(s.level===0)return 0;const angelBonus=1+(state.angels*0.02);const prestigeMult=angelBonus;return b.baseRevenue*s.level*s.upgradeMult*prestigeMult}function getTime(bizIdx){return BUSINESSES[bizIdx].baseTime}function calcAngels(){return Math.max(0,Math.floor(150*Math.sqrt(state.lifetimeEarnings/1e13))-state.angelsClaimed)}const $=id=>document.getElementById(id);const app=$('app');function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),300)},2000)}function floatText(x,y,text){const el=document.createElement('div');el.className='float-text';el.textContent=text;el.style.left=x+'px';el.style.top=y+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),800)}function renderBusinesses(){const list=$('bizList');list.innerHTML='';BUSINESSES.forEach((b,i)=>{const s=state.businesses[i];const cost=getCost(i,s.level);const rev=getRevenue(i);const time=getTime(i);const mgrCost=Math.floor(b.baseCost*15*(i+1));const card=document.createElement('div');card.className='biz-card';card.innerHTML=`<div class="biz-top"><div class="biz-icon" style="background:${b.color}20;border:2px solid ${b.color}">${b.icon}</div><div class="biz-info"><div class="biz-name">${b.name}</div><div class="biz-earnings">${s.level>0?fmtMoney(rev)+' / cycle':'Not purchased'}</div><div class="biz-level">Level ${s.level} | ${(time/1000).toFixed(1)}s cycle</div></div></div><div class="biz-progress"><div class="biz-progress-fill" data-biz="${i}" style="width:${s.level>0?(s.progress/time*100):0}%;background:${b.color}"></div></div><div class="biz-actions">${s.level===0?`<button class="biz-btn buy" data-action="buy" data-biz="${i}">Buy ${fmtMoney(cost)}</button>`:`<button class="biz-btn run" data-action="run" data-biz="${i}" ${s.hasManager?'disabled':''}>${s.hasManager?'Auto':'Run'}</button><button class="biz-btn buy" data-action="buy" data-biz="${i}">+1 ${fmtMoney(cost)}</button>${!s.hasManager?`<button class="biz-btn mgr" data-action="mgr" data-biz="${i}">Mgr ${fmtMoney(mgrCost)}</button>`:`<button class="biz-btn mgr hired" disabled>\u2713 Mgr</button>`}`}</div>`;list.appendChild(card)})}function renderUpgrades(){const panel=$('upgradePanel');panel.innerHTML='';UPGRADES.forEach((u,i)=>{if(state.purchasedUpgrades.includes(i))return;const card=document.createElement('div');card.className='upgrade-card';card.innerHTML=`<h3>${BUSINESSES[u.bizIdx].icon} ${u.name}</h3><p>${u.desc}</p><button class="upgrade-buy-btn" data-upgrade="${i}" ${state.money<u.cost?'disabled':''}>${fmtMoney(u.cost)}</button>`;panel.appendChild(card)});if(panel.children.length===0){panel.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-dim)">All upgrades purchased!</div>'}}function renderPrestige(){const gain=calcAngels();$('prestigeGain').textContent=gain.toLocaleString();$('curAngels').textContent=state.angels.toLocaleString();$('lifetimeEarn').textContent=fmtMoney(state.lifetimeEarnings);$('prestigeBtn').disabled=gain<1}function render(){$('moneyDisplay').textContent=fmtMoney(state.money);$('prestigeLvl').textContent=state.angelsClaimed;$('prestigeMult').textContent=(1+state.angels*0.02).toFixed(1)+'x';renderBusinesses();renderUpgrades();renderPrestige()}document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const tab=btn.dataset.tab;$('bizList').classList.toggle('active',tab==='businesses');$('upgradePanel').classList.toggle('active',tab==='upgrades');$('prestigePanel').classList.toggle('active',tab==='prestige');if(tab==='upgrades')renderUpgrades();if(tab==='prestige')renderPrestige()})});$('bizList').addEventListener('click',e=>{const btn=e.target.closest('.biz-btn');if(!btn||btn.disabled)return;const i=parseInt(btn.dataset.biz);const action=btn.dataset.action;const b=BUSINESSES[i];const s=state.businesses[i];if(action==='buy'){const cost=getCost(i,s.level);if(state.money>=cost){state.money-=cost;s.level++;showToast(`${b.name} level ${s.level}!`);floatText(e.clientX,e.clientY,'-'+fmtMoney(cost));render();saveState()}}else if(action==='run'){if(s.level>0&&!s.running){s.running=true;s.progress=0}}else if(action==='mgr'){const mgrCost=Math.floor(b.baseCost*15*(i+1));if(state.money>=mgrCost&&!s.hasManager){state.money-=mgrCost;s.hasManager=true;s.running=true;showToast(`Manager hired for ${b.name}!`);render();saveState()}}});$('upgradePanel').addEventListener('click',e=>{const btn=e.target.closest('.upgrade-buy-btn');if(!btn||btn.disabled)return;const idx=parseInt(btn.dataset.upgrade);const u=UPGRADES[idx];if(state.money>=u.cost){state.money-=u.cost;state.businesses[u.bizIdx].upgradeMult*=u.mult;state.purchasedUpgrades.push(idx);showToast(`${u.name} purchased! ${u.mult}x earnings!`);render();saveState()}});$('prestigeBtn').addEventListener('click',()=>{const gain=calcAngels();if(gain<1)return;if(!confirm(`Prestige for ${gain} Angel Investors?

This will reset all businesses, money, and upgrades.
Your angels provide permanent +2% each to ALL profits.`))return;state.angels+=gain;state.angelsClaimed+=gain;state.money=5;state.lifetimeEarnings=0;state.businesses=BUSINESSES.map(()=>({level:0,hasManager:false,running:false,progress:0,upgradeMult:1}));state.purchasedUpgrades=[];showToast(`Prestiged! +${gain} Angels (${(1+state.angels*0.02).toFixed(1)}x multiplier)`);render();saveState()});let lastTime=performance.now();function gameLoop(now){const dt=now-lastTime;lastTime=now;state.businesses.forEach((s,i)=>{if(!s.running||s.level===0)return;const time=getTime(i);s.progress+=dt;if(s.progress>=time){const rev=getRevenue(i);state.money+=rev;state.lifetimeEarnings+=rev;s.progress=s.progress%time;if(!s.hasManager){s.running=false;s.progress=0}}const bar=document.querySelector(`.biz-progress-fill[data-biz="${i}"]`);if(bar)bar.style.width=(s.progress/time*100)+'%';if(s.hasManager&&!s.running)s.running=true});$('moneyDisplay').textContent=fmtMoney(state.money);requestAnimationFrame(gameLoop)}render();requestAnimationFrame(gameLoop);setInterval(saveState,5000)})();</script></body></html>
