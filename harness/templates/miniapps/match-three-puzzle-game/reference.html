<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#3b1361" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Sweet Cascade — Match 3</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation;overscroll-behavior:none}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    color:#fff;
    background:
      radial-gradient(140% 90% at 50% -10%, #6f2bb0 0%, #3b1361 35%, #1a0838 75%, #0b0220 100%);
    min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;align-items:stretch;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  /* candy stripes pattern in background */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,180,255,.08) 0 2px, transparent 3px),
      radial-gradient(circle at 78% 32%, rgba(180,255,255,.08) 0 2px, transparent 3px),
      radial-gradient(circle at 32% 78%, rgba(255,255,180,.07) 0 2px, transparent 3px),
      radial-gradient(circle at 88% 88%, rgba(255,200,150,.07) 0 2px, transparent 3px);
    background-size:160px 160px, 220px 220px, 180px 180px, 240px 240px;
    z-index:0;
  }
  .app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;flex:1;min-height:0;padding:8px 10px 14px}
  /* ==== Top HUD ==== */
  .hud{
    width:100%;max-width:480px;
    display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;
    padding:8px 10px;border-radius:18px;
    background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));
    border:1px solid rgba(255,255,255,.18);
    box-shadow:0 6px 18px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.25);
    backdrop-filter:blur(8px);
  }
  .badge{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-width:64px;padding:6px 10px;border-radius:12px;
    background:linear-gradient(180deg,#2a0e4d,#160626);
    border:1px solid rgba(255,255,255,.18);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.18), 0 2px 6px rgba(0,0,0,.35);
  }
  .badge .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#f7c7ff;opacity:.95}
  .badge .val{font-size:20px;font-weight:800;color:#fff;line-height:1.05;text-shadow:0 1px 0 rgba(0,0,0,.4)}
  .progress-wrap{display:flex;flex-direction:column;gap:6px;padding:0 4px}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:#ffe6ff}
  .progress-top b{font-size:13px;color:#fff;font-weight:800;letter-spacing:.02em}
  .bar{position:relative;height:14px;border-radius:999px;background:rgba(0,0,0,.35);overflow:hidden;border:1px solid rgba(255,255,255,.15);box-shadow:inset 0 2px 4px rgba(0,0,0,.5)}
  .bar > .fill{
    position:absolute;inset:0;width:0%;
    background:linear-gradient(90deg,#ff5fa2 0%,#ffb454 50%,#7ce0ff 100%);
    box-shadow:0 0 10px rgba(255,180,255,.6);
    transition:width .35s cubic-bezier(.2,.8,.2,1);
  }
  .bar > .fill::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.5),transparent 60%);
    border-radius:inherit;
  }
  .stars{display:flex;gap:2px;margin-top:2px;font-size:11px}
  .stars .star{opacity:.35;transition:opacity .25s, transform .25s}
  .stars .star.on{opacity:1;transform:scale(1.05);text-shadow:0 0 8px #ffd766}
  .level-pill{
    display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
    background:linear-gradient(180deg,#ff5fa2,#a8266b);
    border:1px solid rgba(255,255,255,.35);
    font-weight:800;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
    box-shadow:0 4px 10px rgba(255,90,160,.45), inset 0 1px 0 rgba(255,255,255,.5);
  }

  /* ==== Board ==== */
  .stage{
    margin-top:12px;width:100%;max-width:480px;
    display:flex;justify-content:center;
  }
  .board-wrap{
    position:relative;width:min(96vw, 480px);
    aspect-ratio:1/1;
    border-radius:24px;
    padding:10px;
    background:
      radial-gradient(120% 120% at 50% 0%, #5a1f8e 0%, #2a0c52 60%, #170632 100%);
    border:1px solid rgba(255,255,255,.18);
    box-shadow:
      0 18px 40px rgba(0,0,0,.55),
      inset 0 2px 0 rgba(255,255,255,.18),
      inset 0 -3px 0 rgba(0,0,0,.35);
  }
  .board{
    position:relative;width:100%;height:100%;
    border-radius:16px;
    background:
      linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.15)),
      repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0 8px, rgba(255,255,255,0) 8px 16px);
    box-shadow:inset 0 4px 10px rgba(0,0,0,.5);
    overflow:hidden;
    touch-action:none;
  }
  .cell{
    position:absolute;
    display:flex;align-items:center;justify-content:center;
    transition: left .22s cubic-bezier(.2,.8,.2,1), top .28s cubic-bezier(.2,.8,.2,1), transform .18s ease;
    will-change:transform,left,top;
  }
  .cell.dropping{ transition: top .42s cubic-bezier(.34,1.56,.64,1); }
  .cell.swapping{ transition: left .18s ease, top .18s ease; }
  .cell.selected .candy{
    transform:scale(1.08);
    filter:drop-shadow(0 0 10px #fff) drop-shadow(0 0 18px rgba(255,255,255,.6));
  }
  .cell.hint .candy{ animation: hintPulse 1.1s ease-in-out infinite; }
  @keyframes hintPulse {
    0%,100%{ transform:scale(1); filter:drop-shadow(0 2px 3px rgba(0,0,0,.5)); }
    50%   { transform:scale(1.12); filter:drop-shadow(0 0 10px #fff) drop-shadow(0 0 16px #fff); }
  }
  .candy{
    width:88%;height:88%;
    display:block;pointer-events:none;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.55));
    transition: transform .15s ease;
  }
  .candy.spawn{ animation: spawnPop .35s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes spawnPop {
    0% { transform:scale(.2); opacity:0; }
    60%{ transform:scale(1.12); opacity:1; }
    100%{ transform:scale(1); opacity:1; }
  }
  .candy.popping{ animation: candyPop .26s ease-in forwards; }
  @keyframes candyPop {
    0% { transform:scale(1) rotate(0); opacity:1; }
    50%{ transform:scale(1.35) rotate(8deg); opacity:.95; filter:drop-shadow(0 0 12px #fff) brightness(1.4); }
    100%{ transform:scale(0); rotate:18deg; opacity:0; }
  }
  .pop-fx{
    position:absolute;pointer-events:none;width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    animation: popBurst .5s ease-out forwards;
  }
  @keyframes popBurst {
    0% { transform:scale(.4); opacity:.95; }
    100%{ transform:scale(1.8); opacity:0; }
  }
  .pop-fx::before{
    content:"";width:60%;height:60%;border-radius:50%;
    background:radial-gradient(circle, #fff 0%, #ffec99 25%, rgba(255,200,80,.7) 45%, rgba(255,90,180,0) 70%);
    filter:blur(2px);
  }
  .score-popup{
    position:absolute;pointer-events:none;
    font-weight:900;font-size:14px;color:#fff;
    text-shadow:0 0 8px #ff7eb6, 0 1px 0 #000;
    animation: scoreRise .9s ease-out forwards;
    z-index:30;
  }
  @keyframes scoreRise {
    0% { transform:translate(-50%,0) scale(.6); opacity:0; }
    20%{ transform:translate(-50%,-6px) scale(1.1); opacity:1; }
    100%{ transform:translate(-50%,-46px) scale(1); opacity:0; }
  }
  .board.shake{ animation: shake .35s ease; }
  @keyframes shake {
    0%,100%{transform:translate(0,0)}
    20%{transform:translate(-4px,2px)}
    40%{transform:translate(5px,-1px)}
    60%{transform:translate(-3px,2px)}
    80%{transform:translate(3px,0)}
  }

  /* striped & bomb visual extras */
  .candy.stripe-h{ filter:drop-shadow(0 0 6px #fff) drop-shadow(0 3px 3px rgba(0,0,0,.55)); }
  .candy.stripe-v{ filter:drop-shadow(0 0 6px #fff) drop-shadow(0 3px 3px rgba(0,0,0,.55)); }
  .candy.bomb    { filter:drop-shadow(0 0 12px #fff) drop-shadow(0 3px 3px rgba(0,0,0,.55)); animation: bombSpin 4s linear infinite; }
  @keyframes bombSpin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

  /* line-clear flash overlay */
  .line-flash{
    position:absolute;background:linear-gradient(90deg, transparent, #fff, transparent);
    pointer-events:none;animation: lineFlash .5s ease-out forwards;mix-blend-mode:screen;
    z-index:20;
  }
  .line-flash.vert{ background:linear-gradient(180deg, transparent, #fff, transparent); }
  @keyframes lineFlash {
    0%{opacity:0;transform:scale(.2,1)}
    20%{opacity:1}
    100%{opacity:0;transform:scale(1.2,1)}
  }
  .line-flash.vert{ animation-name: lineFlashV; }
  @keyframes lineFlashV {
    0%{opacity:0;transform:scale(1,.2)}
    20%{opacity:1}
    100%{opacity:0;transform:scale(1,1.2)}
  }

  .combo-tag{
    position:absolute;left:50%;top:18%;transform:translate(-50%,0);
    pointer-events:none;
    padding:6px 14px;border-radius:999px;
    background:linear-gradient(180deg,#ff5fa2,#a8266b);
    color:#fff;font-weight:800;letter-spacing:.06em;font-size:14px;
    border:1px solid rgba(255,255,255,.4);
    box-shadow:0 6px 14px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.4);
    animation: comboPop .9s cubic-bezier(.2,.8,.2,1) forwards;
    z-index:25;text-shadow:0 1px 0 rgba(0,0,0,.4);
  }
  @keyframes comboPop {
    0%{ transform:translate(-50%,10px) scale(.6); opacity:0; }
    20%{ transform:translate(-50%,-4px) scale(1.1); opacity:1; }
    80%{ transform:translate(-50%,-12px) scale(1); opacity:1; }
    100%{ transform:translate(-50%,-30px) scale(.95); opacity:0; }
  }

  /* ==== Footer ==== */
  .foot{
    margin-top:10px;width:100%;max-width:480px;
    display:flex;gap:8px;justify-content:space-between;align-items:center;
    padding:8px 10px;border-radius:14px;
    background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 4px 10px rgba(0,0,0,.3);
  }
  .ghost-btn{
    appearance:none;border:0;cursor:pointer;
    padding:10px 14px;border-radius:12px;
    font-weight:800;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:#fff;
    background:linear-gradient(180deg,#7c2bb0,#451265);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 3px 6px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.3);
    min-height:44px;min-width:44px;
  }
  .ghost-btn:active{ transform:translateY(1px); filter:brightness(.9); }
  .hint-text{font-size:12px;color:#f7c7ff;letter-spacing:.04em;flex:1;text-align:center;padding:0 6px}

  /* ==== Overlay (intro / level-end) ==== */
  .overlay{
    position:fixed;inset:0;z-index:50;
    background:radial-gradient(120% 90% at 50% 0%, rgba(80,12,140,.85), rgba(10,2,40,.92) 70%, rgba(0,0,0,.95) 100%);
    display:flex;align-items:center;justify-content:center;
    padding:20px;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .panel{
    width:min(420px, 92vw);
    background:linear-gradient(180deg, #4a1683 0%, #2a0e4d 100%);
    border-radius:22px;padding:22px 20px 18px;
    border:1px solid rgba(255,255,255,.25);
    box-shadow:
      0 20px 50px rgba(0,0,0,.6),
      inset 0 1px 0 rgba(255,255,255,.35),
      inset 0 -3px 0 rgba(0,0,0,.35);
    text-align:center;
    animation: panelIn .35s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes panelIn { from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }
  .panel h1{
    margin:0 0 6px;font-size:30px;font-weight:900;letter-spacing:.02em;
    background:linear-gradient(180deg,#fff 0%, #ffd0ee 60%, #ff85c7 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 0 rgba(255,90,160,.25);
  }
  .panel h2{margin:0 0 6px;font-size:22px;font-weight:900;color:#fff}
  .panel p{margin:6px 0 12px;color:#ffe6ff;font-size:14px;line-height:1.45}
  .panel .lvl-row{display:flex;justify-content:space-around;margin:14px 0;gap:8px}
  .panel .lvl-cell{
    flex:1;padding:10px 6px;border-radius:14px;
    background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.18);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
  }
  .panel .lvl-cell .v{font-size:22px;font-weight:900;color:#fff}
  .panel .lvl-cell .l{font-size:11px;letter-spacing:.12em;color:#f7c7ff;text-transform:uppercase;margin-top:2px}
  .big-btn{
    appearance:none;border:0;cursor:pointer;width:100%;
    margin-top:10px;padding:14px;border-radius:14px;
    font-weight:900;font-size:16px;letter-spacing:.08em;text-transform:uppercase;color:#fff;
    background:linear-gradient(180deg,#ff8ec8,#d83a85 60%,#a01863);
    border:1px solid rgba(255,255,255,.4);
    box-shadow:0 8px 18px rgba(255,80,150,.45), inset 0 1px 0 rgba(255,255,255,.55), inset 0 -3px 0 rgba(0,0,0,.25);
    min-height:48px;
  }
  .big-btn:active{ transform:translateY(1px); filter:brightness(.95); }
  .stars-big{display:flex;justify-content:center;gap:8px;margin:6px 0 4px;font-size:34px}
  .stars-big .star{opacity:.3;transition:transform .35s, opacity .35s, text-shadow .35s}
  .stars-big .star.on{opacity:1;transform:scale(1.1);text-shadow:0 0 14px #ffd766, 0 0 22px #ffae3a;}
  .candy-row{display:flex;justify-content:center;gap:10px;margin:10px 0 6px}
  .candy-row svg{width:42px;height:42px;animation: float 2.5s ease-in-out infinite;filter:drop-shadow(0 4px 4px rgba(0,0,0,.5))}
  .candy-row svg:nth-child(2){animation-delay:.2s}
  .candy-row svg:nth-child(3){animation-delay:.4s}
  .candy-row svg:nth-child(4){animation-delay:.6s}
  .candy-row svg:nth-child(5){animation-delay:.8s}
  @keyframes float { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-6px) rotate(3deg)} }

  /* fail state */
  .panel.fail h1{
    background:linear-gradient(180deg,#fff 0%, #ffd1d1 60%, #ff7c7c 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }

  /* responsive minimum sizing for narrow screens */
  @media (max-height: 640px){
    .badge .val{font-size:18px}
    .candy-row svg{width:34px;height:34px}
    .panel h1{font-size:24px}
  }
</style>
</head>
<body>

<!-- shared SVG defs (gradients & filters) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <radialGradient id="shineRed" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffe9ec"/>
      <stop offset="35%" stop-color="#ff5b6e"/>
      <stop offset="100%" stop-color="#8e1226"/>
    </radialGradient>
    <radialGradient id="shineOrange" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff2d6"/>
      <stop offset="35%" stop-color="#ff9c2e"/>
      <stop offset="100%" stop-color="#a04a02"/>
    </radialGradient>
    <radialGradient id="shineYellow" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fffbd8"/>
      <stop offset="40%" stop-color="#ffd83a"/>
      <stop offset="100%" stop-color="#a07000"/>
    </radialGradient>
    <radialGradient id="shineGreen" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e8ffd6"/>
      <stop offset="40%" stop-color="#5fd24c"/>
      <stop offset="100%" stop-color="#1a6f17"/>
    </radialGradient>
    <radialGradient id="shineBlue" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#dbf2ff"/>
      <stop offset="40%" stop-color="#3aa9ff"/>
      <stop offset="100%" stop-color="#0c3f80"/>
    </radialGradient>

    <radialGradient id="bombGrad" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="20%" stop-color="#ffe16e"/>
      <stop offset="55%" stop-color="#ff62b6"/>
      <stop offset="100%" stop-color="#3b0f5c"/>
    </radialGradient>

    <linearGradient id="stripeShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,.85)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
</svg>

<div class="app">
  <div class="hud" role="region" aria-label="Status">
    <div class="badge" aria-label="Score">
      <div class="lbl">Score</div>
      <div class="val" id="scoreVal">0</div><span data-mchatai-score id="leaderboardScore" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;" aria-hidden="true">0</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="level-pill" id="levelPill">Level 1</span>
        <span>Target <b id="targetVal">1500</b></span>
      </div>
      <div class="bar"><div class="fill" id="progFill"></div></div>
      <div class="stars" id="starsRow" aria-label="Stars">
        <span class="star">★</span><span class="star">★</span><span class="star">★</span>
      </div>
    </div>
    <div class="badge" aria-label="Moves remaining">
      <div class="lbl">Moves</div>
      <div class="val" id="movesVal">30</div>
    </div>
  </div>

  <div class="stage">
    <div class="board-wrap">
      <div id="board" class="board" aria-label="Match-3 board"></div>
    </div>
  </div>

  <div class="foot">
    <button class="ghost-btn" id="restartBtn" aria-label="Restart level">Restart</button>
    <div class="hint-text" id="hintText">Swipe a candy to swap with a neighbor</div>
    <button class="ghost-btn" id="hintBtn" aria-label="Hint">Hint</button>
  </div>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="panel" id="panel">
    <div class="candy-row" id="introCandies"></div>
    <h1 id="ovTitle">Sweet Cascade</h1>
    <p id="ovBody">Match three or more candies in a row or column. Reach the target score before you run out of moves!</p>
    <div class="stars-big" id="ovStars" style="display:none">
      <span class="star">★</span><span class="star">★</span><span class="star">★</span>
    </div>
    <div class="lvl-row" id="ovStats" style="display:none">
      <div class="lvl-cell"><div class="v" id="ovScore">0</div><div class="l">Score</div></div>
      <div class="lvl-cell"><div class="v" id="ovTarget">0</div><div class="l">Target</div></div>
      <div class="lvl-cell"><div class="v" id="ovMoves">0</div><div class="l">Moves Left</div></div>
    </div>
    <button class="big-btn" id="ovBtn">Play</button>
  </div>
</div>

<script>
(() => {
  // ============================================================
  // Sweet Cascade — match-3, single-file, touch-only, portrait.
  // ============================================================

  const SIZE = 8;                       // 8x8
  const COLORS = 5;                     // 5 candy colors
  const COLOR_NAMES = ['red','orange','yellow','green','blue'];
  const SHINE_IDS = ['shineRed','shineOrange','shineYellow','shineGreen','shineBlue'];
  const SUIT_FILL  = ['#ff5b6e','#ff9c2e','#ffd83a','#5fd24c','#3aa9ff'];

  // HUB-21 2026-05-17 — expanded from 3 -> 12 levels. Targets rise non-linearly;
  // moves taper from 30 down to 18. The last few levels are intentionally tight
  // so 3-star play feels earned.
  const LEVELS = [
    { target: 1500,  moves: 30 },
    { target: 3000,  moves: 30 },
    { target: 5000,  moves: 28 },
    { target: 7500,  moves: 26 },
    { target: 10500, moves: 25 },
    { target: 14000, moves: 24 },
    { target: 18000, moves: 22 },
    { target: 22500, moves: 22 },
    { target: 28000, moves: 20 },
    { target: 34500, moves: 20 },
    { target: 42000, moves: 18 },
    { target: 50000, moves: 18 },
  ];
  const STAR_PCTS = [1.0, 1.4, 1.8];   // 1, 1.4x, 1.8x of target

  // Special candy types: 0..4 = colored; specials encoded with extras
  // cell shape: { color: 0..4, kind: 'normal' | 'striped-h' | 'striped-v' | 'bomb', id }
  let board = [];
  let cellEls = [];                     // 2D matrix of DOM elements
  let nextId = 1;

  const boardEl = document.getElementById('board');
  const scoreVal = document.getElementById('scoreVal');
  const movesVal = document.getElementById('movesVal');
  const targetVal = document.getElementById('targetVal');
  const progFill = document.getElementById('progFill');
  const levelPill = document.getElementById('levelPill');
  const starsRow = document.getElementById('starsRow');
  const hintText = document.getElementById('hintText');

  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovBody  = document.getElementById('ovBody');
  const ovBtn   = document.getElementById('ovBtn');
  const ovStars = document.getElementById('ovStars');
  const ovStats = document.getElementById('ovStats');
  const ovScore = document.getElementById('ovScore');
  const ovTarget= document.getElementById('ovTarget');
  const ovMoves = document.getElementById('ovMoves');

  let level = 0;
  // HUB-21 — cumulative score across cleared levels. Banked at endLevel
  // when passed=true. Exposed to the hosted-page leaderboard bridge via a
  // hidden [data-mchatai-score] element so submitted scores reflect the full
  // run rather than the per-level reset value. Reset on New Game+ only.
  let cumulativeScore = 0;
  let score = 0;
  let movesLeft = 0;
  let busy = false;        // input lock during animations
  let cellPx = 0;          // computed cell size
  let hintTimer = null;
  let hintCells = [];

  // Pre-render decorative candies on intro

  // ---------- Board model ----------
  function makeCell(color, kind='normal'){
    return { color, kind, id: nextId++ };
  }
  function freshGrid(){
    // Fill avoiding starting matches.
    const g = Array.from({length:SIZE},()=>Array(SIZE).fill(null));
    for (let r=0;r<SIZE;r++){
      for (let c=0;c<SIZE;c++){
        let tries = 0, color;
        do {
          color = Math.floor(Math.random()*COLORS);
          tries++;
        } while (
          tries < 20 && (
            (c>=2 && g[r][c-1].color===color && g[r][c-2].color===color) ||
            (r>=2 && g[r-1][c].color===color && g[r-2][c].color===color)
          )
        );
        g[r][c] = makeCell(color);
      }
    }
    // Ensure at least one move exists; if not, reshuffle.
    if (!findAnyMove(g)) return freshGrid();
    return g;
  }

  function inBounds(r,c){ return r>=0 && r<SIZE && c>=0 && c<SIZE; }

  function cloneGrid(g){
    return g.map(row=>row.map(cell=>cell?{...cell}:null));
  }

  // Find all matches in grid; return { positions:Set, runs: [{cells,len,dir,color}] }
  function findMatches(g){
    const positions = new Set();
    const runs = [];
    // horizontal
    for (let r=0;r<SIZE;r++){
      let c=0;
      while (c<SIZE){
        const a = g[r][c];
        if (!a){ c++; continue; }
        let len=1;
        while (c+len<SIZE && g[r][c+len] && g[r][c+len].color===a.color){ len++; }
        if (len>=3){
          const cells=[];
          for (let k=0;k<len;k++){ cells.push([r,c+k]); positions.add((r)*SIZE+(c+k)); }
          runs.push({cells,len,dir:'h',color:a.color});
        }
        c += Math.max(1,len);
      }
    }
    // vertical
    for (let c=0;c<SIZE;c++){
      let r=0;
      while (r<SIZE){
        const a = g[r][c];
        if (!a){ r++; continue; }
        let len=1;
        while (r+len<SIZE && g[r+len][c] && g[r+len][c].color===a.color){ len++; }
        if (len>=3){
          const cells=[];
          for (let k=0;k<len;k++){ cells.push([r+k,c]); positions.add((r+k)*SIZE+c); }
          runs.push({cells,len,dir:'v',color:a.color});
        }
        r += Math.max(1,len);
      }
    }
    return { positions, runs };
  }

  function hasMatchAfterSwap(g, r1,c1, r2,c2){
    const t = cloneGrid(g);
    [t[r1][c1], t[r2][c2]] = [t[r2][c2], t[r1][c1]];
    return findMatches(t).positions.size > 0;
  }

  // Find any legal swap; return [[r,c],[r2,c2]] or null
  function findAnyMove(g){
    for (let r=0;r<SIZE;r++){
      for (let c=0;c<SIZE;c++){
        // bombs/specials always legal as a swap target if adjacent
        const here = g[r][c];
        if (here && here.kind === 'bomb') {
          if (c+1<SIZE && g[r][c+1]) return [[r,c],[r,c+1]];
          if (r+1<SIZE && g[r+1][c]) return [[r,c],[r+1,c]];
        }
        if (c+1<SIZE && hasMatchAfterSwap(g,r,c,r,c+1)) return [[r,c],[r,c+1]];
        if (r+1<SIZE && hasMatchAfterSwap(g,r,c,r+1,c)) return [[r,c],[r+1,c]];
        // also legal if either side is bomb
        if (c+1<SIZE && (g[r][c]?.kind==='bomb' || g[r][c+1]?.kind==='bomb')) return [[r,c],[r,c+1]];
        if (r+1<SIZE && (g[r][c]?.kind==='bomb' || g[r+1][c]?.kind==='bomb')) return [[r,c],[r+1,c]];
      }
    }
    return null;
  }

  // ---------- Rendering ----------
  function computeCellPx(){
    const rect = boardEl.getBoundingClientRect();
    cellPx = rect.width / SIZE;
  }

  function renderInitial(){
    boardEl.innerHTML = '';
    cellEls = Array.from({length:SIZE},()=>Array(SIZE).fill(null));
    computeCellPx();
    for (let r=0;r<SIZE;r++){
      for (let c=0;c<SIZE;c++){
        const cell = board[r][c];
        const el = createCellEl(cell, r, c);
        boardEl.appendChild(el);
        cellEls[r][c] = el;
      }
    }
  }

  function createCellEl(cell, r, c){
    const el = document.createElement('div');
    el.className = 'cell';
    el.dataset.id = cell.id;
    el.style.width = cellPx+'px';
    el.style.height = cellPx+'px';
    el.style.left = (c*cellPx)+'px';
    el.style.top  = (r*cellPx)+'px';
    el.innerHTML = candyMarkup(cell.color, cell.kind);
    if (cell.kind !== 'bomb' && cell.kind !== 'normal'){
      // already has class via markup
    }
    return el;
  }

  function repositionAll(){
    for (let r=0;r<SIZE;r++){
      for (let c=0;c<SIZE;c++){
        const el = cellEls[r][c];
        if (!el) continue;
        el.style.width = cellPx+'px';
        el.style.height = cellPx+'px';
        el.style.left = (c*cellPx)+'px';
        el.style.top  = (r*cellPx)+'px';
      }
    }
  }

  function setCellEl(r,c,el){
    cellEls[r][c] = el;
    if (!el) return;
    el.style.left = (c*cellPx)+'px';
    el.style.top  = (r*cellPx)+'px';
  }

  // ---------- Touch / swipe input ----------
  let touchStart = null; // {x,y,r,c,id}
  let touchedEl = null;

  function getCellFromPoint(x, y){
    const rect = boardEl.getBoundingClientRect();
    const c = Math.floor((x - rect.left) / cellPx);
    const r = Math.floor((y - rect.top)  / cellPx);
    if (!inBounds(r,c)) return null;
    return {r, c};
  }

  boardEl.addEventListener('touchstart', onPointerDown, {passive:false});
  boardEl.addEventListener('touchmove',  onPointerMove, {passive:false});
  boardEl.addEventListener('touchend',   onPointerUp,   {passive:false});
  boardEl.addEventListener('touchcancel',onPointerUp,   {passive:false});
  // also support desktop drag for testing
  boardEl.addEventListener('mousedown', e => onPointerDown(e, true));
  window.addEventListener('mousemove',  e => onPointerMove(e, true));
  window.addEventListener('mouseup',    e => onPointerUp(e,   true));

  function getPoint(e, isMouse){
    if (isMouse) return {x:e.clientX, y:e.clientY};
    const t = e.touches[0] || e.changedTouches[0];
    return {x:t.clientX, y:t.clientY};
  }

  function onPointerDown(e, isMouse){
    if (busy) return;
    e.preventDefault();
    cancelHint();
    const p = getPoint(e, isMouse);
    const rc = getCellFromPoint(p.x, p.y);
    if (!rc) return;
    touchStart = { x:p.x, y:p.y, r:rc.r, c:rc.c };
    touchedEl = cellEls[rc.r][rc.c];
    if (touchedEl) touchedEl.classList.add('selected');
  }
  function onPointerMove(e, isMouse){
    if (!touchStart) return;
    e.preventDefault();
    const p = getPoint(e, isMouse);
    const dx = p.x - touchStart.x;
    const dy = p.y - touchStart.y;
    if (Math.abs(dx) < cellPx*0.35 && Math.abs(dy) < cellPx*0.35) return;
    // determine direction
    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1;
    else dr = dy > 0 ? 1 : -1;
    const r2 = touchStart.r + dr, c2 = touchStart.c + dc;
    const r1 = touchStart.r,      c1 = touchStart.c;
    touchStart = null;
    if (touchedEl) touchedEl.classList.remove('selected');
    touchedEl = null;
    if (!inBounds(r2,c2)) return;
    attemptSwap(r1,c1,r2,c2);
  }
  function onPointerUp(e, isMouse){
    if (!touchStart) return;
    if (touchedEl) touchedEl.classList.remove('selected');
    touchStart = null;
    touchedEl = null;
  }

  // ---------- Swap & resolve loop ----------
  async function attemptSwap(r1,c1,r2,c2){
    if (busy) return;
    busy = true;
    cancelHint();
    // visual swap
    swapVisual(r1,c1,r2,c2);
    // model swap
    const a = board[r1][c1], b = board[r2][c2];
    board[r1][c1] = b; board[r2][c2] = a;
    await sleep(190);

    // bomb-special handling: bomb swapped with colored => clear that color
    let bombClear = null;
    if (a && a.kind === 'bomb' && b && b.kind !== 'bomb'){
      bombClear = { bombAt:[r2,c2], color: b.color, killAt:[r1,c1] };
    } else if (b && b.kind === 'bomb' && a && a.kind !== 'bomb'){
      bombClear = { bombAt:[r1,c1], color: a.color, killAt:[r2,c2] };
    } else if (a && b && a.kind === 'bomb' && b.kind === 'bomb'){
      bombClear = { bombAt:[r2,c2], color: -1, killAt:[r1,c1] }; // clear all
    }

    if (bombClear){
      await detonateBombSwap(bombClear);
      await resolveCascades(2);
      consumeMove();
      busy = false;
      return;
    }

    // normal swap: must produce a match else swap back
    const m = findMatches(board);
    if (m.positions.size === 0){
      // illegal — swap back
      await sleep(80);
      swapVisual(r2,c2,r1,c1);
      const tmp = board[r1][c1]; board[r1][c1]=board[r2][c2]; board[r2][c2]=tmp;
      await sleep(190);
      busy = false;
      shake();
      return;
    }
    // resolve with cascade
    await resolveCascades(1, {swapPositions:[[r1,c1],[r2,c2]]});
    consumeMove();
    busy = false;
  }

  function swapVisual(r1,c1,r2,c2){
    const a = cellEls[r1][c1], b = cellEls[r2][c2];
    if (!a || !b) return;
    a.classList.add('swapping');
    b.classList.add('swapping');
    a.style.left = (c2*cellPx)+'px';
    a.style.top  = (r2*cellPx)+'px';
    b.style.left = (c1*cellPx)+'px';
    b.style.top  = (r1*cellPx)+'px';
    cellEls[r1][c1] = b;
    cellEls[r2][c2] = a;
    setTimeout(()=>{ a.classList.remove('swapping'); b.classList.remove('swapping'); }, 200);
  }

  async function detonateBombSwap({bombAt, color, killAt}){
    const cleared = new Set();
    if (color === -1){
      // both bombs: clear everything
      for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) cleared.add(r*SIZE+c);
    } else {
      for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++){
        if (board[r][c] && board[r][c].color === color) cleared.add(r*SIZE+c);
      }
      cleared.add(bombAt[0]*SIZE+bombAt[1]);
      cleared.add(killAt[0]*SIZE+killAt[1]);
    }
    flash('all');
    addScore(cleared.size * 60);
    showCombo('Color Bomb!');
    await clearAndCollapse(cleared);
  }

  // resolveCascades: keep clearing matches until none, multiplying score
  async function resolveCascades(startMul = 1, opts = {}){
    let cascade = 0;
    while (true){
      const m = findMatches(board);
      if (m.positions.size === 0) break;
      cascade++;
      const mult = Math.max(1, startMul + cascade - 1);

      // Determine special candies created by runs of len 4 / 5+
      // For each run, if any of the swap-positions is in that run, create special there;
      // otherwise create at the first cell of the run.
      const createAt = [];
      const swapPos = (opts.swapPositions || []).map(p => p[0]*SIZE+p[1]);
      for (const run of m.runs){
        if (run.len < 4) continue;
        let pickIdx = 0;
        for (let i=0;i<run.cells.length;i++){
          const id = run.cells[i][0]*SIZE+run.cells[i][1];
          if (swapPos.includes(id)){ pickIdx = i; break; }
        }
        const [pr,pc] = run.cells[pickIdx];
        if (run.len >= 5){
          createAt.push({r:pr, c:pc, color:run.color, kind:'bomb'});
        } else {
          // 4-in-a-row: striped; horizontal run -> stripe-h or stripe-v?
          // In Candy Crush: matching 4 horizontally creates a vertical-striped that clears its column.
          // We'll do: horizontal run -> striped-v (clears column), vertical run -> striped-h (clears row).
          const kind = run.dir === 'h' ? 'striped-v' : 'striped-h';
          createAt.push({r:pr, c:pc, color:run.color, kind});
        }
      }
      const createKeys = new Set(createAt.map(x => x.r*SIZE+x.c));
      // remove createAt positions from cleared set so they survive (replaced with special)
      const cleared = new Set(m.positions);
      for (const k of createKeys) cleared.delete(k);

      // Trigger special candies that are caught in cleared cells (chain-detonation)
      const detonated = expandSpecials(cleared);
      // award score
      let baseScore = 0;
      for (const run of m.runs){
        baseScore += scoreForRun(run.len);
      }
      baseScore += (detonated - m.positions.size) * 30; // bonus for chained specials
      addScore(Math.round(baseScore * mult));

      if (cascade >= 2){
        showCombo(`x${cascade} Cascade!`);
      }

      // visual: pop animations + line flashes
      for (const run of m.runs){
        if (run.len >= 4){
          flashRun(run);
        }
      }
      await clearAndCollapse(cleared, createAt);
    }
    // After resolution, if no moves available, reshuffle.
    if (!findAnyMove(board)){
      await reshuffle();
    }
  }

  function expandSpecials(clearedSet){
    let added;
    do {
      added = 0;
      const snap = Array.from(clearedSet);
      for (const k of snap){
        const r = Math.floor(k/SIZE), c = k%SIZE;
        const cell = board[r][c];
        if (!cell) continue;
        if (cell.kind === 'striped-h'){
          for (let cc=0; cc<SIZE; cc++){
            const id = r*SIZE+cc;
            if (!clearedSet.has(id)){ clearedSet.add(id); added++; }
          }
          flashLine(r, null);
        } else if (cell.kind === 'striped-v'){
          for (let rr=0; rr<SIZE; rr++){
            const id = rr*SIZE+c;
            if (!clearedSet.has(id)){ clearedSet.add(id); added++; }
          }
          flashLine(null, c);
        } else if (cell.kind === 'bomb'){
          // detonating bomb in a match clears its color
          const tgtColor = cell.color;
          for (let rr=0;rr<SIZE;rr++) for (let cc=0;cc<SIZE;cc++){
            const cc2 = board[rr][cc];
            if (cc2 && cc2.color === tgtColor){
              const id = rr*SIZE+cc;
              if (!clearedSet.has(id)){ clearedSet.add(id); added++; }
            }
          }
          flash('all');
        }
      }
    } while (added > 0);
    return clearedSet.size;
  }

  function scoreForRun(len){
    // 3 -> 60, 4 -> 120, 5+ -> 200 + 50*(len-5)
    if (len === 3) return 60;
    if (len === 4) return 120;
    return 200 + 50*(len-5);
  }

  // Animate clears, then drop existing cells, then spawn new ones from top
  async function clearAndCollapse(clearedSet, createAt = []){
    // 1. play pop animations + score popups
    for (const k of clearedSet){
      const r = Math.floor(k/SIZE), c = k%SIZE;
      const el = cellEls[r][c];
      if (el){
        const svg = el.querySelector('svg');
        if (svg) svg.classList.add('popping');
        spawnPopFx(el);
      }
    }
    spawnSomeScorePopups(clearedSet);
    await sleep(260);

    // 2. remove cleared cells
    for (const k of clearedSet){
      const r = Math.floor(k/SIZE), c = k%SIZE;
      const el = cellEls[r][c];
      if (el) el.remove();
      cellEls[r][c] = null;
      board[r][c] = null;
    }

    // 3. place specials at createAt positions (if those positions are still null)
    for (const sp of createAt){
      if (board[sp.r][sp.c]) continue; // shouldn't happen
      const cell = makeCell(sp.color, sp.kind);
      board[sp.r][sp.c] = cell;
      const el = createCellEl(cell, sp.r, sp.c);
      el.querySelector('svg')?.classList.add('spawn');
      boardEl.appendChild(el);
      cellEls[sp.r][sp.c] = el;
    }

    // 4. gravity: for each column, compact downward
    for (let c=0;c<SIZE;c++){
      let writeRow = SIZE - 1;
      for (let r=SIZE-1;r>=0;r--){
        if (board[r][c]){
          if (r !== writeRow){
            board[writeRow][c] = board[r][c];
            board[r][c] = null;
            const el = cellEls[r][c];
            cellEls[writeRow][c] = el;
            cellEls[r][c] = null;
            if (el){
              el.classList.add('dropping');
              el.style.top = (writeRow*cellPx)+'px';
              setTimeout(()=> el.classList.remove('dropping'), 460);
            }
          }
          writeRow--;
        }
      }
      // 5. spawn new candies above and drop them in
      let spawnY = -1;
      for (let r=writeRow; r>=0; r--){
        const color = pickSpawnColor();
        const cell = makeCell(color);
        board[r][c] = cell;
        const el = createCellEl(cell, r, c);
        // start above board, then drop to row r
        el.style.top = (spawnY*cellPx)+'px';
        spawnY--;
        boardEl.appendChild(el);
        cellEls[r][c] = el;
        // force reflow then animate
        // eslint-disable-next-line no-unused-expressions
        el.offsetHeight;
        el.classList.add('dropping');
        el.style.top = (r*cellPx)+'px';
        el.querySelector('svg')?.classList.add('spawn');
        setTimeout(()=> el.classList.remove('dropping'), 480);
      }
    }
    await sleep(440);
  }

  function pickSpawnColor(){
    return Math.floor(Math.random()*COLORS);
  }

  // ---------- Visual FX ----------
  function spawnPopFx(parentEl){
    const fx = document.createElement('div');
    fx.className = 'pop-fx';
    parentEl.appendChild(fx);
    setTimeout(()=>fx.remove(), 500);
  }

  function spawnSomeScorePopups(clearedSet){
    // group clears into runs/clusters and pop a score on the centroid
    if (clearedSet.size === 0) return;
    let sumR=0, sumC=0;
    for (const k of clearedSet){ sumR += Math.floor(k/SIZE); sumC += k%SIZE; }
    const cr = sumR/clearedSet.size, cc = sumC/clearedSet.size;
    const popup = document.createElement('div');
    popup.className = 'score-popup';
    popup.textContent = '+'+clearedSet.size*60;
    popup.style.left = ((cc+0.5)*cellPx)+'px';
    popup.style.top  = ((cr)*cellPx)+'px';
    boardEl.appendChild(popup);
    setTimeout(()=>popup.remove(), 950);
  }

  function flashLine(row, col){
    const el = document.createElement('div');
    el.className = 'line-flash' + (row===null?' vert':'');
    if (row!==null){
      el.style.left = '0px';
      el.style.top  = (row*cellPx)+'px';
      el.style.width = (SIZE*cellPx)+'px';
      el.style.height = cellPx+'px';
    } else {
      el.style.top = '0px';
      el.style.left = (col*cellPx)+'px';
      el.style.height = (SIZE*cellPx)+'px';
      el.style.width = cellPx+'px';
    }
    boardEl.appendChild(el);
    setTimeout(()=>el.remove(), 520);
  }
  function flashRun(run){
    if (run.dir === 'h'){ flashLine(run.cells[0][0], null); }
    else { flashLine(null, run.cells[0][1]); }
  }
  function flash(kind){
    // global board flash
    const el = document.createElement('div');
    el.className = 'line-flash';
    el.style.left='0';el.style.top='0';
    el.style.width=(SIZE*cellPx)+'px';el.style.height=(SIZE*cellPx)+'px';
    el.style.background='radial-gradient(circle, rgba(255,255,255,.85), rgba(255,180,255,.0) 70%)';
    el.style.animationDuration='.6s';
    boardEl.appendChild(el);
    setTimeout(()=>el.remove(), 620);
  }
  function shake(){
    boardEl.classList.add('shake');
    setTimeout(()=>boardEl.classList.remove('shake'), 360);
  }
  function showCombo(text){
    const tag = document.createElement('div');
    tag.className = 'combo-tag';
    tag.textContent = text;
    boardEl.appendChild(tag);
    setTimeout(()=>tag.remove(), 950);
  }

  // ---------- Score / moves / level state ----------
  function addScore(n){
    if (!n) return;
    score += n;
    scoreVal.textContent = score.toLocaleString();
    const target = LEVELS[level].target;
    const pct = Math.min(100, (score/target)*100);
    progFill.style.width = pct+'%';
    updateStars();
  }
  function updateStars(){
    const target = LEVELS[level].target;
    const stars = starsRow.querySelectorAll('.star');
    const ratio = score / target;
    stars.forEach((s,i)=>{
      s.classList.toggle('on', ratio >= STAR_PCTS[i]);
    });
  }
  function consumeMove(){
    movesLeft--;
    movesVal.textContent = movesLeft;
    if (score >= LEVELS[level].target){
      // award completion immediately on threshold reached if moves left, but allow remaining moves to add score? Candy Crush style: end on success at moves end.
      // We'll allow more moves only if user still wants — but conventionally game ends when moves run out OR when target reached.
      // We'll end now on hit-target for satisfying flow.
      setTimeout(()=>endLevel(true), 300);
      return;
    }
    if (movesLeft <= 0){
      setTimeout(()=>endLevel(score >= LEVELS[level].target), 300);
    }
    scheduleHint();
  }

  // ---------- Hint system ----------
  function scheduleHint(){
    cancelHint();
    hintTimer = setTimeout(()=>{
      const m = findAnyMove(board);
      if (!m) return;
      hintCells = m;
      m.forEach(([r,c])=> cellEls[r][c]?.classList.add('hint'));
    }, 6000);
  }
  function cancelHint(){
    clearTimeout(hintTimer); hintTimer = null;
    hintCells.forEach(([r,c])=> cellEls[r]?.[c]?.classList.remove('hint'));
    hintCells = [];
  }
  document.getElementById('hintBtn').addEventListener('click', ()=>{
    if (busy) return;
    cancelHint();
    const m = findAnyMove(board);
    if (m){
      hintCells = m;
      m.forEach(([r,c])=> cellEls[r][c]?.classList.add('hint'));
      setTimeout(cancelHint, 2400);
    }
  });
  document.getElementById('restartBtn').addEventListener('click', ()=>{
    if (busy) return;
    if (confirm('Restart this level?')) startLevel(level);
  });

  // ---------- Reshuffle when no moves ----------
  async function reshuffle(){
    showCombo('Reshuffling…');
    await sleep(250);
    // pop everything visually
    for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++){
      const el = cellEls[r][c]; if (el) el.querySelector('svg')?.classList.add('popping');
    }
    await sleep(200);
    for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++){
      cellEls[r][c]?.remove(); cellEls[r][c] = null;
    }
    board = freshGrid();
    renderInitial();
  }

  // ---------- Level flow / overlay ----------
  function startLevel(idx){
    level = idx;
    score = 0;
    movesLeft = LEVELS[idx].moves;
    scoreVal.textContent = '0';
    movesVal.textContent = movesLeft;
    targetVal.textContent = LEVELS[idx].target.toLocaleString();
    levelPill.textContent = `Level ${idx+1}`;
    progFill.style.width = '0%';
    starsRow.querySelectorAll('.star').forEach(s=>s.classList.remove('on'));
    board = freshGrid();
    busy = true;
    renderInitial();
    overlay.style.display = 'none';
    setTimeout(()=>{ busy = false; scheduleHint(); }, 350);
  }

  function endLevel(passed){
    busy = true;
    cancelHint();
    const target = LEVELS[level].target;
    const reached = score;
    let starsCount = 0;
    if (passed){
      starsCount = 1;
      if (reached >= target * STAR_PCTS[1]) starsCount = 2;
      if (reached >= target * STAR_PCTS[2]) starsCount = 3;
    }
    panel.classList.toggle('fail', !passed);
    if (passed){
      // HUB-21 — bank the per-level score into cumulative so the leaderboard
      // sees the whole run, not just whatever was on screen when the player
      // ran out of moves on a later level.
      cumulativeScore += reached;
      const lbEl = document.getElementById('leaderboardScore');
      if (lbEl) lbEl.textContent = String(cumulativeScore);
      const last = level === LEVELS.length - 1;
      ovTitle.textContent = last ? 'Sweet Mastery!' : 'Level Complete!';
      ovBody.textContent = last
        ? `You cleared every level. Total score: ${cumulativeScore.toLocaleString()}. Start a fresh run?`
        : `Tasty work. Total so far: ${cumulativeScore.toLocaleString()}. Ready for the next level?`;
      ovBtn.textContent = last ? 'New Game+' : 'Next Level';
      ovBtn.onclick = () => {
        if (last) { cumulativeScore = 0; if (lbEl) lbEl.textContent = '0'; startLevel(0); }
        else { startLevel(level + 1); }
      };
      ovStars.style.display = '';
      ovStats.style.display = '';
      const stars = ovStars.querySelectorAll('.star');
      stars.forEach((s,i)=> s.classList.toggle('on', i<starsCount));
    } else {
      // Out of moves = end-of-run for leaderboard purposes. Expose the
      // cumulative total so the bridge captures it on game-over signal.
      const lbEl = document.getElementById('leaderboardScore');
      if (lbEl) lbEl.textContent = String(cumulativeScore + reached);
      ovTitle.textContent = 'Out of Moves';
      ovBody.textContent = `Reached ${reached.toLocaleString()} of ${target.toLocaleString()} on this level. Total run: ${(cumulativeScore + reached).toLocaleString()}. Try again?`;
      ovBtn.textContent = 'Retry Level';
      ovBtn.onclick = () => startLevel(level);
      ovStars.style.display = 'none';
      ovStats.style.display = '';
    }
    ovScore.textContent = reached.toLocaleString();
    ovTarget.textContent = target.toLocaleString();
    ovMoves.textContent = Math.max(0, movesLeft);
    overlay.style.display = '';
  }

  // intro screen
  function showIntro(){
    fillIntroCandies();
    panel.classList.remove('fail');
    ovTitle.textContent = 'Sweet Cascade';
    ovBody.innerHTML = 'Swipe a candy to swap with a neighbor — only swaps that make a match of 3+ are legal.<br><br>Match 4 → striped (clears row/col). Match 5 → color bomb (clears all of one color). Reach the target before moves run out!';
    ovBtn.textContent = 'Play';
    ovStars.style.display = 'none';
    ovStats.style.display = 'none';
    ovBtn.onclick = () => { cumulativeScore = 0; var lb = document.getElementById('leaderboardScore'); if (lb) lb.textContent = '0'; startLevel(0); };
    overlay.style.display = '';
  }

  // ---------- Resize handling ----------
  let resizeRAF = 0;
  function onResize(){
    cancelAnimationFrame(resizeRAF);
    resizeRAF = requestAnimationFrame(()=>{
      computeCellPx();
      repositionAll();
    });
  }
  window.addEventListener('resize', onResize);
  window.addEventListener('orientationchange', onResize);

  // ---------- Utilities ----------
  function sleep(ms){ return new Promise(res=>setTimeout(res,ms)); }

  // ---------- Boot ----------
  // Wait for layout to settle so cellPx is correct
  requestAnimationFrame(()=>{
    computeCellPx();
    showIntro();
  });
})();
</script>
</body>
</html>
