<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1e293b">
  <title>Memory Match — Find the Pairs</title>
  <script type="application/json" id="mchatai-web-components-used">
{"recipe":"recipe.memory-match","components":["entities.memory-match-board","ui.mini-header","ui.scoreboard","core.game-manager","resources.swatches","effects.score-rise","effects.pop-burst"],"mode":"source-copy"}
  </script>
  <style>
    :root {
      --bg-1: #1e293b;
      --bg-2: #0f172a;
      --card-back: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
      --card-front: #fafafa;
      --card-matched: #10b981;
      --card-shadow: 0 4px 12px rgba(0,0,0,0.35);
      --text: #f1f5f9;
      --accent: #fbbf24;
      --good: #4ade80;
      --bad: #f87171;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      padding: env(safe-area-inset-top, 0) 16px env(safe-area-inset-bottom, 0);
    }
    header {
      width: 100%;
      max-width: 480px;
      padding: 16px 4px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.05em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .stats {
      display: flex;
      gap: 14px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .stat strong {
      color: var(--good);
      margin-left: 6px;
    }
    .difficulty {
      display: flex;
      gap: 6px;
    }
    .diff-btn {
      min-height: 36px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .diff-btn.active {
      background: var(--accent);
      color: var(--bg-2);
      border-color: var(--accent);
    }
    main {
      width: 100%;
      max-width: 480px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 16px;
      min-height: 0;
    }
    #board {
      width: min(95vw, 460px);
      display: grid;
      gap: 8px;
      perspective: 800px;
      touch-action: none;
    }
    #board.r4c4 { grid-template-columns: repeat(4, 1fr); aspect-ratio: 1 / 1; }
    #board.r4c6 { grid-template-columns: repeat(4, 1fr); aspect-ratio: 4 / 6; }
    #board.r6c6 { grid-template-columns: repeat(6, 1fr); aspect-ratio: 1 / 1; }
    .card {
      aspect-ratio: 1 / 1;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 320ms cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      will-change: transform;
      touch-action: none;
    }
    .card.up, .card.matched { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: var(--card-shadow);
      font-size: clamp(28px, 8vw, 48px);
    }
    .card-back {
      background: var(--card-back);
      background-size: 100% 100%;
    }
    .card-back::after {
      content: "?";
      color: rgba(255,255,255,0.85);
      font-size: clamp(28px, 7vw, 36px);
      font-weight: 800;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .card-front {
      background: var(--card-front);
      transform: rotateY(180deg);
      color: #1f2937;
    }
    .card.matched .card-front {
      background: var(--card-matched);
      animation: matched-pulse 360ms ease-out;
    }
    @keyframes matched-pulse {
      0% { transform: rotateY(180deg) scale(1); }
      40% { transform: rotateY(180deg) scale(1.12); }
      100% { transform: rotateY(180deg) scale(1); }
    }
    /* Toast */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 200ms, transform 200ms;
      z-index: 50;
    }
    #toast.show { opacity: 1; transform: translate(-50%, 4px); }
    #toast.good { background: var(--good); color: #052e1c; }
    /* Game-over overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.94);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      z-index: 100;
      padding: 32px;
    }
    #overlay.show { display: flex; }
    #overlay h2 { margin: 0; font-size: 28px; color: var(--accent); }
    #overlay .stats-block { font-size: 16px; line-height: 1.7; text-align: center; opacity: 0.95; }
    #overlay button {
      min-height: 48px;
      min-width: 200px;
      padding: 14px 28px;
      background: var(--accent);
      color: var(--bg-2);
      border: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--card-shadow);
    }
  </style>
</head>
<body>
  <header>
    <h1>Memory Match</h1>
    <div class="stats">
      <span class="stat">Pairs<strong id="pairs-stat">0/8</strong></span>
      <span class="stat">Moves<strong id="moves-stat">0</strong></span>
      <span class="stat">Time<strong id="time-stat">0s</strong></span>
    </div>
    <div class="difficulty">
      <button class="diff-btn active" data-rows="4" data-cols="4">Easy 4×4</button>
      <button class="diff-btn" data-rows="4" data-cols="6">Med 4×6</button>
      <button class="diff-btn" data-rows="6" data-cols="6">Hard 6×6</button>
    </div>
  </header>

  <main>
    <div id="board" class="r4c4" aria-label="Memory match cards"></div>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>

  <div id="overlay" role="dialog" aria-modal="true">
    <h2 id="overlay-title">You Win!</h2>
    <div class="stats-block" id="overlay-stats"></div>
    <button id="overlay-restart">Play Again</button>
  </div>

  <script type="module">
    /* BEGIN inline copy: GridBoard.js */
    class GridBoard {
      constructor(options = {}) {
        this.rows = options.rows ?? 8;
        this.cols = options.cols ?? 8;
        this.cells = Array.from({length: this.rows}, () =>
          Array.from({length: this.cols}, () => {
            const f = options.fill;
            if (typeof f === "function") return f();
            return f ?? null;
          })
        );
      }
      inBounds(r, c) { return r >= 0 && r < this.rows && c >= 0 && c < this.cols; }
      get(r, c) { return this.inBounds(r, c) ? this.cells[r][c] : undefined; }
      set(r, c, v) { if (this.inBounds(r, c)) { this.cells[r][c] = v; return true; } return false; }
    }
    /* END inline copy: GridBoard.js */

    /* BEGIN inline copy: MemoryMatchBoard.js */
    class MemoryMatchBoard extends GridBoard {
      constructor(options = {}) {
        super({...options, rows: options.rows ?? 4, cols: options.cols ?? 4, fill: () => ({value: null, state: "down"})});
        if ((this.rows * this.cols) % 2 !== 0) throw new Error(`MemoryMatchBoard requires even cell count`);
        this.faceUpCells = []; this.matchedCount = 0; this.moves = 0; this.misses = 0;
      }
      setCards(values) {
        if (values.length !== this.rows * this.cols) throw new Error(`expected ${this.rows*this.cols}, got ${values.length}`);
        let i = 0;
        for (let r=0;r<this.rows;r++) for (let c=0;c<this.cols;c++) {
          this.set(r, c, {value: values[i], state: "down"});
          i++;
        }
        this.faceUpCells = []; this.matchedCount = 0; this.moves = 0; this.misses = 0;
      }
      static buildShuffledDeck(symbols, totalCells) {
        if (totalCells % 2 !== 0) throw new Error(`even cells required`);
        const pairs = totalCells / 2;
        if (symbols.length < pairs) throw new Error(`need ${pairs} symbols`);
        const picked = symbols.slice(0, pairs);
        return MemoryMatchBoard.shuffle([...picked, ...picked]);
      }
      static shuffle(arr) {
        const a = arr.slice();
        for (let i=a.length-1;i>0;i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
        return a;
      }
      flipCard(row, col) {
        if (!this.inBounds(row, col)) return {state: "ignored", reason: "oob"};
        const cell = this.get(row, col);
        if (!cell || cell.state !== "down") return {state: "ignored", reason: "already-flipped"};
        if (this.faceUpCells.length >= 2) return {state: "ignored", reason: "mismatch-pending"};
        cell.state = "up";
        this.faceUpCells.push({row, col});
        if (this.faceUpCells.length === 1) return {state: "first", card: {row, col, value: cell.value}};
        this.moves++;
        const [a, b] = this.faceUpCells;
        const cellA = this.get(a.row, a.col);
        const cellB = this.get(b.row, b.col);
        if (cellA.value === cellB.value) {
          cellA.state = "matched"; cellB.state = "matched";
          this.faceUpCells = [];
          this.matchedCount += 2;
          return {state: "match", card: {row, col, value: cellB.value}, matchedPair: [a, b]};
        }
        this.misses++;
        return {state: "mismatch", card: {row, col, value: cellB.value}, mismatchPair: [{...a, value: cellA.value}, {...b, value: cellB.value}]};
      }
      resolveMismatch() {
        if (this.faceUpCells.length !== 2) return false;
        for (const {row, col} of this.faceUpCells) {
          const cell = this.get(row, col);
          if (cell && cell.state === "up") cell.state = "down";
        }
        this.faceUpCells = [];
        return true;
      }
      isComplete() { return this.matchedCount === this.rows * this.cols; }
      accuracy() { return this.moves === 0 ? 1 : (this.matchedCount/2)/this.moves; }
    }
    const MEMORY_DEFAULT_SYMBOLS = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🦄","🐔","🐧","🐦","🦆","🐝","🐛","🦋","🐌","🐞","🐢","🐍","🦎","🦖","🐙","🦀","🐠","🐬","🐳","🦈","🦓"];
    /* END inline copy: MemoryMatchBoard.js */

    // DOM
    const boardEl = document.getElementById("board");
    const pairsStatEl = document.getElementById("pairs-stat");
    const movesStatEl = document.getElementById("moves-stat");
    const timeStatEl = document.getElementById("time-stat");
    const toastEl = document.getElementById("toast");
    const overlayEl = document.getElementById("overlay");
    const overlayStatsEl = document.getElementById("overlay-stats");
    const overlayRestart = document.getElementById("overlay-restart");
    const diffBtns = document.querySelectorAll(".diff-btn");

    let board;
    let cardElements = []; // [r][c] DOM elements
    let pickLock = false; // true while the mismatch flip-back is pending
    let startTime = 0;
    let timerHandle = null;

    function buildBoard(rows, cols) {
      board = new MemoryMatchBoard({rows, cols});
      const deck = MemoryMatchBoard.buildShuffledDeck(MEMORY_DEFAULT_SYMBOLS, rows * cols);
      board.setCards(deck);
      // Reset DOM
      boardEl.className = `r${rows}c${cols}`;
      boardEl.innerHTML = "";
      cardElements = [];
      for (let r = 0; r < rows; r++) {
        cardElements[r] = [];
        for (let c = 0; c < cols; c++) {
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.row = r;
          card.dataset.col = c;
          const back = document.createElement("div");
          back.className = "card-face card-back";
          const front = document.createElement("div");
          front.className = "card-face card-front";
          front.textContent = board.get(r, c).value;
          card.appendChild(back);
          card.appendChild(front);
          boardEl.appendChild(card);
          cardElements[r][c] = card;
        }
      }
      pairsStatEl.textContent = `0/${(rows*cols)/2}`;
      movesStatEl.textContent = "0";
      pickLock = false;
      startTime = Date.now();
      if (timerHandle) clearInterval(timerHandle);
      timerHandle = setInterval(updateTimer, 500);
      overlayEl.classList.remove("show");
    }

    function updateTimer() {
      const s = Math.floor((Date.now() - startTime) / 1000);
      timeStatEl.textContent = `${s}s`;
    }

    function showToast(msg, kind) {
      toastEl.textContent = msg;
      toastEl.className = "show " + (kind || "");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.className = "", 1100);
    }

    function applyState(r, c) {
      const cell = board.get(r, c);
      const el = cardElements[r][c];
      el.classList.remove("up", "matched");
      if (cell.state === "up") el.classList.add("up");
      else if (cell.state === "matched") el.classList.add("matched");
    }

    function applyAll() {
      for (let r = 0; r < board.rows; r++)
        for (let c = 0; c < board.cols; c++)
          applyState(r, c);
    }

    function checkWin() {
      if (!board.isComplete()) return;
      clearInterval(timerHandle);
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const accuracy = Math.round(board.accuracy() * 100);
      const key = `memory-best-${board.rows}x${board.cols}`;
      const best = JSON.parse(localStorage.getItem(key) || '{"moves": 9999, "time": 9999}');
      const newRecord = (board.moves < best.moves) || (board.moves === best.moves && elapsed < best.time);
      if (newRecord) {
        localStorage.setItem(key, JSON.stringify({moves: board.moves, time: elapsed}));
      }
      const best2 = JSON.parse(localStorage.getItem(key));
      overlayStatsEl.innerHTML = `Pairs: <strong>${(board.rows*board.cols)/2}</strong><br>Moves: <strong>${board.moves}</strong> (accuracy ${accuracy}%)<br>Time: <strong>${elapsed}s</strong><br>${newRecord ? "🏆 New Best!" : `Best: ${best2.moves} moves / ${best2.time}s`}`;
      overlayEl.classList.add("show");
    }

    boardEl.addEventListener("pointerup", (ev) => {
      if (pickLock) return;
      const target = ev.target.closest(".card");
      if (!target) return;
      const r = parseInt(target.dataset.row, 10);
      const c = parseInt(target.dataset.col, 10);
      const result = board.flipCard(r, c);
      if (result.state === "ignored") return;
      applyState(r, c);
      pairsStatEl.textContent = `${board.matchedCount/2}/${(board.rows*board.cols)/2}`;
      movesStatEl.textContent = board.moves;
      if (result.state === "match") {
        showToast("Match!", "good");
        for (const {row, col} of result.matchedPair) applyState(row, col);
        checkWin();
      } else if (result.state === "mismatch") {
        pickLock = true;
        setTimeout(() => {
          board.resolveMismatch();
          for (const {row, col} of result.mismatchPair) applyState(row, col);
          pickLock = false;
        }, 900);
      }
    }, {passive: false});

    diffBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        diffBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        buildBoard(parseInt(btn.dataset.rows, 10), parseInt(btn.dataset.cols, 10));
      });
    });
    overlayRestart.addEventListener("click", () => {
      const active = document.querySelector(".diff-btn.active");
      buildBoard(parseInt(active.dataset.rows, 10), parseInt(active.dataset.cols, 10));
    });

    console.log(`[Smoke] MemoryMatchBoard ready. Default symbols: ${MEMORY_DEFAULT_SYMBOLS.length}`);
    buildBoard(4, 4);
    console.log(`[Smoke] Initial 4×4 board: ${board.rows}×${board.cols}, ${board.matchedCount/2}/${(board.rows*board.cols)/2} pairs`);
  </script>
</body>
</html>
