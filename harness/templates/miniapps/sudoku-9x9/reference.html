  <script type="application/json" id="mchatai-web-components-used">
{"recipe":"recipe.sudoku","components":["entities.sudoku-board","ui.mini-header","ui.scoreboard","ui.keyboard-input","core.game-manager","resources.swatches","effects.score-rise"],"mode":"source-copy"}
  </script>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --grid-line-thin: #d4d4d8;
      --grid-line-thick: #18181b;
      --cell-locked-bg: #f4f4f5;
      --cell-selected: #dbeafe;
      --cell-related: #eff6ff;
      --cell-same-value: #fde68a;
      --cell-conflict: #fecaca;
      --text: #18181b;
      --text-locked: #18181b;
      --text-user: #2563eb;
      --text-conflict: #dc2626;
      --note-color: #71717a;
      --accent: #2563eb;
      --good: #16a34a;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181b;
        --surface: #27272a;
        --grid-line-thin: #3f3f46;
        --grid-line-thick: #fafafa;
        --cell-locked-bg: #27272a;
        --cell-selected: #1e3a8a;
        --cell-related: #1e293b;
        --cell-same-value: #78350f;
        --cell-conflict: #7f1d1d;
        --text: #fafafa;
        --text-locked: #fafafa;
        --text-user: #93c5fd;
        --text-conflict: #fca5a5;
        --note-color: #a1a1aa;
        --shadow: 0 2px 8px rgba(0,0,0,0.5);
      }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      padding: env(safe-area-inset-top, 0) 12px env(safe-area-inset-bottom, 0);
    }
    header {
      width: 100%;
      max-width: 480px;
      padding: 14px 4px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .stats {
      display: flex;
      gap: 14px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      opacity: 0.85;
    }
    .stats strong { color: var(--good); margin-left: 6px; }
    .difficulty {
      display: flex;
      gap: 6px;
    }
    .diff-btn {
      min-height: 36px;
      padding: 6px 12px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--grid-line-thin);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .diff-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    main {
      width: 100%;
      max-width: 480px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 16px;
      min-height: 0;
    }
    #board {
      width: min(95vw, 460px);
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      background: var(--grid-line-thick);
      gap: 1px;
      padding: 2px;
      box-shadow: var(--shadow);
      touch-action: none;
    }
    .cell {
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: clamp(18px, 4.5vw, 26px);
      cursor: pointer;
      position: relative;
      color: var(--text-user);
    }
    .cell.locked {
      background: var(--cell-locked-bg);
      color: var(--text-locked);
      font-weight: 800;
      cursor: default;
    }
    .cell.related { background: var(--cell-related); }
    .cell.same-value { background: var(--cell-same-value); }
    .cell.selected { background: var(--cell-selected); outline: 2px solid var(--accent); outline-offset: -2px; }
    .cell.conflict { background: var(--cell-conflict); color: var(--text-conflict); }
    /* Heavier 3×3 subgrid borders via right/bottom gap-bg */
    .cell.right-thick { box-shadow: 2px 0 0 0 var(--grid-line-thick); }
    .cell.bottom-thick { box-shadow: 0 2px 0 0 var(--grid-line-thick); }
    .cell.right-thick.bottom-thick { box-shadow: 2px 0 0 0 var(--grid-line-thick), 0 2px 0 0 var(--grid-line-thick); }
    .notes {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      pointer-events: none;
      padding: 2px;
    }
    .note {
      font-size: 9px;
      color: var(--note-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }
    /* Number pad */
    #numpad {
      width: min(95vw, 460px);
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(9, 1fr) auto;
      gap: 6px;
    }
    .numkey {
      min-height: 48px;
      padding: 8px 0;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--grid-line-thin);
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: var(--shadow);
    }
    .numkey:active { background: var(--cell-selected); }
    .numkey.note-mode-on {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .numkey.erase {
      grid-column: span 1;
      font-size: 14px;
    }
    .modetoggle {
      grid-column: 1 / -1;
      margin-top: 4px;
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    /* Game-over overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      z-index: 100;
      padding: 32px;
    }
    #overlay.show { display: flex; }
    #overlay h2 { margin: 0; font-size: 28px; color: white; }
    #overlay .stats-block { font-size: 16px; line-height: 1.7; text-align: center; color: white; }
    #overlay button {
      min-height: 48px;
      min-width: 200px;
      padding: 14px 28px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>
  <header>
    <h1>Sudoku</h1>
    <div class="stats">
      <span>Filled<strong id="filled-stat">0/81</strong></span>
      <span>Time<strong id="time-stat">0:00</strong></span>
      <span>Errors<strong id="error-stat">0</strong></span>
    </div>
    <div class="difficulty">
      <button class="diff-btn active" data-diff="easy">Easy</button>
      <button class="diff-btn" data-diff="medium">Medium</button>
      <button class="diff-btn" data-diff="hard">Hard</button>
      <button class="diff-btn" data-diff="expert">Expert</button>
    </div>
  </header>

  <main>
    <div id="board" aria-label="Sudoku board"></div>
    <div id="numpad">
      <button class="numkey" data-v="1">1</button>
      <button class="numkey" data-v="2">2</button>
      <button class="numkey" data-v="3">3</button>
      <button class="numkey" data-v="4">4</button>
      <button class="numkey" data-v="5">5</button>
      <button class="numkey" data-v="6">6</button>
      <button class="numkey" data-v="7">7</button>
      <button class="numkey" data-v="8">8</button>
      <button class="numkey" data-v="9">9</button>
      <button class="numkey erase" data-v="0">⌫</button>
      <div class="modetoggle">
        <button class="numkey" id="note-toggle" style="grid-column: span 3;">Notes: OFF</button>
      </div>
    </div>
  </main>

  <div id="overlay" role="dialog" aria-modal="true">
    <h2>You solved it!</h2>
    <div class="stats-block" id="overlay-stats"></div>
    <button id="overlay-restart">New Puzzle</button>
  </div>

  <script type="module">
    /* BEGIN inline copy: GridBoard.js */
    class GridBoard {
      constructor(options = {}) {
        this.rows = options.rows ?? 8;
        this.cols = options.cols ?? 8;
        this.cells = Array.from({length: this.rows}, () =>
          Array.from({length: this.cols}, () => {
            const f = options.fill;
            if (typeof f === "function") return f();
            return f ?? null;
          })
        );
      }
      inBounds(r, c) { return r >= 0 && r < this.rows && c >= 0 && c < this.cols; }
      get(r, c) { return this.inBounds(r, c) ? this.cells[r][c] : undefined; }
      set(r, c, v) { if (this.inBounds(r, c)) { this.cells[r][c] = v; return true; } return false; }
    }
    /* END inline copy: GridBoard.js */

    /* BEGIN inline copy: SudokuBoard.js */
    class SudokuBoard extends GridBoard {
      constructor(options = {}) {
        super({...options, rows: 9, cols: 9, fill: () => ({value: 0, locked: false, notes: new Set()})});
      }
      reset() { for (let r=0;r<9;r++) for (let c=0;c<9;c++) this.set(r,c,{value:0,locked:false,notes:new Set()}); }
      loadPuzzle(input) {
        this.reset();
        if (typeof input === "string") {
          const flat = input.replace(/[^0-9.]/g, "").replace(/\./g, "0");
          if (flat.length !== 81) throw new Error(`81 digits required`);
          for (let i=0;i<81;i++) {
            const r = Math.floor(i/9), c = i%9, v = parseInt(flat[i],10);
            this.set(r,c,{value:v, locked:v!==0, notes:new Set()});
          }
        }
      }
      valueAt(r,c) { return this.get(r,c)?.value ?? 0; }
      setCell(r,c,v) {
        const cell = this.get(r,c);
        if (!cell || cell.locked) return false;
        if (v < 0 || v > 9) return false;
        cell.value = v;
        if (v !== 0) cell.notes.clear();
        return true;
      }
      toggleNote(r,c,v) {
        const cell = this.get(r,c);
        if (!cell || cell.locked) return false;
        if (v < 1 || v > 9) return false;
        if (cell.notes.has(v)) cell.notes.delete(v); else cell.notes.add(v);
        return true;
      }
      validateCell(r,c) {
        const conflicts = new Set();
        const v = this.valueAt(r,c);
        if (v === 0) return conflicts;
        for (let cc=0;cc<9;cc++) if (cc!==c && this.valueAt(r,cc)===v) conflicts.add(`${r},${cc}`);
        for (let rr=0;rr<9;rr++) if (rr!==r && this.valueAt(rr,c)===v) conflicts.add(`${rr},${c}`);
        const r0 = Math.floor(r/3)*3, c0 = Math.floor(c/3)*3;
        for (let rr=r0;rr<r0+3;rr++) for (let cc=c0;cc<c0+3;cc++) {
          if ((rr!==r||cc!==c) && this.valueAt(rr,cc)===v) conflicts.add(`${rr},${cc}`);
        }
        return conflicts;
      }
      allConflicts() {
        const all = new Set();
        for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
          const conflicts = this.validateCell(r,c);
          if (conflicts.size > 0) { all.add(`${r},${c}`); for (const k of conflicts) all.add(k); }
        }
        return all;
      }
      candidates(r,c) {
        const used = new Set();
        for (let cc=0;cc<9;cc++) used.add(this.valueAt(r,cc));
        for (let rr=0;rr<9;rr++) used.add(this.valueAt(rr,c));
        const r0 = Math.floor(r/3)*3, c0 = Math.floor(c/3)*3;
        for (let rr=r0;rr<r0+3;rr++) for (let cc=c0;cc<c0+3;cc++) used.add(this.valueAt(rr,cc));
        const out = [];
        for (let v=1;v<=9;v++) if (!used.has(v)) out.push(v);
        return out;
      }
      isFilled() { for (let r=0;r<9;r++) for (let c=0;c<9;c++) if (this.valueAt(r,c)===0) return false; return true; }
      isComplete() { return this.isFilled() && this.allConflicts().size === 0; }
      static generatePuzzle(difficulty = "medium") {
        const counts = {easy: 40, medium: 32, hard: 26, expert: 22};
        const target = counts[difficulty] ?? counts.medium;
        const board = new SudokuBoard();
        board._fillSolution();
        const positions = [];
        for (let r=0;r<9;r++) for (let c=0;c<9;c++) positions.push({r,c});
        SudokuBoard._shuffle(positions);
        let clueCount = 81;
        for (const {r,c} of positions) {
          if (clueCount <= target) break;
          board.setCell(r,c,0);
          clueCount--;
        }
        for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
          const cell = board.get(r,c);
          if (cell.value !== 0) cell.locked = true;
        }
        return board;
      }
      _fillSolution() { return this._fillFrom(0); }
      _fillFrom(idx) {
        if (idx >= 81) return true;
        const r = Math.floor(idx/9), c = idx%9;
        if (this.valueAt(r,c) !== 0) return this._fillFrom(idx+1);
        const cands = this.candidates(r,c);
        SudokuBoard._shuffle(cands);
        for (const v of cands) {
          this.setCell(r,c,v);
          if (this._fillFrom(idx+1)) return true;
        }
        this.setCell(r,c,0);
        return false;
      }
      static _shuffle(arr) {
        for (let i=arr.length-1;i>0;i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
        return arr;
      }
    }
    /* END inline copy: SudokuBoard.js */

    let board;
    let selectedR = -1, selectedC = -1;
    let noteMode = false;
    let errorCount = 0;
    let startTime = 0;
    let timerHandle = null;
    let cellEls = [];

    const boardEl = document.getElementById("board");
    const filledStat = document.getElementById("filled-stat");
    const timeStat = document.getElementById("time-stat");
    const errorStat = document.getElementById("error-stat");
    const overlayEl = document.getElementById("overlay");
    const overlayStats = document.getElementById("overlay-stats");
    const noteToggle = document.getElementById("note-toggle");
    const diffBtns = document.querySelectorAll(".diff-btn");

    function buildBoard(difficulty) {
      board = SudokuBoard.generatePuzzle(difficulty);
      selectedR = -1; selectedC = -1;
      errorCount = 0;
      noteMode = false;
      noteToggle.textContent = "Notes: OFF";
      noteToggle.classList.remove("note-mode-on");
      boardEl.innerHTML = "";
      cellEls = [];
      for (let r = 0; r < 9; r++) {
        cellEls[r] = [];
        for (let c = 0; c < 9; c++) {
          const el = document.createElement("div");
          el.className = "cell";
          el.dataset.r = r;
          el.dataset.c = c;
          if (c === 2 || c === 5) el.classList.add("right-thick");
          if (r === 2 || r === 5) el.classList.add("bottom-thick");
          if (board.get(r, c).locked) el.classList.add("locked");
          el.appendChild(document.createElement("span"));
          const notesEl = document.createElement("div");
          notesEl.className = "notes";
          for (let i = 0; i < 9; i++) {
            const n = document.createElement("div");
            n.className = "note";
            notesEl.appendChild(n);
          }
          el.appendChild(notesEl);
          boardEl.appendChild(el);
          cellEls[r][c] = el;
        }
      }
      startTime = Date.now();
      if (timerHandle) clearInterval(timerHandle);
      timerHandle = setInterval(updateTimer, 1000);
      overlayEl.classList.remove("show");
      render();
    }

    function updateTimer() {
      const s = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(s / 60);
      const ss = (s % 60).toString().padStart(2, "0");
      timeStat.textContent = `${m}:${ss}`;
    }

    function render() {
      const conflicts = board.allConflicts();
      let filled = 0;
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const cell = board.get(r, c);
          const el = cellEls[r][c];
          el.classList.remove("related", "same-value", "selected", "conflict");
          // Show value
          el.firstChild.textContent = cell.value === 0 ? "" : cell.value;
          if (cell.value !== 0) filled++;
          // Notes
          const notesEl = el.lastChild;
          for (let i = 0; i < 9; i++) {
            notesEl.children[i].textContent = (cell.value === 0 && cell.notes.has(i+1)) ? (i+1) : "";
          }
          // Highlights
          if (selectedR >= 0) {
            const selVal = board.valueAt(selectedR, selectedC);
            if (r === selectedR || c === selectedC || (Math.floor(r/3) === Math.floor(selectedR/3) && Math.floor(c/3) === Math.floor(selectedC/3))) {
              el.classList.add("related");
            }
            if (selVal !== 0 && cell.value === selVal) el.classList.add("same-value");
          }
          if (r === selectedR && c === selectedC) el.classList.add("selected");
          if (conflicts.has(`${r},${c}`)) el.classList.add("conflict");
        }
      }
      filledStat.textContent = `${filled}/81`;
      errorStat.textContent = errorCount;
    }

    function checkWin() {
      if (!board.isComplete()) return;
      clearInterval(timerHandle);
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(elapsed/60), ss = (elapsed%60).toString().padStart(2, "0");
      const diff = document.querySelector(".diff-btn.active").dataset.diff;
      overlayStats.innerHTML = `Difficulty: <strong>${diff}</strong><br>Time: <strong>${m}:${ss}</strong><br>Errors: <strong>${errorCount}</strong>`;
      overlayEl.classList.add("show");
    }

    boardEl.addEventListener("pointerup", (ev) => {
      const target = ev.target.closest(".cell");
      if (!target) return;
      selectedR = parseInt(target.dataset.r, 10);
      selectedC = parseInt(target.dataset.c, 10);
      render();
    }, {passive: false});

    document.querySelectorAll(".numkey[data-v]").forEach(btn => {
      btn.addEventListener("pointerup", () => {
        if (selectedR < 0) return;
        const v = parseInt(btn.dataset.v, 10);
        const cell = board.get(selectedR, selectedC);
        if (cell.locked) return;
        if (noteMode && v !== 0) {
          board.toggleNote(selectedR, selectedC, v);
        } else {
          const before = cell.value;
          board.setCell(selectedR, selectedC, v);
          if (v !== 0 && board.validateCell(selectedR, selectedC).size > 0) errorCount++;
        }
        render();
        checkWin();
      });
    });

    noteToggle.addEventListener("pointerup", () => {
      noteMode = !noteMode;
      noteToggle.textContent = `Notes: ${noteMode ? "ON" : "OFF"}`;
      noteToggle.classList.toggle("note-mode-on", noteMode);
    });

    diffBtns.forEach(btn => {
      btn.addEventListener("pointerup", () => {
        diffBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        buildBoard(btn.dataset.diff);
      });
    });

    document.getElementById("overlay-restart").addEventListener("pointerup", () => {
      const diff = document.querySelector(".diff-btn.active").dataset.diff;
      buildBoard(diff);
    });

    // Keyboard support (desktop)
    window.addEventListener("keydown", (ev) => {
      if (ev.key >= "1" && ev.key <= "9" && selectedR >= 0) {
        const v = parseInt(ev.key, 10);
        const cell = board.get(selectedR, selectedC);
        if (cell.locked) return;
        if (noteMode) board.toggleNote(selectedR, selectedC, v);
        else {
          board.setCell(selectedR, selectedC, v);
          if (board.validateCell(selectedR, selectedC).size > 0) errorCount++;
        }
        render();
        checkWin();
      } else if ((ev.key === "Backspace" || ev.key === "Delete" || ev.key === "0") && selectedR >= 0) {
        const cell = board.get(selectedR, selectedC);
        if (!cell.locked) board.setCell(selectedR, selectedC, 0);
        render();
      } else if (ev.key === "n" || ev.key === "N") {
        noteMode = !noteMode;
        noteToggle.textContent = `Notes: ${noteMode ? "ON" : "OFF"}`;
        noteToggle.classList.toggle("note-mode-on", noteMode);
      }
    });

    console.log(`[Smoke] SudokuBoard ready`);
    buildBoard("easy");
    let cluesLeft = 0;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) if (board.get(r,c).locked) cluesLeft++;
    console.log(`[Smoke] Easy puzzle generated: ${cluesLeft} clues, ${81-cluesLeft} cells to fill`);
  </script>
</body>
