  <style>
    :root {
      --bg-1: #faf8ef;
      --bg-2: #f1edd9;
      --grid: #bbada0;
      --cell-empty: #cdc1b4;
      --text-dark: #776e65;

      --c64: #f65e3b;
      --c128: #edcf72;
      --c256: #edcc61;
      --c512: #edc850;
      --c1024: #edc53f;
      --c2048: #edc22e;
      --shadow: 0 6px 18px rgba(70,52,40,0.15);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);

      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      padding: env(safe-area-inset-top, 0) 16px env(safe-area-inset-bottom, 0);
    }
    header {
      width: 100%;
      max-width: 460px;
      padding: 16px 4px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.02em;
    }
    .scores {
      display: flex;
      gap: 8px;
    }
    .score-card {
      background: var(--grid);
      color: var(--text-light);
      padding: 6px 14px;
      border-radius: 6px;

    }
    .score-card .label {

    .score-card .value {

    }
    main {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .toolbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .toolbar .hint {
      font-size: 13px;

    }
    .toolbar button {
      min-height: 44px;
      min-width: 88px;
      padding: 8px 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;

      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    #board-frame {
      width: min(95vw, 460px);
      aspect-ratio: 1 / 1;
      background: var(--grid);
      border-radius: 12px;
      padding: 10px;
      position: relative;
      touch-action: none;
      box-shadow: var(--shadow);
    }
    #grid-bg {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
    }
    .bg-cell {
      background: var(--cell-empty);
      border-radius: 8px;
    }
    .tile-layer {
      position: absolute;
      inset: 10px;
      pointer-events: none;
    }
    .tile {
      position: absolute;
      width: calc((100% - 30px) / 4);
      height: calc((100% - 30px) / 4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      transition: transform 120ms ease-out;
      will-change: transform;
      box-shadow: var(--shadow);
    }
    .tile.spawned { animation: spawn-pop 200ms ease-out; }
    .tile.merged { animation: merge-pulse 220ms ease-out; }
    @keyframes spawn-pop {
      0% { transform: var(--tx) scale(0); }
      70% { transform: var(--tx) scale(1.08); }
      100% { transform: var(--tx) scale(1); }
    }
    @keyframes merge-pulse {
      0% { transform: var(--tx) scale(1); }
      50% { transform: var(--tx) scale(1.18); }
      100% { transform: var(--tx) scale(1); }
    }
    .tile.v2 { background: var(--c2); color: var(--text-dark); font-size: clamp(28px, 7.5vw, 44px); }
    .tile.v4 { background: var(--c4); color: var(--text-dark); font-size: clamp(28px, 7.5vw, 44px); }
    .tile.v8 { background: var(--c8); color: var(--text-light); font-size: clamp(28px, 7.5vw, 44px); }
    .tile.v16 { background: var(--c16); color: var(--text-light); font-size: clamp(28px, 7.5vw, 44px); }
    .tile.v32 { background: var(--c32); color: var(--text-light); font-size: clamp(28px, 7.5vw, 44px); }
    .tile.v64 { background: var(--c64); color: var(--text-light); font-size: clamp(28px, 7.5vw, 44px); }
    .tile.v128 { background: var(--c128); color: var(--text-light); font-size: clamp(24px, 6.5vw, 38px); }
    .tile.v256 { background: var(--c256); color: var(--text-light); font-size: clamp(24px, 6.5vw, 38px); }
    .tile.v512 { background: var(--c512); color: var(--text-light); font-size: clamp(24px, 6.5vw, 38px); }
    .tile.v1024 { background: var(--c1024); color: var(--text-light); font-size: clamp(20px, 5vw, 30px); }
    .tile.v2048 { background: var(--c2048); color: var(--text-light); font-size: clamp(20px, 5vw, 30px); box-shadow: 0 0 20px rgba(237,194,46,0.6), var(--shadow); }
    .tile.vBig { background: #3c3a32; color: var(--text-light); font-size: clamp(18px, 4.5vw, 26px); }
    /* +N score popups */
    #floats {
      position: absolute;
      inset: 10px;
      pointer-events: none;
    }
    .float {
      position: absolute;
      font-weight: 800;
      font-size: 22px;
      color: var(--accent);
      animation: float-up 800ms ease-out forwards;
      pointer-events: none;
    }
    @keyframes float-up {
      0% { opacity: 0; transform: translate(-50%, 0); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -60px); }
    }
    /* Game-over overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(250, 248, 239, 0.94);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      z-index: 100;
      padding: 32px;
    }
    #overlay.show { display: flex; }
    #overlay h2 { margin: 0; font-size: 32px; color: var(--text-dark); }
    #overlay .stats { font-size: 16px; line-height: 1.6; text-align: center; }
    #overlay button {
      min-height: 48px;
      min-width: 200px;
      padding: 14px 28px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;

      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--shadow);

<body>
  <header>
    <h1>2048</h1>
    <div class="scores">
      <div class="score-card"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="score-card"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <span class="hint">Swipe to merge tiles</span>
      <button id="new-game-btn">New Game</button>
    </div>
    <div id="board-frame">
      <div id="grid-bg" aria-hidden="true">
        <div class="bg-cell"></div><div class="bg-cell"></div><div class="bg-cell"></div><div class="bg-cell"></div>
        <div class="bg-cell"></div><div class="bg-cell"></div><div class="bg-cell"></div><div class="bg-cell"></div>
        <div class="bg-cell"></div><div class="bg-cell"></div><div class="bg-cell"></div><div class="bg-cell"></div>
        <div class="bg-cell"></div><div class="bg-cell"></div><div class="bg-cell"></div><div class="bg-cell"></div>
      </div>
      <div class="tile-layer" id="tile-layer"></div>
      <div id="floats"></div>
    </div>
  </main>

  <div id="overlay" role="dialog" aria-modal="true">
    <h2 id="overlay-title">Game Over</h2>
    <div class="stats" id="overlay-stats"></div>
    <button id="overlay-restart">Try Again</button>
  </div>

  <script type="module">
    /* BEGIN inline copy: GridBoard.js */
    class GridBoard {
      constructor(options = {}) {
        this.rows = options.rows ?? 8;
        this.cols = options.cols ?? 8;
        this.cells = Array.from({length: this.rows}, () =>
          Array.from({length: this.cols}, () => options.fill ?? null)
        );
      }
      inBounds(r, c) { return r >= 0 && r < this.rows && c >= 0 && c < this.cols; }
      get(r, c) { return this.inBounds(r, c) ? this.cells[r][c] : undefined; }
      set(r, c, v) { if (this.inBounds(r, c)) { this.cells[r][c] = v; return true; } return false; }
    }
    /* END inline copy: GridBoard.js */

    /* BEGIN inline copy: SwipeTileGrid.js */
    class SwipeTileGrid extends GridBoard {
      constructor(options = {}) {
        super({ ...options, rows: options.size ?? 4, cols: options.size ?? 4, fill: 0 });
        this.winValue = options.winValue ?? 2048;
        this.spawnValues = options.spawnValues ?? [2,2,2,2,2,2,2,2,2,4];
        this.score = 0; this.bestTile = 0; this.moveCount = 0; this.hasReachedWinValue = false;
      }
      newGame() {
        for (let r=0;r<this.rows;r++) for (let c=0;c<this.cols;c++) this.set(r,c,0);
        this.score=0; this.bestTile=0; this.moveCount=0; this.hasReachedWinValue=false;
        this.spawnRandomTile(); this.spawnRandomTile();
      }
      spawnRandomTile() {
        const empty = this.emptyCells();
        if (empty.length === 0) return null;
        const {row, col} = empty[Math.floor(Math.random() * empty.length)];
        const value = this.spawnValues[Math.floor(Math.random() * this.spawnValues.length)];
        this.set(row, col, value);
        if (value > this.bestTile) this.bestTile = value;
        return {row, col, value};
      }
      emptyCells() {
        const out = [];
        for (let r=0;r<this.rows;r++) for (let c=0;c<this.cols;c++) if (this.get(r,c)===0) out.push({row:r,col:c});
        return out;
      }
      swipe(direction) {
        const before = this.snapshotState();
        let totalMerged = 0;
        const apply = (lineGetter, lineSetter, len) => {
          const limit = (direction==="up"||direction==="down") ? this.cols : this.rows;
          for (let i=0;i<limit;i++) {
            const line = lineGetter(i);
            const reverse = (direction==="right" || direction==="down");
            const work = reverse ? line.slice().reverse() : line.slice();
            const compact = work.filter(v => v !== 0);
            const merged = [];
            for (let j=0;j<compact.length;j++) {
              if (j+1<compact.length && compact[j]===compact[j+1]) {
                const sum = compact[j]*2;
                merged.push(sum); totalMerged += sum;
                if (sum >= this.winValue) this.hasReachedWinValue = true;
                if (sum > this.bestTile) this.bestTile = sum;
                j++;
              } else {
                merged.push(compact[j]);
              }
            }
            while (merged.length < len) merged.push(0);
            const final = reverse ? merged.reverse() : merged;
            lineSetter(i, final);
          }
        };
        if (direction==="left" || direction==="right") {
          apply(i => this.cells[i].slice(), (i, line) => { this.cells[i] = line.slice(); }, this.cols);
        } else if (direction==="up" || direction==="down") {
          apply(i => this.cells.map(row => row[i]), (i, line) => { for (let r=0;r<this.rows;r++) this.cells[r][i] = line[r]; }, this.rows);
        }
        const moved = !this.statesEqual(before, this.snapshotState());
        if (moved) { this.score += totalMerged; this.moveCount++; }
        return {moved, merged: totalMerged};
      }
      snapshotState() { const out = []; for (let r=0;r<this.rows;r++) for (let c=0;c<this.cols;c++) out.push(this.get(r,c)); return out; }
      statesEqual(a, b) { for (let i=0;i<a.length;i++) if (a[i]!==b[i]) return false; return true; }
      canMove() {
        if (this.emptyCells().length > 0) return true;
        for (let r=0;r<this.rows;r++) for (let c=0;c<this.cols;c++) {
          const v = this.get(r,c);
          if (this.get(r,c+1)===v) return true;
          if (this.get(r+1,c)===v) return true;
        }
        return false;
      }
      isWin() { return this.hasReachedWinValue; }
      isGameOver() { return !this.canMove(); }
      static directionFromSwipe(sx, sy, ex, ey, threshold = 30) {
        const dx = ex-sx, dy = ey-sy;
        if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return null;
        if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? "right" : "left";
        return dy > 0 ? "down" : "up";
      }
    }
    /* END inline copy: SwipeTileGrid.js */

    const grid = new SwipeTileGrid({size: 4, winValue: 2048});
    grid.newGame();

    // localStorage best score
    let bestScore = parseInt(localStorage.getItem("2048-best-score") || "0", 10) || 0;
    let lastNotifiedWin = false;

    // DOM
    const tileLayer = document.getElementById("tile-layer");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlay-title");
    const overlayStats = document.getElementById("overlay-stats");
    const overlayRestart = document.getElementById("overlay-restart");
    const newGameBtn = document.getElementById("new-game-btn");
    const boardFrame = document.getElementById("board-frame");
    const floatsEl = document.getElementById("floats");

    function tileClass(v) {
      if (v >= 4096) return "vBig";
      return "v" + v;
    }

    function render() {
      tileLayer.innerHTML = "";
      const cellPercent = 100 / 4;
      for (let r = 0; r < grid.rows; r++) {
        for (let c = 0; c < grid.cols; c++) {
          const v = grid.get(r, c);
          if (v === 0) continue;
          const t = document.createElement("div");
          t.className = "tile " + tileClass(v);
          t.textContent = v;
          // Position via translate (transition: transform → smooth slide)
          const tx = `translate(calc(${c} * (100% + 10px) / 4 * 4 / 4), calc(${r} * (100% + 10px) / 4 * 4 / 4))`;
          // Simpler approach: use grid percentages
          t.style.left = `${c * cellPercent}%`;
          t.style.top = `${r * cellPercent}%`;
          t.style.marginLeft = `${c * 0}px`; // gap is in container padding, we use percentages
          // Adjust width/height to account for gaps (10px)
          t.style.width = `calc(${cellPercent}% - 7.5px)`;
          t.style.height = `calc(${cellPercent}% - 7.5px)`;
          t.style.setProperty("--tx", "translate(0,0)");
          tileLayer.appendChild(t);
        }
      }
      scoreEl.textContent = grid.score;
      if (grid.score > bestScore) {
        bestScore = grid.score;
        localStorage.setItem("2048-best-score", String(bestScore));
      }
      bestEl.textContent = bestScore;
    }

    function showFloat(text) {
      const f = document.createElement("div");
      f.className = "float";
      f.textContent = text;
      f.style.left = "50%";
      f.style.top = "30%";
      floatsEl.appendChild(f);
      setTimeout(() => f.remove(), 800);
    }

    function endIfDone() {
      if (grid.isWin() && !lastNotifiedWin) {
        lastNotifiedWin = true;
        overlayTitle.textContent = "You Win!";
        overlayStats.innerHTML = `You reached <strong>2048</strong>!<br>Score: <strong>${grid.score}</strong><br>Keep playing for a higher score?`;
        overlayRestart.textContent = "Keep Playing";
        overlay.classList.add("show");
        return;
      }
      if (grid.isGameOver()) {
        overlayTitle.textContent = "Game Over";
        overlayStats.innerHTML = `Final score: <strong>${grid.score}</strong><br>Best tile: <strong>${grid.bestTile}</strong><br>Moves: <strong>${grid.moveCount}</strong>`;
        overlayRestart.textContent = "Try Again";
        overlay.classList.add("show");
      }
    }

    function doSwipe(direction) {
      if (overlay.classList.contains("show") && !lastNotifiedWin) return;
      const result = grid.swipe(direction);
      if (!result.moved) return;
      grid.spawnRandomTile();
      if (result.merged > 0) showFloat(`+${result.merged}`);
      render();
      endIfDone();
    }

    // Touch / pointer swipe handling (mob-005)
    let startX = 0, startY = 0, tracking = false;
    boardFrame.addEventListener("pointerdown", (ev) => {
      ev.preventDefault();
      startX = ev.clientX; startY = ev.clientY; tracking = true;
      try { boardFrame.setPointerCapture(ev.pointerId); } catch {}
    }, { passive: false });
    boardFrame.addEventListener("pointerup", (ev) => {
      if (!tracking) return;
      tracking = false;
      const dir = SwipeTileGrid.directionFromSwipe(startX, startY, ev.clientX, ev.clientY, 30);
      if (dir) doSwipe(dir);
    }, { passive: false });
    boardFrame.addEventListener("pointercancel", () => { tracking = false; });

    // Desktop fallback: arrow keys
    window.addEventListener("keydown", (ev) => {
      const map = {ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down"};
      const dir = map[ev.key];
      if (dir) { ev.preventDefault(); doSwipe(dir); }
    });

    function restart() {
      grid.newGame();
      lastNotifiedWin = false;
      overlay.classList.remove("show");
      render();
    }
    newGameBtn.addEventListener("click", restart);
    overlayRestart.addEventListener("click", () => {
      // If we just hit win, just dismiss + keep playing
      if (lastNotifiedWin && grid.isWin() && !grid.isGameOver()) {
        overlay.classList.remove("show");
        return;
      }
      restart();
    });

    console.log(`[Smoke] SwipeTileGrid ${grid.rows}×${grid.cols} ready, winValue=${grid.winValue}`);
    console.log(`[Smoke] Initial state: score=${grid.score}, bestTile=${grid.bestTile}, tiles=${grid.snapshotState().filter(v=>v).length}`);
    render();
  </script>
</body>
